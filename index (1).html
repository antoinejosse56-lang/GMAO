    }
  }

  if(m.type==='edit-tenant'){
    const log = (S.locatif?.logements||[]).find(l=>l.id===m.logId)||{};
    html=`${mhd('Fiche locataire — '+log.name)}
    <div class="g2c">
      <div class="form-group"><label>Nom du locataire</label><input id="m-ten-name" value="${log.tenant||''}"></div>
      <div class="form-group"><label>Email *</label><input id="m-ten-email" type="email" value="${log.tenant_email||''}" placeholder="locataire@email.fr"></div>
    </div>
    <div class="g2c">
      <div class="form-group"><label>Loyer mensuel (€)</label><input id="m-ten-loyer" type="number" value="${log.loyer_base||0}"></div>
      <div class="form-group"><label>Charges (€)</label><input id="m-ten-charges" type="number" value="${log.charges||0}"></div>
    </div>
    <div class="g2c">
      <div class="form-group"><label>Dépôt de garantie (€)</label><input id="m-ten-dg" type="number" value="${log.depot_garantie||0}"></div>
      <div class="form-group"><label>Début du bail</label><input id="m-ten-debut" type="date" value="${log.bail_debut||''}"></div>
    </div>
    <div class="form-group"><label>Fin du bail</label><input id="m-ten-fin" type="date" value="${log.bail_fin||''}"></div>
    <div class="form-group"><label>Notes</label><textarea id="m-ten-notes">${log.notes||''}</textarea></div>
    ${mf}`;
  }

  if(m.type==='add-water'){
    html=`${mhd('Nouveau relevé eau')}
    <div class="form-group"><label>Logement *</label><select id="m-wat-log">
      ${(S.locatif?.logements||[]).map(l=>`<option value="${l.id}">${l.name}</option>`).join('')}
    </select></div>
    <div class="g2c">
      <div class="form-group"><label>Année</label><input id="m-wat-year" type="number" value="${new Date().getFullYear()}"></div>
      <div class="form-group"><label>Période</label><select id="m-wat-period"><option>Janvier</option><option>Mars</option><option>Juin</option><option>Décembre</option></select></div>
    </div>
    <div class="g2c">
      <div class="form-group"><label>Ancien index (m³)</label><input id="m-wat-old" type="number" step="0.001"></div>
      <div class="form-group"><label>Nouvel index (m³)</label><input id="m-wat-new" type="number" step="0.001"></div>
    </div>
    <div class="g2c">
      <div class="form-group"><label>Prix/m³ (€)</label><input id="m-wat-prix" type="number" step="0.0001"></div>
      <div class="form-group"><label>Montant facturé (€)</label><input id="m-wat-mnt" type="number" step="0.01"></div>
    </div>
    <div class="form-group"><label>Date paiement</label><input id="m-wat-date" type="date"></div>
    ${mf}`;
  }

  if(m.type==='edit-tenant'){
    const logs = S.locatif?.logements||[];
    const log = logs.find(l=>l.id===m.logId);
    if(log){
      log.tenant=q('m-ten-name').value;
      log.tenant_email=q('m-ten-email').value;
      log.loyer_base=parseFloat(q('m-ten-loyer').value)||0;
      log.charges=parseFloat(q('m-ten-charges').value)||0;
      log.depot_garantie=parseFloat(q('m-ten-dg').value)||0;
      log.bail_debut=q('m-ten-debut').value;
      log.bail_fin=q('m-ten-fin').value;
      log.notes=q('m-ten-notes').value;
    }
  }

  if(m.type==='add-water'){
    const wr={
      logement_id:q('m-wat-log').value,
      logement_name:(S.locatif?.logements||[]).find(l=>l.id===q('m-wat-log').value)?.name||'',
      year:parseInt(q('m-wat-year').value)||new Date().getFullYear(),
      period:q('m-wat-period').value,
      ancien_index:parseFloat(q('m-wat-old').value)||0,
      nouvel_index:parseFloat(q('m-wat-new').value)||0,
      consommation:Math.round((parseFloat(q('m-wat-new').value)-parseFloat(q('m-wat-old').value))*1000)/1000,
      prix_unitaire:parseFloat(q('m-wat-prix').value)||0,
      montant:parseFloat(q('m-wat-mnt').value)||0,
      date_paiement:q('m-wat-date').value||null,
      paid:!!q('m-wat-date').value
    };
    if(!S.locatif.waterReadings)S.locatif.waterReadings=[];
    S.locatif.waterReadings.push(wr);
  }

  




  if(m.type==='add-cpt'||m.type==='edit-cpt'){
    const nameEl=q('m-cn-select')||q('m-cn');
    const name=(nameEl?.value||'').trim();if(!name)return alert('Nom requis');
    const topoId=q('m-ctopo').value||null;
    const tenantId=q('m-ctenant')?.value||null;
    const rec={name,type:q('m-ctype').value,unite:q('m-cunite').value,
      numero_serie:q('m-cserial').value||null,
      index_initial:parseFloat(q('m-cidx').value)||0,
      topo_id:topoId,tenant_id:tenantId,
      prix_unitaire:parseFloat(q('m-cprix')?.value)||0,
      notes:q('m-cnotes').value||null};
    if(m.type==='add-cpt'){
      const {data,error}=await sb.from('compteurs').insert(rec).select().single();
      if(error){alert('Erreur : '+error.message);return;}
      if(data)S.compteurs.push(data);
    } else {
      const {error}=await sb.from('compteurs').update(rec).eq('id',m.cpt.id);
      if(error){alert('Erreur : '+error.message);return;}
      Object.assign(m.cpt,rec);
    }
  }

  if(m.type==='add-releve'){
    const cptId=q('m-rcpt').value;
    const newIdx=parseFloat(q('m-rnew').value);
    if(!newIdx&&newIdx!==0)return alert('Nouvel index requis');
    const ancIdx=parseFloat(q('m-rold').value)||0;
    const prix=parseFloat(q('m-rprix').value)||0;
    const conso=Math.round((newIdx-ancIdx)*1000)/1000;
    const montant=Math.round(conso*prix*100)/100;
    const {data,error}=await sb.from('releves').insert({
      compteur_id:cptId,date:q('m-rdate').value,
      ancien_index:ancIdx,nouvel_index:newIdx,
      prix_unitaire:prix,notes:q('m-rnotes').value,
      paye:false,facture_envoyee:false
    }).select().single();
    if(error){alert('Erreur: '+error.message);return;}
    if(data){
      S.releves.unshift(data);
      // Auto-send facture eau if tenant has email
      const cpt=S.compteurs.find(c=>c.id===cptId);
      const tenant=cpt?.tenant_id?S.tenants.find(t=>t.id===cpt.tenant_id):null;
      if(tenant?.email&&montant>0){
        try{
          await sendFactureEau(data,cpt,tenant,conso,montant,prix);
          await sb.from('releves').update({facture_envoyee:true}).eq('id',data.id);
          data.facture_envoyee=true;
          alert('✓ Relevé enregistré et facture envoyée à '+tenant.email);
        }catch(e){
          alert('✓ Relevé enregistré\n⚠ Facture non envoyée : '+e.message);
        }
      } else {
        alert('✓ Relevé enregistré — Consommation : '+conso+' m³ — Montant : '+montant+'€'+(tenant&&!tenant.email?' (pas d\'email locataire)':''));
      }
    }
  }

  if(m.type==='add-revenue'){
    const propId=q('m-rev-prop').value;if(!propId)return alert('Veuillez sélectionner un bien');
    const amount=parseFloat(q('m-rev-amount').value);if(!amount)return alert('Montant requis');
    const prop=S.topology.properties.find(p=>p.id===propId);
    const zoneId=q('m-rev-zone')?.value||null;
    const subId=q('m-rev-sub')?.value||null;
    const {data}=await sb.from('revenues').insert({
      prop_id:propId,prop_name:prop?.name||'',
      zone_id:zoneId||null,sub_id:subId||null,
      type:q('m-rev-type').value,
      amount,charges:parseFloat(q('m-rev-charges').value)||0,
      notes:q('m-rev-notes').value
    }).select().single();
    if(data){
      // Map to frontend format
      data.propId=data.prop_id;data.zoneId=data.zone_id;data.subId=data.sub_id;
      S.revenues.push(data);
    }
  }

  if(m.type==='add-zone'){
    const name=q('m-zn').value.trim();if(!name)return alert('Nom requis');
    const prop=S.topology.properties.find(p=>p.id===m.propId);if(!prop)return;
    if(!prop.zones)prop.zones=[];
    // Créer l'équipement associé
    const {data:assetData}=await sb.from('assets').insert({name,category:'Immobilier',type:'Zone',location:prop.name,description:'Zone — '+name+' ('+prop.name+')',status:'ok',documents:[],history:[]}).select().single();
    if(assetData)S.assets.push(assetData);
    const nz={id:uid(),name,subZones:[],trades:[],assetId:assetData?.id||null};prop.zones.push(nz);
    S.topoState.zoneId=nz.id;S.topoState.expanded[nz.id]=true;
    await saveTopoToDB();}

  if(m.type==='add-subzone'){
    const name=q('m-szn').value.trim();if(!name)return alert('Nom requis');
    const prop=S.topology.properties.find(p=>p.id===S.topoState.propId);
    const zone=prop?.zones?.find(z=>z.id===m.zoneId);if(!zone)return;
    if(!zone.subZones)zone.subZones=[];
    // Créer l'équipement associé
    const {data:assetData}=await sb.from('assets').insert({name,category:'Immobilier',type:'Sous-zone',location:prop.name+' › '+zone.name,description:'Sous-zone — '+name+' ('+zone.name+')',status:'ok',documents:[],history:[]}).select().single();
    if(assetData)S.assets.push(assetData);
    const ns={id:uid(),name,trades:[],assetId:assetData?.id||null};zone.subZones.push(ns);
    S.topoState.subZoneId=ns.id;S.topoState.expanded[zone.id]=true;S.topoState.expanded[ns.id]=true;
    await saveTopoToDB();}

  if(m.type==='add-trade'){
    const name=q('m-ttn').value.trim();if(!name)return alert('Nom requis');
    const prop=S.topology.properties.find(p=>p.id===S.topoState.propId);
    const zone=prop?.zones?.find(z=>z.id===m.zoneId);if(!zone)return;
    const nt={id:uid(),name,icon:q('m-tti').value||'🔧',items:[]};
    if(m.subZoneId){
      const sub=zone.subZones?.find(s=>s.id===m.subZoneId);if(!sub)return;
      if(!sub.trades)sub.trades=[];sub.trades.push(nt);
      S.topoState.tradeId=nt.id;S.topoState.expanded[m.subZoneId]=true;
    }else{
      if(!zone.trades)zone.trades=[];zone.trades.push(nt);
      S.topoState.tradeId=nt.id;S.topoState.expanded[m.zoneId]=true;
    }
    await saveTopoToDB();}

  if(m.type==='add-topo-item'){
    const name=q('m-tin').value.trim();if(!name)return alert('Nom requis');
    const ts=S.topoState;
    const prop=S.topology.properties.find(p=>p.id===ts.propId);
    const zone=prop?.zones?.find(z=>z.id===ts.zoneId);
    let trade=null;
    if(ts.subZoneId){const sub=zone?.subZones?.find(s=>s.id===ts.subZoneId);trade=sub?.trades?.find(t=>t.id===ts.tradeId);}
    else{trade=zone?.trades?.find(t=>t.id===ts.tradeId);}
    if(!trade)return;
    if(!trade.items)trade.items=[];
    trade.items.push({id:uid(),name,notes:q('m-tinotes').value});
    await saveTopoToDB();}

  if(m.type==='add-wo-doc'){
    const name=document.getElementById('m-wdn').value.trim();
    const url=document.getElementById('m-wdu').value.trim();
    if(!name||!url)return alert('Nom et URL requis');
    const wo=S.workOrders.find(x=>x.id===m.woId);if(!wo)return;
    const d={id:uid(),name,url,type:document.getElementById('m-wdt').value,date:document.getElementById('m-wdd').value};
    wo.docs=[...(wo.docs||[]),d];
    await sb.from('work_orders').update({docs:wo.docs}).eq('id',wo.id);
  }

  if(m.type==='edit-cg'){
    const a=m.asset;
    a.carte_grise={
      immat:document.getElementById('cg-immat').value,
      date_1ere_immat:document.getElementById('cg-date1').value,
      titulaire:document.getElementById('cg-titulaire').value,
      adresse:document.getElementById('cg-adresse').value,
      marque:document.getElementById('cg-marque').value,
      denomination:document.getElementById('cg-denom').value,
      type_variante:document.getElementById('cg-type').value,
      vin:document.getElementById('cg-vin').value,
      masse_max:document.getElementById('cg-mmr').value,
      masse_charge:document.getElementById('cg-mmc').value,
      masse_service:document.getElementById('cg-ms').value,
      cylindree:document.getElementById('cg-cyl').value,
      puissance_kw:document.getElementById('cg-pkw').value,
      carburant:document.getElementById('cg-carb').value,
      puissance_cv:document.getElementById('cg-pcv').value,
      categorie:document.getElementById('cg-cat').value,
      usage:document.getElementById('cg-usage').value,
      carrosserie_ce:document.getElementById('cg-carce').value,
      carrosserie_nat:document.getElementById('cg-carnat').value,
      places_assises:document.getElementById('cg-pass').value,
      places_debout:document.getElementById('cg-pdeb').value,
      couleur:document.getElementById('cg-coul').value,
      classe_env:document.getElementById('cg-env').value,
      niveau_sonore:document.getElementById('cg-son').value,
      regime_moteur:document.getElementById('cg-rpm').value,
      co2:document.getElementById('cg-co2').value,
      date_ct:document.getElementById('cg-ct').value,
      remarques:document.getElementById('cg-rem').value,
    };
    await sb.from('assets').update({carte_grise:a.carte_grise}).eq('id',a.id);
    S.selectedAsset=a;
  }

  if(m.type==='saisie-loyer'){
    const locPart=parseFloat(q('m-sl-loc')?.value)||0;
    const dateLoc=q('m-sl-date').value||null;
    const caf=parseFloat(q('m-sl-caf')?.value)||0;
    const dateCaf=q('m-sl-date-caf')?.value||null;
    const payeVal=q('m-sl-paye').value;
    const paye=payeVal==='true';
    const notes=q('m-sl-notes').value;
    const montant=locPart+caf;
    const moisNum=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'].indexOf(m.mois)+1;
    let payment=m.existing;
    const rec={loyer:montant,date_loc:dateLoc,date_caf:dateCaf,paye,caf,locataire_part:locPart,notes};
    if(m.existing){
      const {error}=await sb.from('rent_payments').update(rec).eq('id',m.existing.id);
      if(error){alert('Erreur : '+error.message);return;}
      Object.assign(m.existing,rec);
    }else{
      const {data,error}=await sb.from('rent_payments').insert({tenant_id:m.tenantId,annee:m.annee,mois:m.mois,mois_num:moisNum,...rec,quittance_envoyee:false}).select().single();
      if(error){alert('Erreur : '+error.message);return;}
      if(data){S.rentPayments.push(data);payment=data;}
    }
    if(paye&&m.tenant?.email&&payment){
      try{
        const r2 = await autoSendQuittance(m.tenant,payment,m.mois,m.annee);
        alert('✓ Enregistré !\n\n📄 Document ouvert pour impression/PDF.\n📧 Copie envoyée sur '+ALERT_EMAIL+' (à transférer à '+m.tenant.email+')');
      }catch(e){
        console.error('Email err:',e);
        alert('✓ Enregistré\n\n📄 '+e.message);
      }
    }else if(paye&&!m.tenant?.email){
      alert('✓ Enregistré — aucun email renseigné pour ce locataire.');
    }else{
      alert('✓ Enregistré');
    }
  }

  closeModal();
}

function bindAll(){
  const q = id => document.getElementById(id);
  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>{S.view=el.dataset.nav;S.selectedAsset=null;S.filter={cat:'all',search:''};if(el.dataset.nav!=='topology'){S.topoState.zoneId=null;S.topoState.subZoneId=null;S.topoState.tradeId=null;}if(el.dataset.nav!=='assets'){S.assetNav={propId:null,zoneId:null,subId:null};}render();});
  if(q('btn-logout'))q('btn-logout').onclick=()=>{S.currentUser=null;render();};
  if(q('btn-back'))q('btn-back').onclick=()=>{S.view='assets';S.selectedAsset=null;render();};
  if(q('btn-add-asset'))q('btn-add-asset').onclick=()=>{S.modal={type:'add-asset'};render();};
  if(q('btn-add-tool'))q('btn-add-tool').onclick=()=>{S.modal={type:'add-tool'};render();};
  if(q('btn-add-vehicle'))q('btn-add-vehicle').onclick=()=>{S.modal={type:'add-asset',forceCategory:'Véhicule'};render();};
  if(q('btn-add-wo'))q('btn-add-wo').onclick=()=>{S.modal={type:'add-wo'};render();};
  if(q('btn-add-wo-asset'))q('btn-add-wo-asset').onclick=()=>{S.modal={type:'add-wo',assetId:S.selectedAsset?.id};render();};
  if(q('btn-add-wo-here'))q('btn-add-wo-here').onclick=()=>{S.modal={type:'add-wo',assetId:S.selectedAsset?.id};render();};
  if(q('btn-add-mt'))q('btn-add-mt').onclick=()=>{S.modal={type:'add-mt'};render();};
  const autobtCheck=document.getElementById('m-mautobt');
  if(autobtCheck){
    autobtCheck.onchange=()=>{
      const wrap=document.getElementById('m-mbt-cat-wrap');
      if(wrap)wrap.style.display=autobtCheck.checked?'':'none';
    };
  }
  if(q('btn-add-user'))q('btn-add-user').onclick=()=>{S.modal={type:'add-user'};render();};
  if(q('btn-edit-asset'))q('btn-edit-asset').onclick=()=>{S.modal={type:'edit-asset',asset:S.selectedAsset};render();};
  if(q('btn-edit-cg'))q('btn-edit-cg').onclick=()=>{S.modal={type:'edit-cg',asset:S.selectedAsset};render();};
  if(q('btn-add-history'))q('btn-add-history').onclick=()=>{S.modal={type:'add-history',assetId:S.selectedAsset?.id};render();};
  if(q('btn-add-doc'))q('btn-add-doc').onclick=()=>{S.modal={type:'add-doc',assetId:S.selectedAsset?.id};render();};
  if(q('btn-add-prop'))q('btn-add-prop').onclick=()=>{S.modal={type:'add-prop'};render();};
  if(q('asset-search'))q('asset-search').oninput=e=>{S.filter.search=e.target.value;render();};

  // Asset navigation (topology-style)
  if(!S.assetNav) S.assetNav={propId:null,zoneId:null,subId:null};
  document.querySelectorAll('[data-asset-nav-prop]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();S.assetNav={propId:el.dataset.assetNavProp||null,zoneId:null,subId:null};render();});
  document.querySelectorAll('[data-asset-nav-zone]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    if(el.dataset.assetNavProp2) S.assetNav.propId=el.dataset.assetNavProp2;
    S.assetNav.zoneId=el.dataset.assetNavZone||null;S.assetNav.subId=null;render();});
  document.querySelectorAll('[data-asset-nav-sub]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();S.assetNav.subId=el.dataset.assetNavSub||null;render();});
  if(q('tool-search'))q('tool-search').oninput=e=>{S.filter.search=e.target.value;render();};
  document.querySelectorAll('[data-fcat]').forEach(el=>el.onclick=()=>{S.filter.cat=el.dataset.fcat;render();});
  document.querySelectorAll('[data-goto-asset]').forEach(el=>el.onclick=()=>{const a=S.assets.find(x=>x.id===el.dataset.gotoAsset);if(a){S.selectedAsset=a;S.view='asset_detail';S.subTab='info';render();}});
  document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>{S.subTab=el.dataset.tab;render();});
  document.querySelectorAll('[data-done-task]').forEach(el=>el.onclick=async()=>{
    await sb.from('tasks').update({status:'done'}).eq('id',el.dataset.doneTask);
    const t=S.tasks.find(x=>x.id===el.dataset.doneTask);if(t)t.status='done';render();});
  document.querySelectorAll('[data-del-task]').forEach(el=>el.onclick=async()=>{
    if(!confirm('Supprimer ?'))return;await sb.from('tasks').delete().eq('id',el.dataset.delTask);
    S.tasks=S.tasks.filter(t=>t.id!==el.dataset.delTask);render();});
  // Lier un équipement à un nœud topologique
  document.querySelectorAll('[data-link-node]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    S.modal={type:'link-asset',nodeId:el.dataset.linkNode,nodeName:el.dataset.linkName,nodeType:el.dataset.linkType};
    render();});

  // Bons de travaux et historique depuis la topologie
  document.querySelectorAll('[data-topo-add-wo]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const ts=S.topoState;
    S.modal={type:'add-wo',assetId:null,propId:ts.propId,zoneId:ts.zoneId,subId:ts.subZoneId};render();});

  document.querySelectorAll('[data-topo-add-hist]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const asset=S.assets.find(a=>a.id===el.dataset.topoAddHist);
    if(asset){S.selectedAsset=asset;S.modal={type:'add-history',assetId:asset.id};render();}});

  document.querySelectorAll('[data-add-wo-doc]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();S.modal={type:'add-wo-doc',woId:el.dataset.addWoDoc};render();});

  document.querySelectorAll('[data-del-wo-doc]').forEach(el=>el.onclick=async e=>{
    e.stopPropagation();if(!confirm('Supprimer ce document ?'))return;
    const wo=S.workOrders.find(x=>x.id===el.dataset.woId);if(!wo)return;
    wo.docs=(wo.docs||[]).filter(d=>d.id!==el.dataset.delWoDoc);
    await sb.from('work_orders').update({docs:wo.docs}).eq('id',wo.id);render();});

  // Locatif tab bindings
  if(!S.locatif || S.locatif.logements.length===0){
    // Will be initialized in renderLocatif
  }
  document.querySelectorAll('[data-loc-tab]').forEach(el=>el.onclick=()=>{S.locatifTab=el.dataset.locTab;render();});
  document.querySelectorAll('[data-loc-year]').forEach(el=>el.onclick=()=>{S.locatifYear=parseInt(el.dataset.locYear);render();});
  document.querySelectorAll('[data-loc-sel]').forEach(el=>el.onclick=e=>{e.stopPropagation();S.selectedLogement=el.dataset.locSel||null;render();});
  document.querySelectorAll('[data-edit-tenant]').forEach(el=>el.onclick=e=>{e.stopPropagation();S.modal={type:'edit-tenant',logId:el.dataset.editTenant};render();});

  // Validate rent payment

// Tokens séparés par compte
let gdriveTokens = {};

// Détecter quel compte Drive utiliser selon le logement
function getDriveAccount(logement){
  const l = (logement||'').toLowerCase();
  if(l.includes('dubail') || l.includes('général dubail') || l.includes('general dubail')){
    return {hint:'savadur56@gmail.com', label:'J&A SAVADUR', key:'savadur'};

async function getGdriveToken(accountKey, loginHint){
  const cacheKey = 'gdrive_token_'+accountKey;
  const expiryKey = 'gdrive_expiry_'+accountKey;
  if(gdriveTokens[accountKey]) return gdriveTokens[accountKey];
  const stored = localStorage.getItem(cacheKey);
  const expiry = parseInt(localStorage.getItem(expiryKey)||'0');
  if(stored && Date.now() < expiry){ gdriveTokens[accountKey]=stored; return stored; }
  return new Promise((resolve,reject)=>{
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GDRIVE_CLIENT_ID,
      scope: GDRIVE_SCOPE,
      hint: loginHint,
      callback:(resp)=>{
        if(resp.error){ reject(new Error(resp.error)); return; }
        gdriveTokens[accountKey] = resp.access_token;
        localStorage.setItem(cacheKey, resp.access_token);
        localStorage.setItem(expiryKey, String(Date.now()+(resp.expires_in-60)*1000));
        resolve(resp.access_token);
      }
    });
    client.requestAccessToken();
  });
}

async function getOrCreateFolder(token, name, parentId=null){
  const q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`+(parentId?` and '${parentId}' in parents`:'');
  const resp = await fetch('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name)',{
    headers:{Authorization:'Bearer '+token}
  });
  const data = await resp.json();
  if(data.files&&data.files.length>0) return data.files[0].id;
  const cr = await fetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',
    headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({name, mimeType:'application/vnd.google-apps.folder', parents:parentId?[parentId]:[]})
  });
  const folder = await cr.json();
  return folder.id;
}

// Dossier Drive racine pour les quittances/factures loyer ET eau
// https://drive.google.com/drive/folders/1xEwr6MJf0Z2a7bWPUBdKJ_RNkUJyZ0I3
const GDRIVE_ROOT_FOLDER_ID = '1xEwr6MJf0Z2a7bWPUBdKJ_RNkUJyZ0I3';

async function uploadToDrive(token, htmlContent, filename, parentFolderId){
  const boundary = 'gmao_'+Date.now();
  const meta = JSON.stringify({name:filename+'.html', parents:[parentFolderId], mimeType:'text/html'});
  const CRLF='\r\n';
  const body='--'+boundary+CRLF+'Content-Type: application/json'+CRLF+CRLF+meta
    +CRLF+'--'+boundary+CRLF+'Content-Type: text/html'+CRLF+CRLF+htmlContent
    +CRLF+'--'+boundary+'--';
  const up = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
    method:'POST',
    headers:{Authorization:'Bearer '+token,'Content-Type':'multipart/related; boundary='+boundary},
    body
  });
  if(!up.ok){ const e=await up.text(); throw new Error(e); }
  return await up.json();
}

async function archiveToDrive(htmlContent, filename, mois, annee, logement){
  if(GDRIVE_CLIENT_ID==='VOTRE_CLIENT_ID_ICI.apps.googleusercontent.com'){
    console.log('Drive non configuré — archivage ignoré');
    return null;
  }
  try {
    const account = getDriveAccount(logement||'');
    console.log('Archivage Drive →', account.label, '('+account.hint+')');
    const token = await getGdriveToken(account.key, account.hint);

    // Utilise le dossier racine partagé, puis crée sous-dossiers Année/Mois
    const yearId  = await getOrCreateFolder(token, String(annee), GDRIVE_ROOT_FOLDER_ID);
    const monthId = await getOrCreateFolder(token, mois, yearId);

    const file = await uploadToDrive(token, htmlContent, filename, monthId);
    console.log('✓ Archivé sur Drive ('+account.label+'):', filename, '→', file.id);
    return file.id;
  } catch(e){
    console.warn('Drive archive failed:', e.message);
    return null;
  }
}

async function archiveEauToDrive(htmlContent, filename, mois, annee){

const GDRIVE_PICKER_APP_ID = '96627378010';  // = numéro avant le tiret dans le Client ID

function openDrivePicker(callback){
  // Load picker API if not loaded
  if(!window.google?.picker){

function _openPicker(callback){
  getGdriveToken('antoine','antoinejoss56@gmail.com').then(token=>{
    const view = new google.picker.DocsView()
      .setIncludeFolders(true)
      .setSelectFolderEnabled(false);

      .setAppId(GDRIVE_PICKER_APP_ID)
      .setOAuthToken(token)
      .addView(view)

      .setTitle('Sélectionner un document Drive')

            id: doc.id,
            mimeType: doc.mimeType
          });
        }
      })
      .build();

  const dateReleve = dateLabel(releve.date);
  const invoiceNum = releve.date.replace(/-/g,'').slice(0,8)+'-EAU-'+tenant.logement.replace(/[^A-Z0-9]/gi,'').toUpperCase().slice(0,4);
  const montantHT = Math.round(montant/1.2*100)/100;

  const html = buildFactureEauHtml(tenant, cpt, conso, montant, montantHT, montantTVA, prix, dateReleve, invoiceNum, releve, fmt);
  const subject = 'Facture eau — '+dateReleve+' — '+tenant.logement+' — N°'+invoiceNum;

  const resp = await fetch('https://api.brevo.com/v3/smtp/email',{
    method:'POST',
    headers:{'api-key':BREVO_API_KEY,'Content-Type':'application/json','Accept':'application/json'},
    body:JSON.stringify({
      sender:{name:FROM_NAME,email:FROM_EMAIL},
      to:[{email:tenant.email,name:tenant.nom}],
      bcc:[{email:ALERT_EMAIL,name:'J&A SAVADUR (copie)'}],
      subject,htmlContent:html
    })
  });
  if(!resp.ok){const t=await resp.text();throw new Error(t);}
  // Archive sur Drive
  const dateReleve2 = releve.date||new Date().toISOString().slice(0,10);
  const moisEau = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'][parseInt(dateReleve2.slice(5,7))-1]||'';
  const anneeEau = parseInt(dateReleve2.slice(0,4));
  const driveFilenameEau = (cpt.name||'Compteur').replace(/[^a-zA-Z0-9]/g,'-').replace(/-+/g,'-')
    +'_'+(tenant.logement||'').replace(/[^a-zA-Z0-9]/g,'-').replace(/-+/g,'-')
    +'_'+moisEau+'_'+anneeEau+'_Facture-Eau';
  archiveEauToDrive(html, driveFilenameEau, moisEau, anneeEau);
  // Open for print/archive
  const w=window.open('','_blank');

  return true;
}

  <p><strong>Logement :</strong> ${log.name} — 26 rue Générale Dubail</p>
  <p><strong>Locataire :</strong> ${log.tenant||'—'}</p>
  <p><strong>Période :</strong> 1er ${monthName} ${year} au dernier jour du mois</p>
  ${log.type_bail==='commercial'?`
  <table>
    <tr><th>Désignation</th><th>Montant HT</th><th>TVA 20%</th><th>Montant TTC</th></tr>
    <tr><td>Loyer mensuel</td><td>${(loyer/1.2).toFixed(2)} €</td><td>${(loyer/1.2*0.2).toFixed(2)} €</td><td>${loyer.toFixed(2)} €</td></tr>
    ${charges>0?`<tr><td>Charges</td><td>${(charges/1.2).toFixed(2)} €</td><td>${(charges/1.2*0.2).toFixed(2)} €</td><td>${charges.toFixed(2)} €</td></tr>`:''}
    <tr class="total"><td>TOTAL TTC REÇU</td><td>${(total/1.2).toFixed(2)} €</td><td>${(total/1.2*0.2).toFixed(2)} €</td><td><strong>${total.toFixed(2)} €</strong></td></tr>
  </table>`:`
  <table>
    <tr><th>Désignation</th><th>Montant</th></tr>
    <tr><td>Loyer mensuel</td><td>${loyer.toFixed(2)} €</td></tr>
    ${charges>0?`<tr><td>Charges</td><td>${charges.toFixed(2)} €</td></tr>`:''}
    <tr class="total"><td>TOTAL REÇU</td><td>${total.toFixed(2)} €</td></tr>
  </table>`}
  <p>Je soussigné(e), gérant(e) de la SCI, reconnaît avoir reçu de <strong>${log.tenant||'—'}</strong> la somme de <strong>${total.toFixed(2)} €</strong> au titre du loyer et des charges du mois de ${monthName} ${year}.</p>
  <div class="sign">
    <p>Fait le ${payment.date_paiement||new Date().toISOString().split('T')[0]}</p>
    <p>Signature du bailleur</p>
    <br><br>
    <p>____________________</p>
  </div>
  <div class="mention">Cette quittance annule tous les reçus qui auraient pu être établis précédemment pour les mêmes objets. En cas de paiement par chèque, la présente quittance ne vaut qu'après encaissement.</div>
  </body></html>`;

  // Store Resend API key (ask user first)
  const key = BREVO_API_KEY;

  try{
    const resp = await fetch('https://api.brevo.com/v3/smtp/email',{
      method:'POST',
      headers:{'api-key':BREVO_API_KEY,'Content-Type':'application/json','Accept':'application/json'},
      body: JSON.stringify({
        sender:{name:FROM_NAME, email:FROM_EMAIL},
        to:[log.tenant_email],
        subject:`Quittance de loyer — ${monthName} ${year} — ${log.name}`,
        html: quittanceHtml
      })
    });
    if(resp.ok){
      alert(`✓ Quittance envoyée à ${log.tenant_email}`);
    } else {
      const err = await resp.json();
      alert(`Erreur envoi : ${err.message||'Vérifiez votre clé Resend'}`);
    }
  } catch(e){
    alert('Erreur réseau. Vérifiez votre connexion.');
  }
}

// Download quittance as HTML file (fallback)
function downloadQuittance(log, payment){
  const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const monthName=MONTHS[(payment?.month||1)-1];
  const loyer=payment?.montant||log.loyer_base||0;
  const charges=log.charges||0;
  const blob=new Blob([`<html><body><h1>Quittance ${monthName} ${payment?.year||new Date().getFullYear()}</h1><p>${log.name} — ${log.tenant}</p><p>Loyer: ${loyer}€ | Charges: ${charges}€ | Total: ${loyer+charges}€</p></body></html>`],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`quittance_${log.name.replace(/ /g,'_')}_${monthName}_${payment?.year||''}.html`;
  a.click();
}

// Cascade selectors for revenue modal
function revUpdateZone(){
  const propId=document.getElementById('m-rev-prop')?.value;
  const wrap=document.getElementById('m-rev-zone-wrap');
  const subWrap=document.getElementById('m-rev-sub-wrap');
  if(!wrap||!subWrap)return;
  if(!propId){wrap.style.display='none';subWrap.style.display='none';return;}
  const prop=S.topology.properties.find(p=>p.id===propId);
  const zones=prop?.zones||[];
  const sel=document.getElementById('m-rev-zone');
  sel.innerHTML='<option value="">— Bien entier —</option>'+zones.map(z=>`<option value="${z.id}">${z.name}</option>`).join('');
  wrap.style.display=zones.length>0?'':'none';
  subWrap.style.display='none';
}
function revUpdateSub(){
  const propId=document.getElementById('m-rev-prop')?.value;
  const zoneId=document.getElementById('m-rev-zone')?.value;
  const wrap=document.getElementById('m-rev-sub-wrap');
  if(!wrap)return;
  const prop=S.topology.properties.find(p=>p.id===propId);
  const zone=prop?.zones?.find(z=>z.id===zoneId);
  const subs=zone?.subZones||[];
  const sel=document.getElementById('m-rev-sub');
  if(sel) sel.innerHTML='<option value="">— Zone entière —</option>'+subs.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  wrap.style.display=subs.length>0?'':'none';
}

// Cascade selectors for work order
function woUpdateZone(){
  const propId = document.getElementById('m-wa-prop')?.value;
  const zoneWrap = document.getElementById('m-wa-zone-wrap');
  const subWrap = document.getElementById('m-wa-sub-wrap');
  const assetSel = document.getElementById('m-wa');
  if(!zoneWrap||!subWrap||!assetSel) return;
  subWrap.style.display='none';
  if(!propId||propId==='__other__'){
    zoneWrap.style.display='none';
    // Reset asset filter to all
    woFilterAssets(null, null);
    return;
  }
  const prop = S.topology.properties.find(p=>p.id===propId);
  if(!prop){zoneWrap.style.display='none';return;}
  const zones = prop.zones||[];
  const zoneSel = document.getElementById('m-wa-zone');
  zoneSel.innerHTML = '<option value="">— Sélectionner une zone —</option>' +
    zones.map(z=>`<option value="${z.id}">${z.name}</option>`).join('');
  zoneWrap.style.display = zones.length>0 ? '' : 'none';
  // Pre-filter assets to this property
  woFilterAssets(prop, null);
}

function woUpdateSubZone(){
  const propId = document.getElementById('m-wa-prop')?.value;
  const zoneId = document.getElementById('m-wa-zone')?.value;
  const subWrap = document.getElementById('m-wa-sub-wrap');
  if(!subWrap) return;
  const prop = S.topology.properties.find(p=>p.id===propId);
  const zone = prop?.zones?.find(z=>z.id===zoneId);
  if(!zone){subWrap.style.display='none'; woFilterAssets(prop,null); return;}
  const subs = zone.subZones||[];
  const subSel = document.getElementById('m-wa-sub');
  subSel.innerHTML = '<option value="">— Sélectionner une sous-zone —</option>' +
    subs.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  subWrap.style.display = subs.length>0 ? '' : 'none';
  woFilterAssets(prop, zone);
}

function woUpdateAsset(){
  const propId = document.getElementById('m-wa-prop')?.value;
  const zoneId = document.getElementById('m-wa-zone')?.value;
  const subId = document.getElementById('m-wa-sub')?.value;
  const prop = S.topology.properties.find(p=>p.id===propId);
  const zone = prop?.zones?.find(z=>z.id===zoneId);
  const sub = zone?.subZones?.find(s=>s.id===subId);
  woFilterAssets(prop, zone, sub);
}

function woFilterAssets(prop, zone, sub){
  const sel = document.getElementById('m-wa');
  if(!sel) return;
  const all = S.assets;

  // Collect relevant assetIds from selected nodes
  const relevant = new Set();
  if(sub?.assetId) relevant.add(sub.assetId);
  if(zone?.assetId) relevant.add(zone.assetId);
  if(prop?.assetId) relevant.add(prop.assetId);
  // Also add all assets from subzones/zones of selection
  if(zone){
    (zone.subZones||[]).forEach(s=>{if(s.assetId)relevant.add(s.assetId);});
    if(zone.assetId)relevant.add(zone.assetId);
  }
  if(prop){
    (prop.zones||[]).forEach(z=>{
      if(z.assetId)relevant.add(z.assetId);
      (z.subZones||[]).forEach(s=>{if(s.assetId)relevant.add(s.assetId);});
    });
    if(prop.assetId)relevant.add(prop.assetId);
  }

  // Build options — relevant first, then rest
  const relevantAssets = all.filter(a=>relevant.has(a.id));
  const otherGroups = {
    'Équipements': all.filter(a=>a.category==='Équipement'&&!relevant.has(a.id)),
    'Véhicules': all.filter(a=>a.category==='Véhicule'&&!relevant.has(a.id)),
    'Outillage': all.filter(a=>a.category==='Outillage'&&!relevant.has(a.id)),
    'Autres': all.filter(a=>!['Équipement','Véhicule','Outillage','Immobilier'].includes(a.category)&&!relevant.has(a.id)),
  };

  let html = '<option value="">— Sélectionner un équipement —</option>';
  if(relevantAssets.length>0){
    html += `<optgroup label="✓ Zones / équipements sélectionnés">${relevantAssets.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</optgroup>`;
  }
  Object.entries(otherGroups).filter(([,v])=>v.length>0).forEach(([label,items])=>{
    html += `<optgroup label="${label}">${items.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</optgroup>`;
  });
  sel.innerHTML = html;

  // Auto-select if only one relevant asset
  if(relevantAssets.length===1) sel.value = relevantAssets[0].id;
}

// Init
// Hamburger menu — handler permanent (survit aux re-renders)
document.addEventListener('click', function(e){
  const btn = e.target.closest('#btn-hamburger');
  const overlay = document.getElementById('sidebar-overlay');
  const sidebar = document.querySelector('.sidebar');
  if(btn && sidebar){
    sidebar.classList.toggle('open');
    if(overlay) overlay.classList.toggle('open');
    return;
  }
  // Fermer si clic sur l'overlay
  if(e.target.id==='sidebar-overlay' && sidebar){
    sidebar.classList.remove('open');
    if(overlay) overlay.classList.remove('open');
    return;
  }
  // Fermer si clic sur un nav-item sur mobile
  if(e.target.closest('[data-nav]') && window.innerWidth<=768 && sidebar){
    sidebar.classList.remove('open');
    if(overlay) overlay.classList.remove('open');
  }
});
