function renderFactures(){
  const fmt = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2}).format(n||0);
  const fTab = S.factTab||'liste';
  const year = S.factYear||(new Date().getFullYear());
  const YEARS = [year-1, year, year+1];

  const tabBar = `<div class="tab-bar">
    <div class="tab ${fTab==='liste'?'active':''}" data-fact-tab="liste">📋 Toutes</div>
    <div class="tab ${fTab==='savadur'?'active':''}" data-fact-tab="savadur">🏢 SAVADUR</div>
    <div class="tab ${fTab==='perso'?'active':''}" data-fact-tab="perso">🏠 Perso</div>
    <div class="tab ${fTab==='rapproch'?'active':''}" data-fact-tab="rapproch">🔍 Rapprochement</div>
  </div>`;

  const yearBar = `<div style="display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
    <span style="font-size:12px;color:var(--text2)">Année :</span>
    ${YEARS.map(y=>`<span class="pill ${year===y?'active':''}" data-fact-year="${y}">${y}</span>`).join('')}
    <span class="pill ${!S.factYear?'active':''}" data-fact-year="0">Tout</span>
    ${isAdmin()?`<button class="btn btn-p btn-sm" id="btn-add-facture" style="margin-left:auto">+ Facture</button>`:''}
    <button class="btn btn-sm" id="btn-export-factures">📥 Export Excel</button>
  </div>`;

  const CATS = ['Travaux/Réparation','Matériaux','Énergie','Téléphone/Internet','Assurance','Entretien','Abonnement','Autre'];

  let facts = S.factures.filter(f=>{
    if(S.factYear&&f.date&&!f.date.startsWith(String(S.factYear)))return false;
    if(fTab==='savadur')return f.compte==='savadur';
    if(fTab==='perso')return f.compte==='perso';
    if(fTab==='rapproch')return !f.rapproche;
    return true;
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const totalTTC = facts.reduce((s,f)=>s+parseFloat(f.montant_ttc||0),0);
  const nonRappr = facts.filter(f=>!f.rapproche).length;

  if(fTab==='rapproch'){
    return `${tabBar}${yearBar}
    ${nonRappr===0?`<div class="card" style="text-align:center;padding:30px;color:var(--green)">✅ Toutes les factures de la période sont rapprochées !</div>`:`
    <div class="card">
      <div class="sec">⚠ ${nonRappr} facture(s) non rapprochée(s) — à vérifier sur votre relevé bancaire</div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Date</th><th>Fournisseur</th><th>Description</th><th>Catégorie</th><th>Bien</th><th>Montant TTC</th><th>Compte</th><th>BT lié</th><th>✓</th></tr></thead>
        <tbody>
        ${facts.map(f=>{
          const wo=f.wo_id?S.workOrders.find(w=>w.id===f.wo_id):null;
          return `<tr style="background:var(--red-bg)">
            <td style="font-size:12px;white-space:nowrap">${dateLabel(f.date)}</td>
            <td style="font-weight:500;font-size:13px">${f.fournisseur||'—'} ${f.drive_url?`<a href="${f.drive_url}" target="_blank" style="font-size:10px;text-decoration:none;background:var(--bg2);border:0.5px solid var(--border);border-radius:4px;padding:1px 5px">📄 PJ</a>`:''}</td>
            <td style="font-size:12px;color:var(--text2)">${f.description||'—'}</td>
            <td><span class="badge bblue" style="font-size:10px">${f.categorie||'—'}</span></td>
            <td style="font-size:11px;color:var(--text2)">${f.bien||'—'}</td>
            <td style="font-weight:700;color:var(--red)">${fmt(f.montant_ttc)}</td>
            <td style="font-size:11px">${f.compte==='savadur'?'🏢 SAVADUR':'🏠 Perso'}</td>
            <td style="font-size:11px;color:var(--blue)">${wo?wo.title:'—'}</td>
            <td><button class="btn btn-sm btn-p" data-rapproche="${f.id}" title="Marquer rapproché">✓</button></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table></div>
    </div>`}`;
  }

  return `${tabBar}${yearBar}
  <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
    <div class="stat" style="flex:1"><div class="stat-l">Total ${fTab==='savadur'?'SAVADUR':fTab==='perso'?'Perso':'Factures'} ${S.factYear||''}</div><div class="stat-v" style="color:var(--red)">${fmt(totalTTC)}</div></div>
    <div class="stat" style="flex:1"><div class="stat-l">Non rapprochées</div><div class="stat-v" style="color:${nonRappr>0?'var(--amber)':'var(--green)'}">${nonRappr}</div></div>
    <div class="stat" style="flex:1"><div class="stat-l">Nb factures</div><div class="stat-v">${facts.length}</div></div>
  </div>
  <div class="card">
    <div style="overflow-x:auto"><table>
      <thead><tr>
        <th>Date</th><th>Fournisseur</th><th>Description</th><th>Catégorie</th>
        <th>Bien / BT</th><th>HT</th><th>TVA</th><th>TTC</th><th>Compte</th><th>✓</th><th></th>
      </tr></thead>
      <tbody>
      ${facts.length===0?'<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--text2)">Aucune facture. Cliquez "+ Facture" pour commencer.</td></tr>':''}
      ${facts.map(f=>{
        const wo=f.wo_id?S.workOrders.find(w=>w.id===f.wo_id):null;
        const rapBg=f.rapproche?'':'background:var(--amber-bg)';
        const driveIcon=f.drive_url?`<a href="${f.drive_url}" target="_blank" title="Voir la pièce jointe" style="text-decoration:none;background:var(--bg2);border:0.5px solid var(--border);border-radius:4px;padding:2px 6px;font-size:11px">📄 PJ</a>`:'';
        return `<tr style="${rapBg}">
          <td style="font-size:12px;white-space:nowrap">${dateLabel(f.date)}</td>
          <td style="font-weight:500;font-size:13px">${f.fournisseur||'—'} ${driveIcon}</td>
          <td style="font-size:12px;color:var(--text2);max-width:180px">${f.description||'—'}</td>
          <td><span class="badge bblue" style="font-size:10px">${f.categorie||'—'}</span></td>
          <td style="font-size:11px;color:var(--text2)">${f.bien||'—'}${wo?'<br><span style="color:var(--blue)">BT: '+wo.title+'</span>':''}</td>
          <td style="font-size:12px">${f.montant_ht?fmt(f.montant_ht):'—'}</td>
          <td style="font-size:12px;color:var(--amber)">${f.tva?fmt(f.tva):'—'}</td>
          <td style="font-weight:700;color:var(--red)">${fmt(f.montant_ttc)}</td>
          <td style="font-size:11px">${f.compte==='savadur'?'🏢':'🏠'}</td>
          <td>${f.rapproche?'<span style="color:var(--green);font-size:16px">✓</span>':`<button class="btn btn-sm" data-rapproche="${f.id}">○</button>`}</td>
          <td style="white-space:nowrap">
            ${canEdit()?`<button class="btn btn-sm" data-edit-fact="${f.id}">✎</button>`:''}
            ${isAdmin()?`<button class="btn btn-d btn-sm" data-del-fact="${f.id}">✕</button>`:''}
          </td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>
    <div style="display:flex;justify-content:flex-end;padding:10px 0;border-top:0.5px solid var(--border);font-weight:600">
      Total : <span style="color:var(--red);margin-left:8px">${fmt(totalTTC)}</span>
    </div>
  </div>`;
}

function renderCompteurs(){
  const cTab=S.cTab||'liste';
  const fmt=n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);
  const tabBar='<div class="tab-bar" style="margin-bottom:14px">'
    +'<div class="tab '+(cTab==='liste'?'active':'')+'" data-ctab="liste">Compteurs</div>'
    +'<div class="tab '+(cTab==='releves'?'active':'')+'" data-ctab="releves">Relev\u00e9s</div>'
    +'</div>';

  if(cTab==='liste'){
    const rows=(S.compteurs||[]).map(function(c){
      const tenant=c.tenant_id?S.tenants.find(t=>t.id===c.tenant_id):null;
      const lastRel=(S.releves||[]).filter(r=>r.compteur_id===c.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
      return '<div class="card" style="margin-bottom:10px">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'
          +'<div>'
            +'<div style="font-weight:600;font-size:14px">'+c.name+'</div>'
            +'<div style="font-size:12px;color:var(--text2)">'+(c.type||'')+' \u2014 '+(c.unite||'m\u00b3')+' \u2014 '+fmt(c.prix_unitaire||0)+'/'+( c.unite||'m\u00b3')+'</div>'
            +(tenant?'<div style="font-size:11px;color:var(--text2)">&#128100; '+(tenant.nom||'')+' \u2014 '+(tenant.logement||'')+'</div>':'')
          +'</div>'
          +'<div style="text-align:right">'
            +(lastRel?'<div style="font-size:12px">Dernier index : <strong>'+lastRel.nouvel_index+' '+(c.unite||'m\u00b3')+'</strong></div>':'<div style="font-size:12px;color:var(--text2)">Index initial : '+(c.index_initial||0)+'</div>')
            +(lastRel?'<div style="font-size:11px;color:var(--text2)">le '+dateLabel(lastRel.date)+'</div>':'')
            +'<div style="margin-top:6px;display:flex;gap:4px;justify-content:flex-end">'
              +(canEdit()?'<button class="btn btn-sm btn-p" data-add-releve="'+c.id+'">+ Relev\u00e9</button>':'')
              +(isAdmin()?'<button class="btn btn-sm" data-edit-cpt="'+c.id+'">&#9998;</button>':'')
              +(isAdmin()?'<button class="btn btn-d btn-sm" data-del-cpt="'+c.id+'">&#10005;</button>':'')
            +'</div>'
          +'</div>'
        +'</div>'
        +'</div>';
    }).join('');
    return tabBar
      +'<div style="display:flex;justify-content:flex-end;margin-bottom:12px">'
        +(isAdmin()?'<button class="btn btn-p" id="btn-add-cpt">+ Compteur</button>':'')
      +'</div>'
      +(rows||'<div style="text-align:center;padding:24px;color:var(--text2)">Aucun compteur configur\u00e9.</div>');
  }

  if(cTab==='releves'){
    const allReleves=(S.releves||[]).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const rows=allReleves.map(function(r){
      const cpt=(S.compteurs||[]).find(c=>c.id===r.compteur_id)||{};
      const tenant=cpt.tenant_id?S.tenants.find(t=>t.id===cpt.tenant_id):null;
      const conso=Math.round((r.nouvel_index-r.ancien_index)*1000)/1000;
      const montant=Math.round(conso*(r.prix_unitaire||cpt.prix_unitaire||0)*100)/100;
      const st=r.paye?'bgreen':r.facture_envoyee?'bblue':'bgray';
      const sl=r.paye?'✓ Acquittée':r.facture_envoyee?'&#128438; Facturée':'● En attente';
      return '<tr>'
        +'<td style="font-size:11px">'+dateLabel(r.date)+'</td>'
        +'<td style="font-size:12px">'+cpt.name+'</td>'
        +'<td style="font-size:11px;color:var(--text2)">'+(tenant?.nom||'—')+'</td>'
        +'<td style="text-align:right;font-size:11px">'+(r.ancien_index||0)+'</td>'
        +'<td style="text-align:right;font-size:11px;font-weight:500">'+r.nouvel_index+'</td>'
        +'<td style="text-align:right;font-size:11px">'+conso+' '+(cpt.unite||'m³')+'</td>'
        +'<td style="text-align:right;font-size:11px">'+fmt(montant)+'</td>'
        +'<td style="text-align:center"><span class="badge '+st+'" data-releve-status="'+r.id+'" style="cursor:pointer">'+sl+'</span></td>'
        +'</tr>';
    }).join('');;
    return tabBar
      +'<div class="card"><div style="overflow-x:auto"><table>'
        +'<thead><tr><th style="font-size:11px">Date</th><th style="font-size:11px">Compteur</th><th style="font-size:11px">Locataire</th><th style="font-size:11px;text-align:right">Ancien idx</th><th style="font-size:11px;text-align:right">Nouvel idx</th><th style="font-size:11px;text-align:right">Conso</th><th style="font-size:11px;text-align:right">Montant</th><th style="font-size:11px">Statut</th></tr></thead>'
        +'<tbody>'+(rows||'<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text2)">Aucun relev\u00e9</td></tr>')+'</tbody>'
      +'</table></div></div>';
  }

  return tabBar;
}

function renderFinances(){
  const fTab = S.finTab||'overview';
  const fmt = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n||0);
  const year = S.finYear||2026;

  // === COSTS: from work_orders only ===
  const isDubail=isDubailProfile();
  function dubailTenantFilter(t){
    if(!isDubail)return true;
    return dubailFilter(t.logement||'');
  }
  function getAllCosts(){
    return getFilteredWOs().filter(w=>{
      if(!(w.cost>0&&w.date&&w.date.startsWith(String(year))))return false;
      // getFilteredWOs already handles dubail asset filtering
      return true;
    });
  }
  function getCostsByType(){
    const res={};
    getAllCosts().forEach(w=>{
      const cat=w.category||'Autre';
      res[cat]=(res[cat]||0)+parseFloat(w.cost||0);
    });
    return res;
  }
  const totalCosts = getAllCosts().reduce((s,w)=>s+parseFloat(w.cost||0),0);

  // === REVENUES: from rent_payments ===
  const dubailTenantIds=isDubail?S.tenants.filter(t=>dubailFilter(t.logement||'')).map(t=>t.id):null;
  const yearPayments = S.rentPayments.filter(p=>p.paye&&p.annee===year&&(!dubailTenantIds||dubailTenantIds.includes(p.tenant_id)));
  const totalRevenues = yearPayments.reduce((s,p)=>s+(p.loyer||0),0);

  const typeColors={'Urgence':'#E24B4A','Réparation':'#BA7517','Amélioration':'#185FA5','Entretien':'#1D9E75','Remplacement':'#534AB7','Autre':'#888'};

  const tabBar = `<div class="tab-bar" style="margin-bottom:14px">
    <div class="tab ${fTab==='overview'?'active':''}" data-fin-tab="overview">Vue d'ensemble</div>
    <div class="tab ${fTab==='depenses'?'active':''}" data-fin-tab="depenses">Dépenses</div>
    <div class="tab ${fTab==='revenus'?'active':''}" data-fin-tab="revenus">Revenus locatifs</div>
    <div class="tab ${fTab==='factures'?'active':''}" data-fin-tab="factures">Factures</div>
  </div>`;

  const yearBar = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
    <span style="font-size:12px;color:var(--text2)">Année :</span>
    <span class="pill ${year===0?'active':''}" data-fin-year="0">Tout</span>
    ${[2024,2025,2026,2027].map(y=>`<span class="pill ${year===y?'active':''}" data-fin-year="${y}">${y}</span>`).join('')}
  </div>`;

  if(fTab==='overview'){
    const byType = getCostsByType();
    return `${tabBar}${yearBar}
    <div class="g4" style="margin-bottom:16px">
      <div class="stat"><div class="stat-l">Revenus locatifs ${year}</div><div class="stat-v" style="color:var(--green)">${fmt(totalRevenues)}</div></div>
      <div class="stat"><div class="stat-l">Dépenses (BT) ${year}</div><div class="stat-v" style="color:var(--red)">${fmt(totalCosts)}</div></div>
      <div class="stat"><div class="stat-l">Résultat net</div><div class="stat-v" style="color:${totalRevenues-totalCosts>=0?'var(--green)':'var(--red)'}">${fmt(totalRevenues-totalCosts)}</div></div>
      <div class="stat"><div class="stat-l">Bons de travaux</div><div class="stat-v">${S.workOrders.filter(w=>w.date&&w.date.startsWith(String(year))).length}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card">
        <div class="sec">Revenus par locataire — ${year}</div>
        ${S.tenants.filter(t=>t.actif!==false).map(t=>{
          const rev=yearPayments.filter(p=>p.tenant_id===t.id).reduce((s,p)=>s+(p.loyer||0),0);
          if(!rev) return '';
          return `<div class="row"><div class="fg"><div class="fgs" style="font-size:12px">${t.nom}</div><div class="fgsub">${t.logement||''}</div></div><span style="font-weight:500;color:var(--green)">${fmt(rev)}</span></div>`;
        }).join('')}
        <div style="display:flex;justify-content:space-between;padding-top:10px;border-top:0.5px solid var(--border);font-weight:500;margin-top:4px">
          <span>Total</span><span style="color:var(--green)">${fmt(totalRevenues)}</span>
        </div>
      </div>
      <div class="card">
        <div class="sec">Dépenses par type — ${year}</div>
        ${Object.entries(byType).sort((a,b)=>b[1]-a[1]).map(([type,val])=>{
          const pct=totalCosts>0?Math.round(val/totalCosts*100):0;
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
              <span style="font-weight:500">${type}</span>
              <span>${fmt(val)} <span style="color:var(--text3)">(${pct}%)</span></span>
            </div>
            <div style="height:6px;background:var(--bg3);border-radius:3px">
              <div style="height:100%;border-radius:3px;background:${typeColors[type]||'#888'};width:${pct}%"></div>
            </div>
          </div>`;
        }).join('')}
        ${Object.keys(byType).length===0?'<div style="font-size:12px;color:var(--text2)">Aucune dépense enregistrée pour '+year+'.</div>':''}
        <div style="display:flex;justify-content:space-between;padding-top:10px;border-top:0.5px solid var(--border);font-weight:500">
          <span>Total</span><span style="color:var(--red)">${fmt(totalCosts)}</span>
        </div>
      </div>
    </div>`;
  }

  if(fTab==='depenses'){
    const selLocDep=S.finLoc||'';
    const showPaidOnly=S.finPaidOnly!==false;
    const allWos=S.workOrders.filter(w=>{
      if(showPaidOnly&&!w.paid)return false;
      if(!w.cost>0)return false;
      if(year&&w.date&&!w.date.startsWith(String(year)))return false;
      if(!selLocDep)return true;
      const tr=w.topo_ref;
      if(!tr)return false;
      if(selLocDep.startsWith('prop_')){const p=S.topology.properties.find(x=>'prop_'+x.id===selLocDep);return p&&tr.propName===p.name;}
      if(selLocDep.startsWith('zone_')){const zId=selLocDep.replace('zone_','');let found=false;S.topology.properties.forEach(p=>(p.zones||[]).forEach(z=>{if(z.id===zId&&tr.zoneName===z.name)found=true;}));return found;}
      return true;
    }).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const finSub=S.finSub||'liste';
    const locBarDep=`<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;background:var(--bg2);padding:5px 10px;border-radius:var(--radius)">
        <input type="checkbox" id="fin-paid-only" ${showPaidOnly?'checked':''}>
        💰 Réglées uniquement
      </label>
      <label style="font-size:12px;color:var(--text2)">Lieu :</label>
      <select id="fin-loc-sel" style="padding:5px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:12px">
        <option value="">Tous les biens</option>
        ${(()=>{const opts=[];S.topology.properties.forEach(p=>{opts.push(`<option value="prop_${p.id}" ${selLocDep==='prop_'+p.id?'selected':''}>🏠 ${p.name}</option>`);(p.zones||[]).forEach(z=>{opts.push(`<option value="zone_${z.id}" ${selLocDep==='zone_'+z.id?'selected':''}>&nbsp;&nbsp;📁 ${p.name} › ${z.name}</option>`);});});return opts.join('');})()}
      </select>
    </div>`;
    const subBar=`<div class="tab-bar" style="margin-bottom:12px">
      <div class="tab ${finSub==='liste'?'active':''}" data-fin-sub="liste">Liste détaillée</div>
      <div class="tab ${finSub==='bien'?'active':''}" data-fin-sub="bien">Par bien</div>
      <div class="tab ${finSub==='zone'?'active':''}" data-fin-sub="zone">Par zone</div>
      <div class="tab ${finSub==='equipement'?'active':''}" data-fin-sub="equipement">Par équipement</div>
      <div class="tab ${finSub==='categorie'?'active':''}" data-fin-sub="categorie">Par catégorie</div>
    </div>`;
    const totalDep=allWos.reduce((s,w)=>s+parseFloat(w.cost||0),0);

    if(finSub==='liste'){
      return `${tabBar}${yearBar}${locBarDep}${subBar}
      <div class="card"><div style="overflow-x:auto"><table>
        <thead><tr><th>Bon de travaux</th><th>Bien / Zone</th><th>Équipement</th><th>Date</th><th>Cat.</th><th>Coût</th></tr></thead>
        <tbody>
        ${allWos.map(w=>{
          const asset=S.assets.find(a=>a.id===w.asset_id);
          const tr=w.topo_ref;
          const bien=tr?.propName||'—';
          const zone=tr?[tr.zoneName,tr.subName].filter(Boolean).join(' › '):'';
          return `<tr>
            <td style="font-weight:500;font-size:13px">${w.title}</td>
            <td style="font-size:11px;color:var(--text2)">${bien}${zone?'<br><span style="color:var(--text3)">'+zone+'</span>':''}</td>
            <td style="font-size:11px;color:var(--text2)">${asset?.name||'—'}</td>
            <td style="font-size:11px">${dateLabel(w.date)}</td>
            <td><span class="badge ${w.category==='Urgence'?'bred':w.category==='Réparation'?'bamber':'bblue'}" style="font-size:10px">${w.category||'—'}</span></td>
            <td style="font-weight:600;color:var(--red);white-space:nowrap">${fmt(w.cost)}</td>
          </tr>`;
        }).join('')}
        ${allWos.length===0?'<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text2)">Aucune dépense enregistrée.</td></tr>':''}
        </tbody>
      </table></div>
      <div style="display:flex;justify-content:flex-end;padding:10px 0;border-top:0.5px solid var(--border);font-weight:600">Total : <span style="color:var(--red);margin-left:8px">${fmt(totalDep)}</span></div></div>`;
    }

    // Grouping function
    const groupBy=(fn,label)=>{
      const groups={};
      allWos.forEach(w=>{const k=fn(w);if(!groups[k])groups[k]=[];groups[k].push(w);});
      const sorted=Object.entries(groups).sort((a,b)=>b[1].reduce((s,w)=>s+parseFloat(w.cost||0),0)-a[1].reduce((s,w)=>s+parseFloat(w.cost||0),0));
      return `${tabBar}${yearBar}${locBarDep}${subBar}
      <div class="card"><div style="overflow-x:auto"><table>
        <thead><tr><th>${label}</th><th>Nb BT</th><th>Total dépenses</th><th>% du total</th></tr></thead>
        <tbody>
        ${sorted.map(([k,ws])=>{
          const tot=ws.reduce((s,w)=>s+parseFloat(w.cost||0),0);
          const pct=totalDep>0?Math.round(tot/totalDep*100):0;
          return `<tr>
            <td style="font-weight:500">${k||'Non défini'}</td>
            <td style="text-align:center">${ws.length}</td>
            <td style="font-weight:600;color:var(--red)">${fmt(tot)}</td>
            <td>
              <div style="display:flex;align-items:center;gap:6px">
                <div style="flex:1;background:var(--bg2);border-radius:99px;height:6px">
                  <div style="background:var(--red);height:100%;border-radius:99px;width:${pct}%"></div>
                </div>
                <span style="font-size:11px;color:var(--text2);min-width:32px">${pct}%</span>
              </div>
            </td>
          </tr>`;
        }).join('')}
        </tbody>
      </table></div>
      <div style="display:flex;justify-content:flex-end;padding:10px 0;font-weight:600">Total : <span style="color:var(--red);margin-left:8px">${fmt(totalDep)}</span></div>`;
    };

    if(finSub==='bien') return groupBy(w=>{const tr=w.topo_ref;const a=S.assets.find(x=>x.id===w.asset_id);return tr?.propName||a?.name||'—';},'Bien immobilier');
    if(finSub==='zone') return groupBy(w=>{const tr=w.topo_ref;return tr?([tr.propName,tr.zoneName,tr.subName].filter(Boolean).join(' › ')):S.assets.find(a=>a.id===w.asset_id)?.name||'—';},'Zone / Sous-zone');
    if(finSub==='equipement') return groupBy(w=>S.assets.find(a=>a.id===w.asset_id)?.name||'—','Équipement');
    if(finSub==='categorie') return groupBy(w=>w.category||'—','Catégorie');
    return '';
  }

  if(fTab==='factures'){
    const subCpte=S.finFactCpte||'savadur';
    const cpteLabels={'savadur':'Savadur (Dubail)','perso':'Perso'};
    const color={'savadur':'#185FA5','perso':'#1D9E75'}[subCpte];
    const subBar='<div style="display:flex;gap:6px;margin-bottom:14px">'+['savadur','perso'].map(c=>'<button class="btn btn-sm '+(subCpte===c?'btn-p':'')+'" data-fin-cpte="'+c+'">'+cpteLabels[c]+'</button>').join('')+'</div>';
    const facts=S.factures.filter(f=>f.compte===subCpte&&(year===0||!year||(f.date||'').startsWith(String(year))));
    // Use topology property names for grouping - match by prefix (case-insensitive)
    const tProps=S.topology.properties.map(p=>p.name);
    function matchProp(bien){
      if(!bien)return 'Non class\u00e9';
      // Try exact match first
      if(tProps.find(p=>p.toLowerCase()===bien.toLowerCase()))return tProps.find(p=>p.toLowerCase()===bien.toLowerCase());
      // Try prefix match (bien starts with prop name)
      const matched=tProps.find(p=>bien.toLowerCase().startsWith(p.toLowerCase()));
      if(matched)return matched;
      // Extract before separator
      const sep=bien.includes(' \u2014 ')?' \u2014 ':bien.includes(' - ')?' - ':null;
      if(sep){const prefix=bien.split(sep)[0].trim();const m2=tProps.find(p=>p.toLowerCase()===prefix.toLowerCase());if(m2)return m2;}
      return bien.split(' - ')[0].split(' \u2014 ')[0].trim()||'Non class\u00e9';
    }
    function extractZone(bien,prop){
      if(!bien||!prop)return '';
      const lc=bien.toLowerCase();const lp=prop.toLowerCase();
      if(lc===lp)return '';
      // Remove property prefix
      let rest=bien;
      if(lc.startsWith(lp))rest=bien.slice(prop.length).trim();
      // Remove leading separator
      if(rest.startsWith(' \u2014 '))rest=rest.slice(3).trim();
      else if(rest.startsWith(' - '))rest=rest.slice(3).trim();
      else if(rest.startsWith('-'))rest=rest.slice(1).trim();
      return rest;
    }
    // Group by topology property then zone
    const propMap={};
    facts.forEach(function(f){
      const prop=matchProp(f.bien);
      const zone=extractZone(f.bien,prop)||'G\u00e9n\u00e9ral';
      if(!propMap[prop])propMap[prop]={};
      if(!propMap[prop][zone])propMap[prop][zone]=[];
      propMap[prop][zone].push(f);
    });
    // Order properties by topology order
    const orderedProps=[...tProps.filter(p=>propMap[p]),...Object.keys(propMap).filter(p=>!tProps.includes(p)).sort()];
    const THEAD='<thead><tr><th style="font-size:10px">Date</th><th style="font-size:10px">Fournisseur</th><th style="font-size:10px">Description</th><th style="font-size:10px">Cat.</th><th style="font-size:10px;text-align:right">TTC</th><th></th></tr></thead>';
    function factRow(f){
      return '<tr><td style="font-size:11px;white-space:nowrap">'+dateLabel(f.date)+'</td>'
        +'<td style="font-size:12px">'+f.fournisseur+'</td>'
        +'<td style="font-size:11px;color:var(--text2)">'+(f.description||'')+'</td>'
        +'<td><span class="badge bgray" style="font-size:9px">'+(f.categorie||'')+'</span></td>'
        +'<td style="text-align:right;font-weight:500">'+fmt(f.montant_ttc||0)+'</td>'
        +(isAdmin()?'<td><button class="btn btn-d btn-sm" data-del-facture="'+f.id+'" style="font-size:10px;padding:2px 5px">&#10005;</button></td>':'<td></td>')
        +'</tr>';
    }
    const bHtml=orderedProps.map(function(prop){
      const zones=propMap[prop];
      const propTotal=Object.values(zones).flat().reduce((s,f)=>s+(f.montant_ttc||0),0);
      // Order: Général first, then alphabetical
      const orderedZones=['G\u00e9n\u00e9ral',...Object.keys(zones).filter(z=>z!=='G\u00e9n\u00e9ral').sort()];
      const zonesHtml=orderedZones.filter(z=>zones[z]).map(function(zone){
        const zF=[...zones[zone]].sort((a,b)=>(a.date||'')>(b.date||'')?1:-1);
        const zT=zF.reduce((s,f)=>s+(f.montant_ttc||0),0);
        return '<div style="margin-bottom:14px">'
          +'<div style="display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--text2);padding:4px 0;margin-bottom:4px;border-bottom:1px dashed var(--border)">'
            +'<span>'+zone+'</span><span>'+fmt(zT)+'</span>'
          +'</div>'
          +'<div style="overflow-x:auto"><table style="min-width:450px">'+THEAD+'<tbody>'+zF.map(factRow).join('')+'</tbody></table></div>'
          +'</div>';
      }).join('');
      return '<div class="card" style="margin-bottom:16px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;margin-bottom:12px;border-bottom:2px solid '+color+'">'
          +'<div style="font-size:14px;font-weight:700;color:'+color+'">&#127968; '+prop+'</div>'
          +'<div style="font-size:13px;font-weight:700">'+fmt(propTotal)+'</div>'
        +'</div>'
        +zonesHtml
        +'</div>';
    }).join('');
    const gT=facts.reduce((s,f)=>s+(f.montant_ttc||0),0);
    return tabBar+yearBar+subBar
      +(bHtml||'<div style="text-align:center;padding:24px;color:var(--text2)">Aucune facture pour ce compte en '+(year||'cette p\u00e9riode')+'</div>')
      +'<div class="card" style="background:var(--bg2)"><div style="display:flex;justify-content:space-between;font-weight:700"><span>TOTAL '+cpteLabels[subCpte]+(year?' '+year:'')+'</span><span>'+fmt(gT)+'</span></div></div>';
  }


  if(fTab==='revenus'){
    const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    const colors=['#185FA5','#1D9E75','#9B59B6','#E67E22','#E74C3C','#2ECC71','#3498DB','#F39C12'];
    const allTenants=S.tenants.filter(function(t){return t.actif!==false&&(!isDubail||dubailFilter(t.logement||''));});
    const allPmts=S.rentPayments.filter(function(p){return p.annee===year;});

    const visProps=isDubail?S.topology.properties.filter(p=>dubailFilter(p.name)):S.topology.properties;
    const propBlocks=visProps.map(function(prop,pi){
      const propTenants=allTenants.filter(function(t){
        return (t.logement||'').toLowerCase().startsWith(prop.name.toLowerCase());
      });
      if(!propTenants.length) return '';
      const color=colors[pi%colors.length];
      const propPmts=allPmts.filter(function(p){
        return propTenants.some(function(t){return t.id===p.tenant_id;});
      });
      const percu=propPmts.filter(function(p){return p.paye;}).reduce(function(s,p){return s+(p.loyer||0);},0);
      const attendu=propTenants.reduce(function(s,t){return s+(t.loyer_ref||0)*12;},0);
      const taux=attendu>0?Math.round(percu/attendu*100):0;

      const rows=propTenants.map(function(t){
        const monthly=MONTHS.map(function(m){
          const p=propPmts.find(function(x){return x.tenant_id===t.id&&x.mois===m;});
          return p&&p.paye?p.loyer||0:0;
        });
        const total=monthly.reduce(function(s,v){return s+v;},0);
        if(!total&&!t.loyer_ref) return '';
        const badge=t.type_bail==='commercial'
          ?'<span class="badge bblue" style="font-size:10px">Com.</span>'
          :'<span class="badge bgreen" style="font-size:10px">Hab.</span>';
        const logStr=t.logement||'';
        const sep=logStr.includes(' — ')?' — ':' - ';
        const zone=logStr.includes(sep)?logStr.split(sep).slice(1).join(sep):'';
        return '<tr>'
          +'<td style="font-size:12px;color:var(--text2)">'+zone+'</td>'
          +'<td style="font-size:12px;font-weight:500">'+t.nom+'</td>'
          +'<td>'+badge+'</td>'
          +'<td style="font-size:12px;text-align:right">'+fmt(t.loyer_ref||0)+'</td>'
          +monthly.map(function(v){
            return '<td style="font-size:11px;text-align:right;padding:4px 3px;color:'+(v>0?'var(--green)':'var(--text3)')+'">'+(v>0?v.toFixed(0):'—')+'</td>';
          }).join('')
          +'<td style="font-weight:600;color:var(--green)">'+fmt(total)+'</td>'
          +'</tr>';
      }).join('');

      const totalRow='<tr style="border-top:2px solid var(--border);font-weight:600;background:var(--bg2)">'
        +'<td colspan="3">Total</td>'
        +'<td style="text-align:right;font-size:12px">'+fmt(attendu/12)+'/mois</td>'
        +MONTHS.map(function(m){
          const v=propPmts.filter(function(p){return p.paye&&p.mois===m;}).reduce(function(s,p){return s+(p.loyer||0);},0);
          return '<td style="font-size:11px;text-align:right;padding:4px 3px">'+(v>0?v.toFixed(0):'—')+'</td>';
        }).join('')
        +'<td style="color:var(--green)">'+fmt(percu)+'</td>'
        +'</tr>';

      const icon=isDubailProfile()?'&#127970;':'&#127968;';
      return '<div class="card" style="margin-bottom:16px">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid '+color+';flex-wrap:wrap;gap:8px">'
          +'<div style="font-size:13px;font-weight:600;color:'+color+'">'
            +icon+' '+prop.name+' — '+propTenants.length+' locataire'+(propTenants.length>1?'s':'')
          +'</div>'
          +'<div style="display:flex;gap:16px;font-size:12px;flex-wrap:wrap">'
            +'<span>Perçu : <strong style="color:var(--green)">'+fmt(percu)+'</strong></span>'
            +'<span>Attendu : <strong>'+fmt(attendu)+'</strong></span>'
            +'<span>Taux : <strong style="color:'+(taux>=90?'var(--green)':taux>=70?'var(--amber)':'var(--red)')+'">'+taux+'%</strong></span>'
          +'</div>'
        +'</div>'
        +'<div style="overflow-x:auto"><table>'
          +'<thead><tr>'
            +'<th style="font-size:11px">Zone</th>'
            +'<th style="font-size:11px">Locataire</th>'
            +'<th style="font-size:11px">Type</th>'
            +'<th style="font-size:11px;text-align:right">Réf.</th>'
            +MONTHS.map(function(m){return '<th style="font-size:10px;padding:4px 3px">'+m.slice(0,3)+'</th>';}).join('')
            +'<th style="font-size:11px">Total</th>'
          +'</tr></thead>'
          +'<tbody>'+rows+totalRow+'</tbody>'
        +'</table></div>'
        +'</div>';
    }).join('');

    const grandTotal=allPmts.filter(function(p){return p.paye;}).reduce(function(s,p){return s+(p.loyer||0);},0);
    return tabBar+yearBar
      +(propBlocks||'<div style="padding:20px;text-align:center;color:var(--text2)">Aucun locataire actif</div>')
      +'<div class="card" style="background:var(--bg2)">'
        +'<div style="display:flex;justify-content:space-between;font-weight:600;font-size:14px">'
          +'<span>TOTAL GÉNÉRAL '+year+'</span>'
          +'<span style="color:var(--green)">'+fmt(grandTotal)+'</span>'
        +'</div>'
      +'</div>'
      +(function(){
        const MONTHS=['Janvier','F\u00e9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00fbt','Septembre','Octobre','Novembre','D\u00e9cembre'];
        // Loc courte durée only visible for non-dubail users
        if(isDubail)return '';
        const resas=(S.reservations||[]).filter(function(r){
          return r.statut!=='ferme'&&r.montant_total&&(year===0||(r.date_arrivee||'').startsWith(String(year)));
        });
        function revenusNets(r){
          const src=r.source||'lodgify';
          if(src==='airbnb') return (r.montant_total||0)-(r.frais_menage||0);
          if(src==='booking') return (r.montant_total||0)-(r.taxe_sejour||0)-(r.frais_resa||0)-(r.frais_menage||0);
          return r.montant_nuits||0; // lodgify
        }
        function meubleTable(room,label){
          const items=resas.filter(function(r){return r.room===room;});
          if(!items.length) return '';
          const byMonth={};
          items.forEach(function(r){
            const mo=r.date_arrivee?parseInt(r.date_arrivee.split('-')[1])-1:0;
            if(!byMonth[mo])byMonth[mo]={resas:0,nuits:0,rev:0,menage:0};
            byMonth[mo].resas++;
            byMonth[mo].nuits+=(r.nb_nuits||0);
            byMonth[mo].rev+=revenusNets(r);
            if(r.menage_prestataire!==false)byMonth[mo].menage+=(r.frais_menage||0);
          });
          const totalRev=items.reduce(function(s,r){return s+revenusNets(r);},0);
          const totalMenage=items.filter(function(r){return r.menage_prestataire!==false;}).reduce(function(s,r){return s+(r.frais_menage||0);},0);
          const rows=MONTHS.map(function(m,i){
            const d=byMonth[i];
            if(!d)return '';
            return '<tr>'
              +'<td style="font-size:12px">'+m+'</td>'
              +'<td style="text-align:center;font-size:12px">'+d.resas+'</td>'
              +'<td style="text-align:center;font-size:12px">'+d.nuits+'</td>'
              +'<td style="text-align:right;color:var(--green);font-size:12px">'+fmt(d.rev)+'</td>'
              +'<td style="text-align:right;color:var(--amber);font-size:12px">'+(d.menage?fmt(d.menage):'—')+'</td>'
              +'<td style="text-align:right;font-weight:600;font-size:12px">'+fmt(d.rev+(d.menage||0))+'</td>'
              +'</tr>';
          }).join('');
          return '<div class="card" style="margin-bottom:16px">'
            +'<div style="display:flex;justify-content:space-between;padding-bottom:8px;margin-bottom:10px;border-bottom:2px solid #9B59B6">'
              +'<div style="font-size:14px;font-weight:700;color:#9B59B6">&#127968; Location meublée — '+label+'</div>'
              +'<div style="font-size:12px;color:var(--text2)">'+items.length+' résa · '+fmt(totalRev)+' nuits · '+fmt(totalMenage)+' ménage</div>'
            +'</div>'
            +'<div style="overflow-x:auto"><table style="min-width:500px">'
              +'<thead><tr>'
                +'<th style="font-size:10px">Mois</th>'
                +'<th style="font-size:10px;text-align:center">Résa</th>'
                +'<th style="font-size:10px;text-align:center">Nuits</th>'
                +'<th style="font-size:10px;text-align:right">Rev. nuits</th>'
                +'<th style="font-size:10px;text-align:right">Ménage presta</th>'
                +'<th style="font-size:10px;text-align:right">Total encaissé</th>'
              +'</tr></thead>'
              +'<tbody>'+rows+'</tbody>'
              +'<tfoot><tr style="border-top:2px solid var(--border);font-weight:600;background:var(--bg2)">'
                +'<td colspan="3">Total '+year+'</td>'
                +'<td style="text-align:right;color:var(--green)">'+fmt(totalRev)+'</td>'
                +'<td style="text-align:right;color:var(--amber)">'+fmt(totalMenage)+'</td>'
                +'<td style="text-align:right">'+fmt(totalRev+totalMenage)+'</td>'
              +'</tr></tfoot>'
            +'</table></div>'
          +'</div>';
        }
        const studioBlock=meubleTable('Studio','Studio (Rue Calvin)');
        const t2Block=meubleTable('T2','T2 (Rue Calvin)');
        if(!studioBlock&&!t2Block)return '';
        return '<div style="margin-top:20px">'
          +'<div style="font-size:15px;font-weight:700;margin-bottom:12px;color:#9B59B6">&#127968; Location courte durée — Rue CALVIN</div>'
          +studioBlock+t2Block
        +'</div>';
      }());

  }

  if(fTab==='membres'){
    return `${tabBar}
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <button class="btn btn-p" id="btn-add-membre">+ Membre</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
      ${membres.map(m=>{
        const events = (m.events||[]).filter(e=>!e.done).sort((a,b)=>new Date(a.date)-new Date(b.date));
        const nextEvent = events[0];
        const daysNext = nextEvent?daysUntil(nextEvent.date):null;
        const docs = m.docs||[];
        const expiring = docs.filter(d=>d.date_expiry&&daysUntil(d.date_expiry)<=90&&daysUntil(d.date_expiry)>=0);
        const expired = docs.filter(d=>d.date_expiry&&daysUntil(d.date_expiry)<0);
        return `<div class="card" style="padding:14px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:40px;height:40px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0">
                ${m.prenom?m.prenom[0].toUpperCase():'?'}
              </div>
              <div>
                <div style="font-size:15px;font-weight:600">${m.prenom} ${m.nom||''}</div>
                <div style="font-size:11px;color:var(--text2)">${m.relation||''} ${m.naissance?'· né(e) le '+dateLabel(m.naissance):''}</div>
              </div>
            </div>
            <div style="display:flex;gap:4px">
              <button class="btn btn-sm" data-edit-membre="${m.id}">✎</button>
              <button class="btn btn-d btn-sm" data-del-membre="${m.id}">✕</button>
            </div>
          </div>
          ${nextEvent?`<div style="background:var(--bg2);border-radius:var(--radius);padding:8px 10px;margin-bottom:8px;font-size:12px">
            <div style="font-weight:500">📅 Prochain : ${nextEvent.titre}</div>
            <div style="color:var(--text2)">${dateLabel(nextEvent.date)} <span class="badge ${urgencyColor(daysNext)}" style="font-size:10px">${daysNext!==null?(daysNext<0?'Passé':daysNext===0?"Aujourd\'hui":'Dans '+daysNext+'j'):'—'}</span></div>
          </div>`:''}
          ${expired.length>0?`<div style="font-size:11px;color:var(--red);margin-bottom:4px">⚠ ${expired.length} document(s) expiré(s)</div>`:''}
          ${expiring.length>0?`<div style="font-size:11px;color:var(--amber);margin-bottom:4px">⚠ ${expiring.length} document(s) expire(nt) bientôt</div>`:''}
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
            <button class="btn btn-sm btn-p" data-membre-events="${m.id}">📅 Événements (${(m.events||[]).length})</button>
            <button class="btn btn-sm" data-membre-docs="${m.id}">📄 Documents (${docs.length})</button>
          </div>
        </div>`;
      }).join('')}
      ${membres.length===0?`<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text2)">
        <div style="font-size:32px;margin-bottom:12px">👨‍👩‍👧‍👦</div>
        <div style="font-size:14px;font-weight:500;margin-bottom:6px">Aucun membre</div>
        <div style="font-size:12px">Ajoutez les membres de votre famille pour suivre leurs documents et rendez-vous</div>
        <button class="btn btn-p" style="margin-top:14px" id="btn-add-membre2">+ Ajouter un membre</button>
      </div>`:''}
    </div>`;
  }

  if(fTab==='agenda'){
    // Tous les événements de tous les membres
    const allEvents = [];
    membres.forEach(m=>(m.events||[]).forEach(e=>allEvents.push({...e,membreId:m.id,membreNom:m.prenom+' '+(m.nom||'')})));
    allEvents.sort((a,b)=>new Date(a.date)-new Date(b.date));
    const upcoming = allEvents.filter(e=>!e.done&&new Date(e.date)>=new Date(today.toDateString()));
    const past = allEvents.filter(e=>e.done||new Date(e.date)<new Date(today.toDateString()));
    return `${tabBar}
    <div class="card">
      <div class="sec">À venir</div>
      ${upcoming.length===0?'<div style="font-size:12px;color:var(--text2);padding:10px 0">Aucun événement à venir.</div>':''}
      ${upcoming.map(e=>{
        const days=daysUntil(e.date);
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)">
          <div style="width:36px;height:36px;border-radius:8px;background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
            <div style="font-size:10px;color:var(--text2)">${new Date(e.date).toLocaleDateString('fr-FR',{month:'short'})}</div>
            <div style="font-size:14px;font-weight:700">${new Date(e.date).getDate()}</div>
          </div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500">${e.titre}</div>
            <div style="font-size:11px;color:var(--text2)">${e.membreNom} ${e.lieu?'· '+e.lieu:''}</div>
          </div>
          <span class="badge ${urgencyColor(days)}">${days===0?"Auj.":days+'j'}</span>
        </div>`;
      }).join('')}
      ${past.length>0?`<div class="sec" style="margin-top:16px">Passés</div>
      ${past.slice(0,5).map(e=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);opacity:0.6">
        <div style="font-size:12px;color:var(--text2);min-width:60px">${dateLabel(e.date)}</div>
        <div style="flex:1;font-size:12px">${e.titre} — ${e.membreNom}</div>
        <span class="badge bgray">Passé</span>
      </div>`).join('')}`:''}
    </div>`;
  }

  if(fTab==='docs'){
    const allDocs = [];
    membres.forEach(m=>(m.docs||[]).forEach(d=>allDocs.push({...d,membreId:m.id,membreNom:m.prenom+' '+(m.nom||'')})));
    allDocs.sort((a,b)=>{
      const da=daysUntil(a.expiry), db=daysUntil(b.expiry);
      if(da===null) return 1; if(db===null) return -1;
      return da-db;
    });
    return `${tabBar}
    <div class="card"><div style="overflow-x:auto"><table>
      <thead><tr><th>Document</th><th>Membre</th><th>N°</th><th>Délivré le</th><th>Expire le</th><th>Statut</th></tr></thead>
      <tbody>
      ${allDocs.map(d=>{
        const days=daysUntil(d.date_expiry);
        return `<tr>
          <td style="font-weight:500">${d.type}</td>
          <td style="font-size:12px">${d.membreNom}</td>
          <td style="font-size:11px;font-family:monospace">${d.numero||'—'}</td>
          <td style="font-size:12px">${d.delivre?dateLabel(d.delivre):'—'}</td>
          <td style="font-size:12px">${d.date_expiry?dateLabel(d.date_expiry):'—'}</td>
          <td><span class="badge ${urgencyColor(days)}">${days===null?'—':days<0?'Expiré':days<=30?'Dans '+days+'j':days<=90?'Dans '+days+'j':'Valide'}</span></td>
        </tr>`;
      }).join('')}
      ${allDocs.length===0?'<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text2)">Aucun document enregistré.</td></tr>':''}
      </tbody>
    </table></div></div>`;
  }
  return '';
}

function renderFamille(){
  const membres=S.famille||[];
  const fTab=S.familleTab||'membres';
  const today=new Date();
  const fmt2=(n)=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2}).format(n||0);

  // Tab bar
  const tabBar='<div class="tab-bar" style="margin-bottom:14px">'
    +'<div class="tab '+(fTab==='membres'?'active':'')+'" data-ftab="membres">&#128100; Membres</div>'
    +'<div class="tab '+(fTab==='creche'?'active':'')+'" data-ftab="creche">&#128118; Cr\u00e8che</div>'
    +'<div class="tab '+(fTab==='ecole'?'active':'')+'" data-ftab="ecole">&#127979; \u00c9cole</div>'
    +'</div>';

  // ===== MEMBRES =====
  if(fTab==='membres'){
    function memberCard(mb){
      const docs=mb.documents||[];
      const events=mb.events||[];
      const expiring=docs.filter(function(d){
        if(!d.date_expiry)return false;
        const days=Math.ceil((new Date(d.date_expiry)-today)/86400000);
        return days>=0&&days<=90;
      }).length;
      const expired=docs.filter(function(d){return d.date_expiry&&new Date(d.date_expiry)<today;}).length;
      const upcoming=events.filter(function(e){
        if(!e.date)return false;
        const days=Math.ceil((new Date(e.date)-today)/86400000);
        return days>=0&&days<=30;
      }).length;
      return '<div class="card">'
        +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">'
          +(mb.photo_url?'<img src="'+mb.photo_url+'" style="width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0">'
            :'<div style="width:48px;height:48px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">&#128100;</div>')
          +'<div style="flex:1;min-width:0">'
            +'<div style="font-weight:600;font-size:14px">'+(mb.prenom||'')+' '+(mb.nom||'')+'</div>'
            +'<div style="font-size:11px;color:var(--text2)">'+(mb.relation||'')+(mb.naissance?' &middot; n&eacute;(e) le '+dateLabel(mb.naissance):'')+'</div>'
          +'</div>'
          +(isAdmin()?'<button class="btn btn-sm" data-edit-membre="'+mb.id+'" style="flex-shrink:0">&#9998;</button>'
            +'<button class="btn btn-d btn-sm" data-del-membre="'+mb.id+'" style="flex-shrink:0" title="Supprimer">&#10005;</button>':'')
        +'</div>'
        +(mb.notes?'<div style="font-size:12px;color:var(--text2);margin-bottom:8px;padding:6px 8px;background:var(--bg2);border-radius:4px">'+mb.notes+'</div>':'')
        +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
          +'<button class="btn btn-sm btn-p" data-view-docs="'+mb.id+'" style="flex:1;min-width:100px">'
            +'&#128196; Docs ('+docs.length+')'
            +(expired?'<span class="badge bred" style="font-size:9px;margin-left:4px">'+expired+'</span>':'')
            +(expiring?'<span class="badge bamber" style="font-size:9px;margin-left:4px">'+expiring+'</span>':'')
          +'</button>'
          +'<button class="btn btn-sm" data-view-events="'+mb.id+'" style="flex:1;min-width:100px">'
            +'&#128197; RDV ('+events.length+')'
            +(upcoming?'<span class="badge bblue" style="font-size:9px;margin-left:4px">'+upcoming+'</span>':'')
          +'</button>'
        +'</div>'
        +'</div>';
    }
    const cards=membres.map(memberCard).join('');
    const empty=membres.length===0?'<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text2)">Aucun membre. Cliquez + Membre pour ajouter.</div>':'';
    return tabBar
      +'<div style="display:flex;justify-content:flex-end;margin-bottom:12px">'+(isAdmin()?'<button class="btn btn-p" id="btn-add-membre">+ Membre</button>':'')+'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">'+empty+cards+'</div>';
  }

  // ===== CRÈCHE / ÉCOLE - enfant selector =====
  // Filter by type_membre field
  const enfants=membres.filter(function(m){
    if(fTab==='creche') return m.type_membre==='creche';
    if(fTab==='ecole') return m.type_membre==='ecole';
    return false;
  });
  const selEnfantId=S.familleEnfant||(enfants[0]?.id||null);
  const selEnfant=enfants.find(m=>m.id===selEnfantId)||enfants[0]||null;

  // Sub-tabs: one per child + add button
  const enfantBar=enfants.length===0?'':
    '<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)">'
    +enfants.map(function(m){
      const isActive=m.id===selEnfantId;
      return '<span style="display:inline-flex;align-items:center;gap:0">'
        +'<button class="btn btn-sm'+(isActive?' btn-p':'')+'" data-sel-enfant="'+m.id+'" style="'+(isActive?'border-radius:6px 0 0 6px':'background:var(--bg2);border-radius:6px 0 0 6px')+'">'
          +(m.prenom||m.nom||'Enfant')
        +'</button>'
        +(isAdmin()?'<button class="btn btn-d btn-sm" data-del-enfant-tab="'+m.id+'" title="Retirer de crèche/école" style="border-radius:0 6px 6px 0;padding:4px 6px;font-size:10px;margin-left:1px">&#10005;</button>':'')
        +'</span>';
    }).join('')
    +(isAdmin()?'<button class="btn btn-sm" id="btn-add-enfant" title="Ajouter un membre depuis Famille" style="border:1.5px dashed var(--border2);background:transparent;color:var(--text2)">+ Membre</button>':'')
    +'</div>';

  if(!selEnfant){
    const tabLabel=fTab==='creche'?'crèche':'l\'école';
    return tabBar
      +'<div style="text-align:center;padding:30px;color:var(--text2)">'
      +'<div style="font-size:14px;margin-bottom:8px">Aucun membre configuré pour '+tabLabel+'.</div>'
      +'<div style="font-size:12px;color:var(--text2)">Dans l\'onglet <strong>Membres</strong>, éditez un membre et sélectionnez le type <strong>'+(fTab==='creche'?'&#128118; Crèche':'&#127979; École')+'</strong>.</div>'
      +'</div>';
  }

  // Contrat stored in membre.contrat_creche or membre.contrat_ecole (jsonb)
  const contratCreche=selEnfant.contrat_creche||{};
  const contratEcole=selEnfant.contrat_ecole||{};

  // Current month
  const now=new Date();
  const selYear=S.familleYear||now.getFullYear();
  const selMonth=S.familleMonth!=null?S.familleMonth:now.getMonth(); // 0-based
  const MOIS=['Janvier','F\u00e9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00fbt','Septembre','Octobre','Novembre','D\u00e9cembre'];

  const monthBar='<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">'
    +'<button class="btn btn-sm" id="btn-prev-month">&larr;</button>'
    +'<span style="font-weight:600;font-size:14px">'+MOIS[selMonth]+' '+selYear+'</span>'
    +'<button class="btn btn-sm" id="btn-next-month">&rarr;</button>'
    +'</div>';

  // ===== CRÈCHE =====
  if(fTab==='creche'){
    const saisies=S.crecheSaisies.filter(s=>s.enfant_id===selEnfant.id&&s.annee===selYear&&s.mois===selMonth+1);
    const txNormal=parseFloat(contratCreche.taux_normal||0);
    const depDef=contratCreche.heure_dep_defaut||'09:00';
    const recDef=contratCreche.heure_rec_defaut||'16:30';
    function toMin(t){if(!t)return null;const[h,m2]=t.split(':').map(Number);return h*60+m2;}
    const daysInMonth=new Date(selYear,selMonth+1,0).getDate();
    const days=Array.from({length:daysInMonth},(_,i)=>i+1);

    // Totals
    let totalContratMin=0,totalSupMin=0,totalDeduitMin=0;
    let joursContrat=0;
    days.forEach(function(d){
      const dow=new Date(selYear,selMonth,d).getDay();
      if(dow===0||dow===6)return;
      const s=saisies.find(x=>x.jour===d);
      if(s&&s.absence_autorisee)return; // absent = not counted
      const depC=s?.heure_contrat_dep||depDef;
      const recC=s?.heure_contrat_rec||recDef;
      const minContrat=Math.max(0,(toMin(recC)||0)-(toMin(depC)||0));
      joursContrat++;
      totalContratMin+=minContrat;
      // Heures sup (arrivee tardive recup tardive)
      if(s?.depose_anticipee){const dm=toMin(depC)-toMin(s.depose_anticipee);if(dm>0)totalSupMin+=Math.ceil(dm/15)*15;}
      if(s?.recuperation_tardive){const dm=toMin(s.recuperation_tardive)-toMin(recC);if(dm>0)totalSupMin+=Math.ceil(dm/15)*15;}
      // Heures deduites (arrivee tardive ou depart anticipe)
      if(s?.arrivee_tardive){const dm=toMin(s.arrivee_tardive)-toMin(depC);if(dm>0)totalDeduitMin+=Math.ceil(dm/15)*15;}
      if(s?.depart_anticipe){const dm=toMin(recC)-toMin(s.depart_anticipe);if(dm>0)totalDeduitMin+=Math.ceil(dm/15)*15;}
    });

    const hContrat=totalContratMin/60;
    const hSup=totalSupMin/60;
    const hDeduit=totalDeduitMin/60;
    const montantContrat=txNormal*hContrat;
    const montantSup=txNormal*hSup;
    const montantDeduit=txNormal*hDeduit;
    const montantTotal=montantContrat+montantSup-montantDeduit;
    const facRecu=parseFloat(contratCreche.facture_recue||0);
    const diff=montantTotal-facRecu;
    const fmt2=n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);

    // Header card
    const headerCard='<div class="card" style="margin-bottom:12px;padding:12px 14px">'
      +'<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)">'
        +'<div style="display:flex;flex-direction:column;gap:2px">'
          +'<label style="font-size:10px;color:var(--text2)">TAUX HORAIRE (€/h)</label>'
          +'<div style="display:flex;gap:4px;align-items:center">'
            +'<input id="creche-taux-normal" type="number" step="0.01" value="'+(txNormal||'')+'" placeholder="0.00" style="width:80px;padding:4px 8px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);border-radius:6px;background:var(--bg)">'
            +'<button class="btn btn-p btn-sm" id="btn-creche-save-taux" style="font-size:11px;padding:4px 8px">&#10003;</button>'
          +'</div>'
        +'</div>'
        +'<div style="display:flex;flex-direction:column;gap:2px">'
          +'<label style="font-size:10px;color:var(--text2)">H. CONTRAT/JOUR</label>'
          +'<div style="padding:4px 10px;background:var(--bg2);border-radius:6px;font-size:13px;font-weight:600">'+(toMin(recDef)-toMin(depDef))/60+'h <span style="font-size:10px;color:var(--text2)">('+depDef+'→'+recDef+')</span></div>'
        +'</div>'
        +'<div style="display:flex;flex-direction:column;gap:2px">'
          +'<label style="font-size:10px;color:var(--text2)">FACTURE REÇUE (€)</label>'
          +'<input id="creche-facture-recue" type="number" step="0.01" value="'+(contratCreche.facture_recue||'')+'" placeholder="0.00" style="width:90px;padding:4px 8px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);border-radius:6px;background:var(--bg)">'
        +'</div>'
        +(facRecu>0?'<div style="padding:6px 12px;border-radius:6px;font-weight:700;font-size:13px;background:'+(Math.abs(diff)<0.01?'#1D9E75':'#E74C3C')+';color:#fff;align-self:flex-end">Diff : '+(diff>0?'+':'')+fmt2(diff)+' '+(Math.abs(diff)<0.01?'&#10003;':'&#9888;')+'</div>':'')
        +'<button class="btn btn-p btn-sm" id="btn-creche-save-all" style="align-self:flex-end">&#10003; Tout enregistrer</button>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">'
        +'<div style="padding:8px;background:var(--bg2);border-radius:6px;text-align:center">'
          +'<div style="font-size:10px;color:var(--text2)">CONTRAT ('+joursContrat+' j)</div>'
          +'<div style="font-weight:700;font-size:15px">'+hContrat.toFixed(2)+'h</div>'
          +'<div style="font-weight:600;color:var(--blue);font-size:12px">'+fmt2(montantContrat)+'</div>'
        +'</div>'
        +'<div style="padding:8px;background:var(--bg2);border-radius:6px;text-align:center">'
          +'<div style="font-size:10px;color:var(--text2)">H. SUP</div>'
          +'<div style="font-weight:700;font-size:15px;color:var(--red)">+'+hSup.toFixed(2)+'h</div>'
          +'<div style="font-weight:600;color:var(--red);font-size:12px">+'+fmt2(montantSup)+'</div>'
        +'</div>'
        +'<div style="padding:8px;background:var(--bg2);border-radius:6px;text-align:center">'
          +'<div style="font-size:10px;color:var(--text2)">H. DÉDUITES</div>'
          +'<div style="font-weight:700;font-size:15px;color:var(--amber)">-'+hDeduit.toFixed(2)+'h</div>'
          +'<div style="font-weight:600;color:var(--amber);font-size:12px">-'+fmt2(montantDeduit)+'</div>'
        +'</div>'
        +'<div style="padding:8px;background:var(--green);border-radius:6px;text-align:center">'
          +'<div style="font-size:10px;color:rgba(255,255,255,0.8)">TOTAL DÛ</div>'
          +'<div style="font-weight:700;font-size:18px;color:#fff">'+fmt2(montantTotal)+'</div>'
          +'<div style="font-size:10px;color:rgba(255,255,255,0.75)">@ '+txNormal.toFixed(2)+'€/h</div>'
        +'</div>'
      +'</div>'
    +'</div>';

    // Day rows
    const rows=days.map(function(d){
      const date=new Date(selYear,selMonth,d);
      const dow=date.getDay();
      const isWE=dow===0||dow===6;
      const s=saisies.find(x=>x.jour===d);
      const absent=s?.absence_autorisee||false;
      const bg=isWE?'background:var(--bg2)':absent?'background:#FFF3CD':'';
      const dowLabel=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][dow];
      const depC=s?.heure_contrat_dep||(!isWE?depDef:'');
      const recC=s?.heure_contrat_rec||(!isWE?recDef:'');
      return '<tr style="'+bg+'">'
        +'<td style="font-size:12px;padding:3px 6px;color:'+(isWE?'var(--text3)':absent?'var(--amber)':'var(--text)')+'">'+(''+d).padStart(2,'0')+'/'+('+'+(selMonth+1)).padStart(2,'0')+' '+dowLabel+'</td>'
        // Dépose anticipée
        +'<td style="padding:2px 3px;text-align:center"><input type="time" class="creche-dep" data-day="'+d+'" value="'+(s?.depose_anticipee||'')+'" style="width:75px;font-size:11px;padding:2px 3px;border:0.5px solid var(--border2);border-radius:3px;background:var(--bg)'+(isWE?';opacity:0.3':'')+'"></td>'
        // Récup tardive
        +'<td style="padding:2px 3px;text-align:center"><input type="time" class="creche-rec" data-day="'+d+'" value="'+(s?.recuperation_tardive||'')+'" style="width:75px;font-size:11px;padding:2px 3px;border:0.5px solid var(--border2);border-radius:3px;background:var(--bg)'+(isWE?';opacity:0.3':'')+'"></td>'
        // Horaire contrat dep
        +'<td style="padding:2px 3px;text-align:center"><input type="time" class="creche-cont" data-day="'+d+'" value="'+depC+'" style="width:75px;font-size:11px;padding:2px 3px;border:0.5px solid var(--border2);border-radius:3px;background:var(--bg2)'+(isWE?';opacity:0.3':'')+'"></td>'
        // Horaire contrat rec
        +'<td style="padding:2px 3px;text-align:center"><input type="time" class="creche-contr" data-day="'+d+'" value="'+recC+'" style="width:75px;font-size:11px;padding:2px 3px;border:0.5px solid var(--border2);border-radius:3px;background:var(--bg2)'+(isWE?';opacity:0.3':'')+'"></td>'
        // Arrivée tardive (déduire)
        +'<td style="padding:2px 3px;text-align:center"><input type="time" class="creche-arr-tard" data-day="'+d+'" value="'+(s?.arrivee_tardive||'')+'" style="width:75px;font-size:11px;padding:2px 3px;border:0.5px solid var(--amber);border-radius:3px;background:var(--bg)'+(isWE?';opacity:0.3':'')+'"></td>'
        // Départ anticipé (déduire)
        +'<td style="padding:2px 3px;text-align:center"><input type="time" class="creche-dep-antic" data-day="'+d+'" value="'+(s?.depart_anticipe||'')+'" style="width:75px;font-size:11px;padding:2px 3px;border:0.5px solid var(--amber);border-radius:3px;background:var(--bg)'+(isWE?';opacity:0.3':'')+'"></td>'
        // Absence autorisée
        +'<td style="padding:2px 3px;text-align:center"><input type="checkbox" class="creche-absent" data-day="'+d+'" '+(absent?'checked':'')+' style="width:15px;height:15px;accent-color:var(--amber)"></td>'
        +'</tr>';
    }).join('');

    const saveBtn='<button class="btn btn-p btn-sm" id="btn-creche-save-all-bot" style="width:100%;margin-top:8px">&#10003; Tout enregistrer</button>';

    return tabBar+enfantBar
      +'<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px">'
        +monthBar
        +'<button class="btn btn-sm" id="btn-creche-contrat">&#9881; Horaires contrat</button>'
        +'<button class="btn btn-sm" id="btn-creche-pdf" style="background:var(--green);color:#fff">&#128196; PDF</button>'
      +'</div>'
      +headerCard
      +'<div class="card"><div style="overflow-x:auto"><table style="min-width:700px">'
        +'<thead><tr>'
          +'<th style="font-size:10px">Date</th>'
          +'<th style="font-size:10px;color:var(--red)">Dépose anticipée</th>'
          +'<th style="font-size:10px;color:var(--red)">Récup. tardive</th>'
          +'<th style="font-size:10px;background:var(--bg2);color:var(--text)">Contrat dep.</th>'
          +'<th style="font-size:10px;background:var(--bg2);color:var(--text)">Contrat récup.</th>'
          +'<th style="font-size:10px;color:var(--amber)">Arrivée tardive</th>'
          +'<th style="font-size:10px;color:var(--amber)">Départ anticipé</th>'
          +'<th style="font-size:10px;color:var(--amber)">Absent</th>'
        +'</tr></thead>'
        +'<tbody>'+rows+'</tbody>'
      +'</table></div>'
      +saveBtn
      +'</div>';
  }


  // ===== ÉCOLE =====
  if(fTab==='ecole'){
    const saisies=S.ecoleSaisies.filter(s=>s.enfant_id===selEnfant.id&&s.annee===selYear&&s.mois===selMonth+1);
    const txPeriPrev=parseFloat(contratEcole.taux_peri_prevu||0);
    const txPeriNonPrev=parseFloat(contratEcole.taux_peri_non_prevu||0);
    const txCantine=parseFloat(contratEcole.taux_cantine||0);
    const txCentreJ=parseFloat(contratEcole.taux_centre_journee||0);

    const daysInMonth=new Date(selYear,selMonth+1,0).getDate();
    const days=Array.from({length:daysInMonth},(_,i)=>i+1);

    let totalPeriMin=0,totalPeriNPMin=0,totalCantine=0,totalCentreJ=0;
    saisies.forEach(s=>{
      totalPeriMin+=Math.ceil((s.peri_matin_min||0)/15)*15+Math.ceil((s.peri_soir_min||0)/15)*15;
      totalPeriNPMin+=Math.ceil((s.peri_matin_np_min||0)/15)*15+Math.ceil((s.peri_soir_np_min||0)/15)*15;
      if(s.cantine)totalCantine++;
      if(s.centre_loisir)totalCentreJ++;
    });
    const montantPeri=(totalPeriMin/60)*txPeriPrev+(totalPeriNPMin/60)*txPeriNonPrev;
    const montantCantine=totalCantine*txCantine;
    const montantCentre=totalCentreJ*txCentreJ;
    const montantEcoleTotal=montantPeri+montantCantine;
    const montantCentreTotal=montantCentre;

    const rows=days.map(d=>{
      const date=new Date(selYear,selMonth,d);
      const dow=date.getDay();
      if(dow===0||dow===6)return '';
      const s=saisies.find(x=>x.jour===d);
      const isMer=dow===3;
      const isCentre=s?.centre_loisir||false;
      const isAbsent=s?.absence_autorisee||false;
      const dowLabel=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][dow];
      const noPeri=isMer||isCentre||isAbsent;
      const durMat=s&&!noPeri?(s.peri_matin_min||s.peri_matin_np_min||0):0;
      const durSoir=s&&!noPeri?(s.peri_soir_min||s.peri_soir_np_min||0):0;
      const typeMat=s&&s.peri_matin_np_min>0?'non_prevu':'prevu';
      const typeSoir=s&&s.peri_soir_np_min>0?'non_prevu':'prevu';
      const rowBg=isCentre?'background:#EBF5FF':isAbsent?'background:#FFFBE6':'';
      const IS='width:50px;font-size:11px;padding:2px 4px;border:0.5px solid var(--border2);border-radius:3px;text-align:right;background:var(--bg)';
      const SS='font-size:10px;padding:2px 3px;border:0.5px solid var(--border2);border-radius:3px;background:var(--bg);width:72px';
      return '<tr style="'+rowBg+'">'
        +'<td style="font-size:11px;padding:3px 6px;font-weight:'+(isMer?'600':'400')+'">'+(''+d).padStart(2,'0')+'/'+('+'+(selMonth+1)).padStart(2,'0')+' '+dowLabel+'</td>'
        +'<td style="text-align:center;padding:2px">'+(noPeri?'<span style="color:var(--text3);">—</span>':'<input type="number" min="0" step="15" class="ecole-dur-mat" data-day="'+d+'" value="'+(durMat||'')+'" placeholder="0" style="'+IS+'">')+'</td>'
        +'<td style="text-align:center;padding:2px">'+(noPeri?'':'<select class="ecole-type-mat" data-day="'+d+'" style="'+SS+'"><option value="prevu" '+(typeMat==='prevu'?'selected':'')+'>Prévu</option><option value="non_prevu" '+(typeMat==='non_prevu'?'selected':'')+'>N.prévu</option></select>')+'</td>'
        +'<td style="text-align:center;padding:2px">'+(noPeri?'<span style="color:var(--text3);">—</span>':'<input type="number" min="0" step="15" class="ecole-dur-soir" data-day="'+d+'" value="'+(durSoir||'')+'" placeholder="0" style="'+IS+'">')+'</td>'
        +'<td style="text-align:center;padding:2px">'+(noPeri?'':'<select class="ecole-type-soir" data-day="'+d+'" style="'+SS+'"><option value="prevu" '+(typeSoir==='prevu'?'selected':'')+'>Prévu</option><option value="non_prevu" '+(typeSoir==='non_prevu'?'selected':'')+'>N.prévu</option></select>')+'</td>'
        +'<td style="text-align:center;padding:2px"><input type="checkbox" class="ecole-cant" data-day="'+d+'" '+(s?.cantine?'checked':'')+' '+(isAbsent?'disabled':'')+' style="width:15px;height:15px;opacity:'+(isAbsent?'0.4':'1')+'"></td>'
        +'<td style="text-align:center;padding:2px"><input type="checkbox" class="ecole-centre" data-day="'+d+'" '+(isCentre?'checked':'')+' '+(isAbsent?'disabled':'')+' style="width:15px;height:15px;accent-color:var(--blue)"></td>'
        +'<td style="text-align:center;padding:2px"><input type="checkbox" class="ecole-absent" data-day="'+d+'" '+(isAbsent?'checked':'')+' style="width:15px;height:15px;accent-color:var(--amber)"></td>'
        +'</tr>';
    }).join('');;;;;

    return tabBar+enfantBar
      +'<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px">'
        +monthBar
        +'<button class="btn btn-sm" id="btn-ecole-pdf-ecole" style="background:#185FA5;color:#fff">&#128196; PDF École+Cantine</button>'
        +'<button class="btn btn-sm" id="btn-ecole-pdf-centre" style="background:#9B59B6;color:#fff">&#128196; PDF Centre loisirs</button>'
      +'</div>'
      +'<div class="card" style="margin-bottom:12px;padding:12px 14px">'
        +'<div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px">TARIFS</div>'
        +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-bottom:10px">'
          +'<div style="display:flex;flex-direction:column;gap:2px">'
            +'<label style="font-size:10px;color:var(--text2)">PÉRI PRÉVU (€/¼H)</label>'
            +'<input id="ecole-taux-pp" type="number" step="0.001" value="'+(txPeriPrev||'')+'" placeholder="0.000" style="padding:4px 8px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);border-radius:6px;background:var(--bg)">'
          +'</div>'
          +'<div style="display:flex;flex-direction:column;gap:2px">'
            +'<label style="font-size:10px;color:var(--text2)">PÉRI NON PRÉVU (€/¼H)</label>'
            +'<input id="ecole-taux-pnp" type="number" step="0.001" value="'+(txPeriNonPrev||'')+'" placeholder="0.000" style="padding:4px 8px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);border-radius:6px;background:var(--bg)">'
          +'</div>'
          +'<div style="display:flex;flex-direction:column;gap:2px">'
            +'<label style="font-size:10px;color:var(--text2)">CANTINE (€/repas)</label>'
            +'<input id="ecole-taux-cant" type="number" step="0.01" value="'+(txCantine||'')+'" placeholder="0.00" style="padding:4px 8px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);border-radius:6px;background:var(--bg)">'
          +'</div>'
          +'<div style="display:flex;flex-direction:column;gap:2px">'
            +'<label style="font-size:10px;color:var(--text2)">CENTRE LOISIRS (€/j)</label>'
            +'<input id="ecole-taux-centre" type="number" step="0.01" value="'+(txCentreJ||'')+'" placeholder="0.00" style="padding:4px 8px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);border-radius:6px;background:var(--bg)">'
          +'</div>'
          +'<div style="display:flex;flex-direction:column;gap:2px">'
            +'<label style="font-size:10px;color:var(--text2)">FACTURE ÉCOLE (€)</label>'
            +'<input id="ecole-facture-ecole" type="number" step="0.01" value="'+(contratEcole.facture_ecole||'')+'" placeholder="0.00" style="padding:4px 8px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);border-radius:6px;background:var(--bg)">'
          +'</div>'
          +'<div style="display:flex;flex-direction:column;gap:2px">'
            +'<label style="font-size:10px;color:var(--text2)">FACTURE CENTRE (€)</label>'
            +'<input id="ecole-facture-centre" type="number" step="0.01" value="'+(contratEcole.facture_centre||'')+'" placeholder="0.00" style="padding:4px 8px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);border-radius:6px;background:var(--bg)">'
          +'</div>'
        +'</div>'
        +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;font-size:11px;margin-bottom:8px">'
          +'<div style="padding:6px 8px;background:var(--bg2);border-radius:4px">'
            +'<div style="color:var(--text2)">Périscolaire prévu</div>'
            +'<div style="font-weight:600;color:var(--blue)">'+(totalPeriMin/60).toFixed(2)+'h → '+fmt2((totalPeriMin/60)*txPeriPrev)+'</div>'
          +'</div>'
          +'<div style="padding:6px 8px;background:var(--bg2);border-radius:4px">'
            +'<div style="color:var(--text2)">Périscolaire non prévu</div>'
            +'<div style="font-weight:600;color:var(--amber)">'+(totalPeriNPMin/60).toFixed(2)+'h → '+fmt2((totalPeriNPMin/60)*txPeriNonPrev)+'</div>'
          +'</div>'
          +'<div style="padding:6px 8px;background:var(--bg2);border-radius:4px">'
            +'<div style="color:var(--text2)">Cantine</div>'
            +'<div style="font-weight:600;color:var(--blue)">'+totalCantine+' repas → '+fmt2(montantCantine)+'</div>'
          +'</div>'
          +'<div style="padding:6px 8px;background:#185FA5;border-radius:4px">'
            +'<div style="color:rgba(255,255,255,0.8)">École+Cantine</div>'
            +'<div style="font-weight:700;color:#fff;font-size:13px">'+fmt2(montantEcoleTotal)+'</div>'
            +((contratEcole.facture_ecole)?'<div style="font-size:10px;color:'+(Math.abs(montantEcoleTotal-(contratEcole.facture_ecole||0))<0.01?'#90EE90':'#FFB6C1')+'">'+(montantEcoleTotal-(contratEcole.facture_ecole||0)>0?'+':'')+fmt2(montantEcoleTotal-(contratEcole.facture_ecole||0))+'</div>':'')
          +'</div>'
          +'<div style="padding:6px 8px;background:#9B59B6;border-radius:4px">'
            +'<div style="color:rgba(255,255,255,0.8)">Centre loisirs</div>'
            +'<div style="font-weight:700;color:#fff;font-size:13px">'+fmt2(montantCentreTotal)+'</div>'
            +((contratEcole.facture_centre)?'<div style="font-size:10px;color:'+(Math.abs(montantCentreTotal-(contratEcole.facture_centre||0))<0.01?'#90EE90':'#FFB6C1')+'">'+(montantCentreTotal-(contratEcole.facture_centre||0)>0?'+':'')+fmt2(montantCentreTotal-(contratEcole.facture_centre||0))+'</div>':'')
          +'</div>'
        +'</div>'
        +'<button class="btn btn-p btn-sm" id="btn-ecole-save-tarifs">&#10003; Enregistrer les tarifs</button>'
      +'</div>'
      +'<div class="card"><div style="overflow-x:auto"><table style="min-width:700px">'
        +'<thead><tr>'
          +'<th style="font-size:10px">Date</th>'
          +'<th style="font-size:10px">Péri mat.<br>(min)</th>'
          +'<th style="font-size:10px">Mat. type</th>'
          +'<th style="font-size:10px">Péri soir<br>(min)</th>'
          +'<th style="font-size:10px">Soir type</th>'
          +'<th style="font-size:10px">Cantine</th>'
          +'<th style="font-size:10px;color:var(--blue)">Centre</th>'
          +'<th style="font-size:10px;color:var(--amber)">Absent</th>'
        +'</tr></thead>'
        +'<tbody>'+rows+'</tbody>'
      +'</table></div>'
      +'<button class="btn btn-p btn-sm" id="btn-ecole-save-all-bot" style="width:100%;margin-top:8px">&#10003; Tout enregistrer</button>'
      +'</div>';
  }

  return tabBar+'<div style="text-align:center;padding:20px;color:var(--text2)">Onglet inconnu</div>';
}

function renderEtiquettes(){
  const eTab = S.eTab||'outils';
  const siteUrl = window.location.origin + window.location.pathname;
  const toolLocs = new Set(S.tools.map(t=>t.location).filter(Boolean));
  const rngLocs = new Set((S.rangements||[]).map(r=>r.nom).filter(Boolean));
  const locations = [...new Set([...rngLocs,...toolLocs])].sort();

  const tabBar = `<div class="tab-bar" style="margin-bottom:14px">
    <div class="tab ${eTab==='outils'?'active':''}" data-etab="outils">🔧 Outils</div>
    <div class="tab ${eTab==='emplacements'?'active':''}" data-etab="emplacements">📦 Emplacements</div>
    <div class="tab ${eTab==='inventaire'?'active':''}" data-etab="inventaire">📋 Inventaire</div>
  </div>`;

  // === ÉTIQUETTES OUTILS ===
  if(eTab==='outils'){
    const selCat = S.eFilter||'all';
    const cats = ['all',...new Set(S.tools.map(t=>t.category).filter(Boolean))];
    const filtered = selCat==='all'?S.tools:S.tools.filter(t=>t.category===selCat);
    return `${tabBar}
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      ${cats.map(c=>`<span class="pill ${selCat===c?'active':''}" data-efilter="${c}">${c==='all'?'Tous':c}</span>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
      ${filtered.map(t=>`
        <div class="card" style="padding:12px;text-align:center;cursor:pointer" data-qr-tool="${t.id}">
          <canvas id="qr-tool-${t.id}" style="width:100px;height:100px"></canvas>
          <div style="font-size:13px;font-weight:500;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.name}</div>
          <div style="font-size:11px;color:var(--text2)">${t.category||''}</div>
          <div style="font-size:10px;color:var(--text3)">${t.location||'—'}</div>
          <div style="display:flex;gap:4px;margin-top:8px;justify-content:center">
            <button class="btn btn-sm" data-print-label="${t.id}">🖨 Étiquette</button>
          </div>
        </div>`).join('')}
    </div>`;
  }

  // === ÉTIQUETTES EMPLACEMENTS ===
  if(eTab==='emplacements'){
    return `${tabBar}
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-p btn-sm" id="btn-add-location">+ Emplacement</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
      ${locations.map(loc=>{
        const tools = S.tools.filter(t=>t.location===loc);
        const rng = (S.rangements||[]).find(r=>r.nom===loc);
      return `<div class="card" style="padding:12px;text-align:center">
          <canvas id="qr-loc-${btoa(loc).replace(/[^a-z0-9]/gi,'')}" style="width:100px;height:100px"></canvas>
          <div style="font-size:13px;font-weight:500;margin-top:6px">${loc}</div>
          ${rng?.description?`<div style="font-size:11px;color:var(--text2);margin-top:2px">${rng.description}</div>`:''}
          <div style="font-size:11px;color:var(--text2)">${tools.length} outil${tools.length>1?'s':''}</div>
          <div style="margin-top:6px;display:flex;gap:4px;justify-content:center;flex-wrap:wrap">
            <button class="btn btn-sm" data-print-loc="${loc}">🖨 Étiquette</button>
            ${rng&&isAdmin()?`<button class="btn btn-sm" data-edit-rng="${rng.id}" title="Modifier">&#9998;</button>`:''}
            ${rng&&isAdmin()?`<button class="btn btn-d btn-sm" data-del-rng-loc="${rng.id}" title="Supprimer">&#10005;</button>`:''}
          </div>
        </div>`;
      }).join('')}
      ${locations.length===0?'<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text2)">Aucun emplacement défini. Ajoutez des emplacements dans la fiche de chaque outil.</div>':''}
    </div>`;
  }

  // === INVENTAIRE RAPIDE ===
  if(eTab==='inventaire'){
    const selLoc = S.selInventLoc||locations[0]||'';
    const locTools = S.tools.filter(t=>t.location===selLoc);
    const invState = S.inventState||{};
    const checked = locTools.filter(t=>invState[t.id]).length;
    return `${tabBar}
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
