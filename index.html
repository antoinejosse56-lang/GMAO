function renderLocatif(){
  const isDubail=isDubailProfile();
  const tab = S.locatifTab||'tenants';
  const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const year = S.locatifYear||2026;
  const tenants = getFilteredTenants().filter(t=>t.actif!==false);
  const fmt = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2}).format(n||0);

  const tabBar = `<div class="tab-bar" style="margin-bottom:14px">
    <div class="tab ${tab==='tenants'?'active':''}" data-loc-tab="tenants">Locataires</div>
    <div class="tab ${tab==='loyers'?'active':''}" data-loc-tab="loyers">Saisie loyers</div>
    <div class="tab ${tab==='synthese'?'active':''}" data-loc-tab="synthese">Synthèse</div>
    <div class="tab ${tab==='dettes'?'active':''}" data-loc-tab="dettes">Dettes</div>
    <div class="tab ${tab==='emises'?'active':''}" data-loc-tab="emises">Émises</div>
  </div>`;

  const yearBar = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
    <span style="font-size:12px;color:var(--text2)">Année :</span>
    ${[2024,2025,2026,2027].map(y=>`<span class="pill ${year===y?'active':''}" data-loc-year="${y}">${y}</span>`).join('')}
  </div>`;

  // ====== LOCATAIRES ======
  if(tab==='tenants'){
    const colors=['#185FA5','#1D9E75','#9B59B6','#E67E22','#E74C3C'];
    // Group tenants by property from topology
    const visProps=isDubail?S.topology.properties.filter(p=>dubailFilter(p.name)):S.topology.properties;
    const propBlocks=visProps.map(function(prop,pi){
      const propTenants=tenants.filter(function(t){
        return (t.logement||'').toLowerCase().startsWith(prop.name.toLowerCase());
      });
      if(!propTenants.length) return '';
      // Sort: actifs first, then by zone name, then by nom
      propTenants.sort(function(a,b){
        if(a.actif===false&&b.actif!==false) return 1;
        if(b.actif===false&&a.actif!==false) return -1;
        const za=(a.logement||'').split(' — ').slice(1).join(' — ')||'';
        const zb=(b.logement||'').split(' — ').slice(1).join(' — ')||'';
        return za.localeCompare(zb,'fr')||a.nom.localeCompare(b.nom,'fr');
      });
      const color=colors[pi%colors.length];
      const actifCount=propTenants.filter(function(t){return t.actif!==false;}).length;
      const rows=propTenants.map(function(t){
        const zone=(t.logement||'').includes(' — ')?(t.logement||'').split(' — ').slice(1).join(' — '):'';
        const inactive=t.actif===false;
        return '<tr style="'+(inactive?'opacity:0.5':'')+'">'
          +'<td style="font-size:12px;color:var(--text2)">'+zone+'</td>'
          +'<td style="font-weight:500">'+t.nom+'</td>'
          +'<td style="font-size:12px;color:var(--text2)">'+(t.email||'—')+'</td>'
          +'<td><span class="badge '+(t.type_bail==='commercial'?'bblue':'bgreen')+'">'+(t.type_bail==='commercial'?'Commercial':'Habitation')+'</span></td>'
          +'<td style="font-weight:500">'+fmt(t.loyer_ref)+'</td>'
          +'<td style="font-size:12px">'+(t.charges?fmt(t.charges):'—')+'</td>'
          +'<td style="font-size:12px">'+(t.date_entree?new Date(t.date_entree).toLocaleDateString('fr-FR'):'—')+'</td>'
          +'<td><span class="badge '+(inactive?'bgray':t.actif===false?'bgray':'bgreen')+'">'+(inactive?'Inactif':'Actif')+'</span></td>'
          +'<td style="white-space:nowrap">'
            +(canEdit()?'<button class="btn btn-sm" data-edit-tenant="'+t.id+'">&#9998;</button> ':'')
            +(isAdmin()?'<button class="btn btn-d btn-sm" data-del-tenant="'+t.id+'">&#10005;</button>':'')
          +'</td>'
          +'</tr>';
      }).join('');
      return '<div class="card" style="margin-bottom:16px">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid '+color+'">'
          +'<div style="font-size:13px;font-weight:600;color:'+color+'">&#127968; '+prop.name+'</div>'
          +'<div style="font-size:12px;color:var(--text2)">'+actifCount+' actif'+(actifCount>1?'s':'')+' / '+propTenants.length+' total</div>'
        +'</div>'
        +'<div style="overflow-x:auto"><table>'
          +'<thead><tr>'
            +'<th style="font-size:11px">Zone</th>'
            +'<th style="font-size:11px">Locataire</th>'
            +'<th style="font-size:11px">Email</th>'
            +'<th style="font-size:11px">Type</th>'
            +'<th style="font-size:11px">Loyer réf.</th>'
            +'<th style="font-size:11px">Charges</th>'
            +'<th style="font-size:11px">Entrée</th>'
            +'<th style="font-size:11px">Statut</th>'
            +'<th></th>'
          +'</tr></thead>'
          +'<tbody>'+rows+'</tbody>'
        +'</table></div>'
        +'</div>';
    }).join('');
    // Tenants not matched by any topology property
    const matchedIds=new Set(S.topology.properties.flatMap(function(p){
      return tenants.filter(function(t){return (t.logement||'').toLowerCase().startsWith(p.name.toLowerCase());}).map(function(t){return t.id;});
    }));
    const unmatched=tenants.filter(function(t){return !matchedIds.has(t.id);});
    const unmatchedBlock=unmatched.length?'<div class="card" style="margin-bottom:16px">'
      +'<div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">❓ Logement non identifié</div>'
      +'<div style="overflow-x:auto"><table><thead><tr><th>Logement</th><th>Locataire</th><th>Type</th><th>Loyer</th><th></th></tr></thead><tbody>'
      +unmatched.map(function(t){return '<tr><td style="font-size:12px">'+(t.logement||'—')+'</td><td>'+t.nom+'</td><td>'+fmt(t.loyer_ref)+'</td><td>'+(canEdit()?'<button class="btn btn-sm" data-edit-tenant="'+t.id+'">&#9998;</button>':'')+'</td></tr>';}).join('')
      +'</tbody></table></div></div>':'';
    return tabBar
      +'<div style="display:flex;justify-content:flex-end;margin-bottom:12px">'
        +(isAdmin()?'<button class="btn btn-p" id="btn-add-tenant">+ Locataire</button>':'')
      +'</div>'
      +(propBlocks||'')
      +unmatchedBlock
      +(tenants.length===0?'<div style="text-align:center;padding:30px;color:var(--text2)">Aucun locataire. Cliquez "+ Locataire" pour commencer.</div>':'');
  }

  if(tab==='loyers'){
    const allowedTenantIds=new Set(tenants.map(t=>t.id));
    const filteredPayments=S.rentPayments.filter(p=>allowedTenantIds.has(p.tenant_id));
    const selTenant = S.selTenantLoyer||null;
    const selMonth = S.selMonthLoyer||MONTHS[new Date().getMonth()];
    return `${tabBar}${yearBar}
    <div style="display:grid;grid-template-columns:240px 1fr;gap:14px;align-items:start">
      <!-- Liste locataires -->
      <div class="card" style="padding:10px">
        <div class="sec" style="margin-bottom:8px">Locataires</div>
        ${tenants.map(t=>{
          const paid = filteredPayments.filter(p=>p.tenant_id===t.id&&p.annee===year&&p.paye).reduce((s,p)=>s+(p.loyer||0),0);
          const due = (t.loyer_ref||0)*12;
          return `<div class="tree-row ${selTenant===t.id?'selected':''}" data-sel-tenant="${t.id}" style="padding:7px 8px">
            <div style="flex:1">
              <div style="font-size:13px;font-weight:500">${t.nom}</div>
              <div style="font-size:11px;color:var(--text2)">${t.logement||''}</div>
              <div style="display:flex;gap:6px;margin-top:3px">
                ${t.bail_url?`<a href="${t.bail_url}" target="_blank" style="font-size:10px;color:var(--blue);text-decoration:none">📄 Bail</a>`:''}
                ${t.edl_url?`<a href="${t.edl_url}" target="_blank" style="font-size:10px;color:var(--green);text-decoration:none">🏠 EDL</a>`:''}
                ${t.assurance_url?`<a href="${t.assurance_url}" target="_blank" style="font-size:10px;color:var(--amber);text-decoration:none">🛡 Assurance</a>`:''}
                ${t.assurance_url?`<a href="${t.assurance_url}" target="_blank" style="font-size:10px;color:var(--amber);text-decoration:none">🛡 Assurance</a>`:''}
              </div>
            </div>
            <span class="badge ${paid>=due*0.9?'bgreen':paid>0?'bamber':'bred'}" style="font-size:10px">${fmt(paid)}</span>
          </div>`;
        }).join('')}
        ${tenants.length===0?'<div style="font-size:12px;color:var(--text2);padding:8px">Aucun locataire actif.</div>':''}
      </div>
      <!-- Grille mois -->
      ${selTenant?(()=>{
        const t = tenants.find(x=>x.id===selTenant);
        if(!t) return '<div class="card">Locataire introuvable.</div>';
        return `<div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
            <div>
              <div style="font-size:15px;font-weight:500">${t.nom}</div>
              <div style="font-size:12px;color:var(--text2)">${t.logement||''} · Loyer réf. : ${fmt(t.loyer_ref)}</div>
            </div>
            <span class="badge ${t.type_bail==='commercial'?'bblue':'bgreen'}">${t.type_bail==='commercial'?'Commercial HT+TVA':'Habitation'}</span>
          </div>
          ${t.type_bail==='commercial'?`
          <div style="background:var(--amber-bg);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 12px;margin-bottom:12px;font-size:12px">
            💡 Local commercial — loyer saisi en <b>HT</b>. La TVA 20% est calculée automatiquement.
            Loyer HT : <b>${fmt(t.loyer_ref)}</b> → TVA : <b>${fmt(t.loyer_ref*0.2)}</b> → TTC : <b>${fmt(t.loyer_ref*1.2)}</b>
            ${t.charges>0?` | Charges HT : <b>${fmt(t.charges)}</b> → TTC : <b>${fmt(t.charges*1.2)}</b>`:''}
          </div>`:'' }
          <div style="overflow-x:auto"><table>
            <thead><tr>
              <th>Mois</th>
              ${t.type_bail==='commercial'?`
                <th>Loyer HT</th><th>TVA 20%</th><th>Loyer TTC</th>
                ${t.charges>0?'<th>Charges HT</th><th>Charges TTC</th>':''}
                <th>Total TTC attendu</th>
              `:`<th>Loyer attendu</th>${t.charges>0?'<th>Charges</th>':''}<th>Total attendu</th>`}
              <th>Reçu</th><th>Date</th><th>CAF</th><th>Statut</th><th></th>
            </tr></thead>
            <tbody>
            ${MONTHS.map((mois,mi)=>{
              const p = filteredPayments.find(x=>x.tenant_id===t.id&&x.annee===year&&x.mois===mois);
              const isPaid = p?.paye;
              const montant = p?.loyer||0;
              const isComm = t.type_bail==='commercial';
              const loyerHT = t.loyer_ref||0;
              const loyerTVA = isComm ? loyerHT*0.2 : 0;
              const loyerTTC = isComm ? loyerHT*1.2 : loyerHT;
              const chargesHT = t.charges||0;
              const chargesTTC = isComm ? chargesHT*1.2 : chargesHT;
              const totalAttendu = loyerTTC + (isComm ? chargesTTC : chargesHT);
              return `<tr style="${isPaid?'':'background:var(--bg2)'}">
                <td style="font-weight:500">${mois}</td>
                ${isComm?`
                  <td style="font-size:12px">${fmt(loyerHT)}</td>
                  <td style="font-size:12px;color:var(--amber)">${fmt(loyerTVA)}</td>
                  <td style="font-weight:500">${fmt(loyerTTC)}</td>
                  ${chargesHT>0?`<td style="font-size:12px">${fmt(chargesHT)}</td><td style="font-size:12px">${fmt(chargesTTC)}</td>`:''}
                  <td style="font-weight:500">${fmt(totalAttendu)}</td>
                `:`
                  <td>${fmt(loyerHT)}</td>
                  ${chargesHT>0?`<td style="font-size:12px">${fmt(chargesHT)}</td>`:''}
                  <td style="font-weight:500">${fmt(loyerHT+chargesHT)}</td>
                `}
                <td style="font-weight:500;color:${isPaid?'var(--green)':'var(--text)'}">${(p?.locataire_part||0)+(p?.caf||0)>0?fmt((p?.locataire_part||0)+(p?.caf||0)):'—'}</td>
                <td style="font-size:11px">
                  ${p?.date_loc?'🏦 '+new Date(p.date_loc).toLocaleDateString('fr-FR'):'—'}
                  ${p?.date_caf?'<br>🏢 CAF : '+new Date(p.date_caf).toLocaleDateString('fr-FR'):''}
                </td>
                <td style="font-size:12px">${p?.caf>0?fmt(p.caf):'—'}</td>
                <td>${isPaid?'<span class="badge bgreen">✓ Payé</span>':montant>0?'<span class="badge bamber">Partiel</span>':'<span class="badge bgray">En attente</span>'}</td>
                <td style="white-space:nowrap">
                  ${canEdit()&&!isPaid?`<button class="btn btn-sm btn-p" data-pay-loyer="${t.id}" data-pay-mois="${mois}" data-pay-year="${year}">✓ Valider</button> `:''}
                  ${canEdit()?`<button class="btn btn-sm" data-saisie-loyer="${t.id}" data-saisie-mois="${mois}" data-saisie-year="${year}">✎ Saisir</button>`:''}
                  ${p&&canEdit()?`<button class="btn btn-sm btn-d" data-del-rp="${p.id}" title="Supprimer ce paiement">✕</button>`:''}
                </td>
              </tr>`;
            }).join('')}
            </tbody>
          </table></div>
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-top:0.5px solid var(--border);margin-top:8px;font-weight:500">
            <span>Total reçu ${year}</span>
            <span style="color:var(--green)">${fmt(filteredPayments.filter(p=>p.tenant_id===t.id&&p.annee===year&&p.paye).reduce((s,p)=>s+(p.loyer||0),0))}</span>
          </div>
        </div>`;
      })():`<div class="card" style="display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--text2)">
        Sélectionnez un locataire dans la liste.
      </div>`}
    </div>`;
  }

  // ====== SYNTHESE ======
  if(tab==='synthese'){
    const allowedTenantIds=new Set(tenants.map(t=>t.id));
    const filteredPayments=S.rentPayments.filter(p=>allowedTenantIds.has(p.tenant_id));
    // Split Dubail vs perso
    const dubailTenants=tenants.filter(t=>dubailFilter(t.logement||''));
    const persoTenants=tenants.filter(t=>!dubailFilter(t.logement||''));
    const dubailIds=new Set(dubailTenants.map(t=>t.id));
    const persoIds=new Set(persoTenants.map(t=>t.id));
    const dubailPmts=filteredPayments.filter(p=>dubailIds.has(p.tenant_id));
    const persoPmts=filteredPayments.filter(p=>persoIds.has(p.tenant_id));

    function statsBlock(label,tList,pmtList,color){
      const percu=pmtList.filter(p=>p.paye&&p.annee===year).reduce((s,p)=>s+(p.loyer||0),0);
      const attendu=tList.reduce((s,t)=>s+(t.loyer_ref||0)*12,0);
      const dettes=pmtList.filter(p=>!p.paye&&p.loyer>0&&p.annee===year).reduce((s,p)=>s+(p.loyer||0),0);
      return `<div class="card" style="margin-bottom:14px">
        <div style="font-size:13px;font-weight:600;color:${color};margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid ${color}">${label} — ${tList.length} locataire(s)</div>
        <div class="g4">
          <div class="stat"><div class="stat-l">Loyers perçus ${year}</div><div class="stat-v" style="color:var(--green)">${fmt(percu)}</div></div>
          <div class="stat"><div class="stat-l">Loyers attendus</div><div class="stat-v">${fmt(attendu)}</div></div>
          <div class="stat"><div class="stat-l">En retard</div><div class="stat-v" style="color:var(--red)">${fmt(dettes)}</div></div>
          <div class="stat"><div class="stat-l">Taux encaissement</div><div class="stat-v" style="color:${attendu>0?'var(--blue)':'var(--text2)'}">${attendu>0?Math.round(percu/attendu*100)+'%':'—'}</div></div>
        </div>
        ${tList.length>0?`<div style="overflow-x:auto;margin-top:10px"><table>
          <thead><tr><th>Locataire</th><th>Logement</th><th>Loyer réf.</th>${MONTHS.filter((_,i)=>i<new Date().getMonth()+2).map(m=>`<th style="font-size:10px">${m.slice(0,3)}</th>`).join('')}<th>Total</th></tr></thead>
          <tbody>${tList.map(t=>{
            const tPmts=pmtList.filter(p=>p.tenant_id===t.id&&p.annee===year);
            const total=tPmts.filter(p=>p.paye).reduce((s,p)=>s+(p.loyer||0),0);
            return '<tr><td style="font-weight:500;font-size:12px">'+t.nom+'</td><td style="font-size:11px;color:var(--text2)">'+t.logement+'</td><td style="font-size:12px">'+fmt(t.loyer_ref||0)+'</td>'+MONTHS.filter((_,i)=>i<new Date().getMonth()+2).map(m=>{const p=tPmts.find(x=>x.mois===m);return '<td style="font-size:11px;text-align:center">'+(p?p.paye?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--amber)">…</span>':'<span style="color:var(--text3)">—</span>')+'</td>';}).join('')+'<td style="font-weight:600;font-size:12px">'+fmt(total)+'</td></tr>';
          }).join('')}</tbody>
        </table></div>`:''}
      </div>`;
    }

    // Build one block per property (bien) dynamically
    const colors=['#185FA5','#1D9E75','#9B59B6','#E67E22','#E74C3C','#2ECC71','#3498DB','#F39C12'];
    
    // Get all unique logements (properties) that have tenants
    // Use topology properties order, then fallback to logement prefixes
    const allProps=[];
    // First: topology properties
    S.topology.properties.forEach(p=>{
      const propTenants=tenants.filter(t=>(t.logement||'').startsWith(p.name));
      if(propTenants.length>0){
        allProps.push({name:p.name,tenants:propTenants});
      }
    });
    // Then: tenants not matched by topology (edge case)
    const matchedIds=new Set(allProps.flatMap(p=>p.tenants.map(t=>t.id)));
    const unmatched=tenants.filter(t=>!matchedIds.has(t.id));
    if(unmatched.length>0) allProps.push({name:'Autres',tenants:unmatched});
    
    const propBlocks=allProps.map((prop,i)=>{
      const propPmts=filteredPayments.filter(p=>prop.tenants.some(t=>t.id===p.tenant_id));
      const isThisPropDubail=dubailFilter(prop.name);
      const icon=isThisPropDubail?'🏢':'🏠';
      const color=colors[i%colors.length];
      return statsBlock(icon+' '+prop.name,prop.tenants,propPmts,color);
    }).join('');
    
    return `${tabBar}${yearBar}
    ${propBlocks||'<div style="padding:20px;text-align:center;color:var(--text2)">Aucun locataire actif</div>'}
    `;
  }

  if(tab==='dettes'){
    const debts = tenants.map(t=>{
      const unpaid = S.rentPayments.filter(p=>p.tenant_id===t.id&&!p.paye&&p.loyer>0);
      const total = Math.round(unpaid.reduce((s,p)=>s+Math.max(0,(p.loyer||0)-(p.locataire_part||0)-(p.caf||0)),0)*100)/100;
      const detteManuelle = unpaid.length===0?(t.dette||0):0;
      return {t, unpaid, total: total+detteManuelle};
    }).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
    return `${tabBar}
    <div class="card">
      <div class="sec">Impayés & dettes</div>
      ${debts.length===0?'<div style="font-size:13px;color:var(--text2);padding:20px;text-align:center">Aucune dette enregistrée.</div>':''}
      ${debts.map(({t,unpaid,total})=>`
        <div class="row" style="align-items:flex-start;padding:12px 0">
          <div class="fg">
            <div class="fgs">${t.nom} <span style="font-size:11px;color:var(--text2)">${t.logement||''}</span></div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
              ${unpaid.map(p=>{const s=Math.max(0,(p.loyer||0)-(p.locataire_part||0)-(p.caf||0));return `<span class="badge bred" style="font-size:10px">${p.mois} ${p.annee} : ${fmt(s)} (att.${fmt(p.loyer)}/payé ${fmt((p.locataire_part||0)+(p.caf||0))})</span>`;}).join('')}
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-size:16px;font-weight:500;color:var(--red)">${fmt(total)}</div>
            <div style="font-size:11px;color:var(--text2)">${unpaid.length} mois impayé(s)</div>
          </div>
        </div>`).join('')}
    </div>`;
  }

    if(tab==='emises'){
    const dubailTenantIds=isDubail?S.tenants.filter(t=>dubailFilter(t.logement||'')).map(t=>t.id):null;
    const allRp=S.rentPayments.filter(p=>p.annee===year&&p.paye&&(!dubailTenantIds||dubailTenantIds.includes(p.tenant_id)));
    // Releves linked to tenants (water/charges invoices)
    const allRel=S.releves.filter(r=>{
      const cpt=S.compteurs.find(c=>c.id===r.compteur_id);
      return cpt&&cpt.tenant_id&&(r.date||'').startsWith(String(year))&&(!dubailTenantIds||dubailTenantIds.includes(cpt.tenant_id));
    });
    function getBienE(t){if(!t||!t.logement)return 'Non class\u00e9';const sep=t.logement.includes(' \u2014 ')?' \u2014 ':' - ';return t.logement.split(sep)[0];}
    function getZoneE(t){if(!t||!t.logement)return '';const sep=t.logement.includes(' \u2014 ')?' \u2014 ':' - ';return t.logement.includes(sep)?t.logement.split(sep).slice(1).join(sep):'';}
    // Group quittances
    const rpByBien={};
    allRp.forEach(function(p){
      const t=S.tenants.find(x=>x.id===p.tenant_id);
      const b=getBienE(t);const z=getZoneE(t)||t?.nom||'';
      if(!rpByBien[b])rpByBien[b]={};if(!rpByBien[b][z])rpByBien[b][z]=[];
      rpByBien[b][z].push({...p,_t:t});
    });
    // Group releves
    const relByBien={};
    allRel.forEach(function(r){
      const cpt=S.compteurs.find(c=>c.id===r.compteur_id)||{};
      const t=S.tenants.find(x=>x.id===cpt.tenant_id);
      const b=getBienE(t);const z=getZoneE(t)||t?.nom||'';
      if(!relByBien[b])relByBien[b]={};if(!relByBien[b][z])relByBien[b][z]=[];
      relByBien[b][z].push({...r,_t:t,_cpt:cpt});
    });
    function buildQttBlock(byBien){
      const color='#185FA5';const title='Quittances de loyer';
      const biens=Object.keys(byBien).sort();
      if(!biens.length)return '<div style="padding:16px;text-align:center;color:var(--text2)">Aucune quittance en '+year+'</div>';
      const bHtml=biens.map(function(bien){
        const zones=Object.keys(byBien[bien]).sort();
        const bT=zones.reduce((s,z)=>s+byBien[bien][z].reduce((s2,f)=>s2+(f.locataire_part||0)+(f.caf||0),0),0);
        const zHtml=zones.map(function(zone){
          const items=[...byBien[bien][zone]].sort((a,b2)=>(a.mois_num||0)>(b2.mois_num||0)?1:-1);
          const zT=items.reduce((s,f)=>s+(f.locataire_part||0)+(f.caf||0),0);
          const rows=items.map(function(f){
            const recu=(f.locataire_part||0)+(f.caf||0);const sol=Math.round(((f.loyer||0)-recu)*100)/100;
            return '<tr><td style="font-size:11px">'+(f.mois||'')+' '+(f.annee||'')+'</td>'
              +'<td>'+(f._t?.nom||'')+'</td>'
              +'<td style="text-align:right">'+fmt(f.loyer||0)+'</td>'
              +'<td style="text-align:right;color:var(--green)">'+fmt(recu)+'</td>'
              +'<td style="text-align:right;color:'+(sol>0?'var(--red)':'var(--green)')+';">'+fmt(sol)+'</td>'
              +'<td style="text-align:center;white-space:nowrap">'
                +'<button class="btn btn-sm" data-print-qtt="'+f.id+'" style="font-size:10px;padding:2px 5px">&#128438;</button>'
                +(isAdmin()?'<button class="btn btn-d btn-sm" data-del-rp="'+f.id+'" style="font-size:10px;padding:2px 5px;margin-left:3px">&#10005;</button>':'')
              +'</td></tr>';
          }).join('');
          return '<tr style="background:var(--bg2)"><td colspan="6" style="font-size:11px;font-weight:600;padding:4px 8px;color:var(--text2)">'+(zone||'G\u00e9n\u00e9ral')+' \u2014 '+fmt(zT)+'</td></tr>'+rows;
        }).join('');
        return '<div class="card" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;padding-bottom:6px;margin-bottom:8px;border-bottom:1.5px solid '+color+'"><div style="font-size:13px;font-weight:600;color:'+color+'">&#127968; '+bien+'</div><div style="font-size:12px;font-weight:600">'+fmt(bT)+'</div></div><div style="overflow-x:auto"><table style="min-width:450px"><thead><tr><th style="font-size:10px">Mois</th><th style="font-size:10px">Locataire</th><th style="font-size:10px;text-align:right">Attendu</th><th style="font-size:10px;text-align:right">Re\u00e7u</th><th style="font-size:10px;text-align:right">Solde</th><th style="font-size:10px">Actions</th></tr></thead><tbody>'+zHtml+'</tbody></table></div></div>';
      }).join('');
      const gT=biens.reduce((s,b)=>s+Object.keys(byBien[b]).reduce((s2,z)=>s2+byBien[b][z].reduce((s3,f)=>s3+(f.locataire_part||0)+(f.caf||0),0),0),0);
      return '<div style="font-size:14px;font-weight:700;color:'+color+';margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid '+color+'">'+title+'</div>'+bHtml+'<div class="card" style="background:var(--bg2);margin-bottom:20px"><div style="display:flex;justify-content:space-between;font-weight:700"><span>Total '+year+'</span><span>'+fmt(gT)+'</span></div></div>';
    }
    function buildRelBlock(byBien){
      const color='#1D9E75';const title='Factures charges/eau';
      const biens=Object.keys(byBien).sort();
      if(!biens.length)return '<div style="padding:16px;text-align:center;color:var(--text2)">Aucune facture eau en '+year+'</div>';
      const bHtml=biens.map(function(bien){
        const zones=Object.keys(byBien[bien]).sort();
        const bT=zones.reduce((s,z)=>s+byBien[bien][z].reduce((s2,r)=>{
          const conso=Math.round(((r.nouvel_index||0)-(r.ancien_index||0))*1000)/1000;
          return s2+Math.round(conso*(r.prix_unitaire||r._cpt?.prix_unitaire||0)*100)/100;
        },0),0);
        const zHtml=zones.map(function(zone){
          const items=[...byBien[bien][zone]].sort((a,b2)=>(a.date||'')>(b2.date||'')?1:-1);
          const zT=items.reduce((s,r)=>{const co=Math.round(((r.nouvel_index||0)-(r.ancien_index||0))*1000)/1000;return s+Math.round(co*(r.prix_unitaire||r._cpt?.prix_unitaire||0)*100)/100;},0);
          const rows=items.map(function(r){
            const conso=Math.round(((r.nouvel_index||0)-(r.ancien_index||0))*1000)/1000;
            const montant=Math.round(conso*(r.prix_unitaire||r._cpt?.prix_unitaire||0)*100)/100;
            const st=r.paye?'<span class="badge bgreen">\u2713 Acquitt\u00e9e</span>':r.facture_envoyee?'<span class="badge bblue">&#128438; Factur\u00e9e</span>':'<span class="badge bgray">\u25cf En attente</span>';
            return '<tr>'
              +'<td style="font-size:11px;white-space:nowrap">'+dateLabel(r.date)+'</td>'
              +'<td>'+(r._t?.nom||'')+'</td>'
              +'<td style="font-size:11px;color:var(--text2)">'+(r._cpt?.name||'')+'</td>'
              +'<td style="text-align:right;font-size:11px">'+conso+' '+(r._cpt?.unite||'m\u00b3')+'</td>'
              +'<td style="text-align:right;font-weight:500">'+fmt(montant)+'</td>'
              +'<td style="text-align:center">'+st+'</td>'
              +'<td style="text-align:center;white-space:nowrap">'
                +'<button class="btn btn-sm" data-print-releve="'+r.id+'" style="font-size:10px;padding:2px 5px" title="Imprimer">&#128438;</button>'
                +'<button class="btn btn-sm" style="font-size:10px;padding:2px 5px;margin-left:3px;background:var(--amber);color:#fff" data-relance-releve="'+r.id+'" title="Envoyer relance">&#128233;</button>'
                +(isAdmin()?'<button class="btn btn-d btn-sm" data-del-releve="'+r.id+'" style="font-size:10px;padding:2px 5px;margin-left:3px">&#10005;</button>':'')
              +'</td></tr>';
          }).join('');
          return '<tr style="background:var(--bg2)"><td colspan="7" style="font-size:11px;font-weight:600;padding:4px 8px;color:var(--text2)">'+(zone||'G\u00e9n\u00e9ral')+' \u2014 '+fmt(zT)+'</td></tr>'+rows;
        }).join('');
        return '<div class="card" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;padding-bottom:6px;margin-bottom:8px;border-bottom:1.5px solid '+color+'"><div style="font-size:13px;font-weight:600;color:'+color+'">&#127968; '+bien+'</div><div style="font-size:12px;font-weight:600">'+fmt(bT)+'</div></div><div style="overflow-x:auto"><table style="min-width:520px"><thead><tr><th style="font-size:10px">Date</th><th style="font-size:10px">Locataire</th><th style="font-size:10px">Compteur</th><th style="font-size:10px;text-align:right">Conso.</th><th style="font-size:10px;text-align:right">Montant</th><th style="font-size:10px">Statut</th><th style="font-size:10px">Actions</th></tr></thead><tbody>'+zHtml+'</tbody></table></div></div>';
      }).join('');
      const gT=biens.reduce((s,b)=>s+Object.keys(byBien[b]).reduce((s2,z)=>s2+byBien[b][z].reduce((s3,r)=>{const co=Math.round(((r.nouvel_index||0)-(r.ancien_index||0))*1000)/1000;return s3+Math.round(co*(r.prix_unitaire||r._cpt?.prix_unitaire||0)*100)/100;},0),0),0);
      return '<div style="font-size:14px;font-weight:700;color:'+color+';margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid '+color+'">'+title+'</div>'+bHtml+'<div class="card" style="background:var(--bg2);margin-bottom:20px"><div style="display:flex;justify-content:space-between;font-weight:700"><span>Total '+year+'</span><span>'+fmt(gT)+'</span></div></div>';
    }
    return tabBar+yearBar
      +'<div class="card" style="margin-bottom:16px">'+buildQttBlock(rpByBien)+'</div>'
      +'<div class="card">'+buildRelBlock(relByBien)+'</div>';
  }



  return '';
}



function renderFactures(){
  const fmt = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2}).format(n||0);
  const factures = S.factures||[];
  const fTab = S.facturesTab||'liste';
  const year = S.facturesYear||new Date().getFullYear();
  const compte = S.facturesCompte||'all';

  // Filters
  const years = [...new Set(factures.map(f=>f.date?.slice(0,4)).filter(Boolean))].sort().reverse();
  if(!years.includes(String(year))) years.unshift(String(year));

  const filtered = factures.filter(f=>{
    if(year && f.date && !f.date.startsWith(String(year))) return false;
    if(compte==='savadur' && f.compte!=='savadur') return false;
    if(compte==='perso' && f.compte!=='perso') return false;
    return true;
  });

  const totalTTC = filtered.reduce((s,f)=>s+parseFloat(f.montant_ttc||0),0);
  const nonRaprochees = filtered.filter(f=>!f.rapproche).length;

  const tabBar=`<div class="tab-bar">
    <div class="tab ${fTab==='liste'?'active':''}" data-ftab-factures="liste">📋 Toutes les factures</div>
    <div class="tab ${fTab==='rapprochement'?'active':''}" data-ftab-factures="rapprochement">✅ Rapprochement bancaire</div>
    <div class="tab ${fTab==='export'?'active':''}" data-ftab-factures="export">📥 Exports Excel</div>
  </div>`;

  const yearBar=`<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
    ${years.map(y=>`<button class="pill ${String(year)===y?'active':''}" data-factures-year="${y}">${y}</button>`).join('')}
    <select id="factures-compte-sel" style="margin-left:auto;padding:5px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:12px">
      <option value="all" ${compte==='all'?'selected':''}>Tous les comptes</option>
      <option value="savadur" ${compte==='savadur'?'selected':''}>J&A SAVADUR (savadur56)</option>
      <option value="perso" ${compte==='perso'?'selected':''}>Personnel (antoinejosse56)</option>
    </select>
    ${isAdmin()?`<button class="btn btn-p btn-sm" id="btn-add-facture">+ Facture</button>`:''}
  </div>`;

  const statsBar=`<div class="g4" style="margin-bottom:12px">
    <div class="stat"><div class="stat-l">Factures ${year}</div><div class="stat-v">${filtered.length}</div></div>
    <div class="stat"><div class="stat-l">Total TTC</div><div class="stat-v" style="color:var(--red)">${fmt(totalTTC)}</div></div>
    <div class="stat"><div class="stat-l">Non rapprochées</div><div class="stat-v" style="color:${nonRaprochees>0?'var(--amber)':'var(--green)'}">${nonRaprochees}</div></div>
    <div class="stat"><div class="stat-l">Rapprochées</div><div class="stat-v" style="color:var(--green)">${filtered.length-nonRaprochees}</div></div>
  </div>`;

  // LISTE TAB
  if(fTab==='liste'){
    const CATS=['Travaux/Artisan','Matériaux','Énergie','Téléphone/Internet','Assurance','Abonnement','Autre'];
    const catFilter = S.facturesCat||'all';
    const catBar=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <span class="pill ${catFilter==='all'?'active':''}" data-fcat-factures="all">Toutes</span>
      ${CATS.map(c=>`<span class="pill ${catFilter===c?'active':''}" data-fcat-factures="${c}">${c}</span>`).join('')}
    </div>`;
    const display = catFilter==='all'?filtered:filtered.filter(f=>f.categorie===catFilter);
    return `${tabBar}${yearBar}${statsBar}${catBar}
    <div class="card"><div style="overflow-x:auto"><table>
      <thead><tr>
        <th>Date</th><th>Fournisseur</th><th>Catégorie</th><th>Bien / BT</th>
        <th>Compte</th><th>HT</th><th>TVA</th><th>TTC</th><th>Rapproché</th><th></th>
      </tr></thead>
      <tbody>
      ${display.length===0?`<tr><td colspan="10" style="text-align:center;padding:20px;color:var(--text2)">Aucune facture. Cliquez "+ Facture" pour commencer.</td></tr>`:''}
      ${display.map(f=>{
        const wo=f.wo_id?S.workOrders.find(w=>w.id===f.wo_id):null;
        const bien=f.bien||wo?.topo_ref?.propName||'—';
        return `<tr style="${!f.rapproche?'background:var(--red-bg)opacity:0.3':''}">
          <td style="font-size:12px;white-space:nowrap">${f.date?new Date(f.date).toLocaleDateString('fr-FR'):'—'}</td>
          <td style="font-weight:500;font-size:13px">${f.fournisseur||'—'}</td>
          <td><span class="badge bblue" style="font-size:10px">${f.categorie||'—'}</span></td>
          <td style="font-size:11px;color:var(--text2)">${bien}${wo?`<br><span style="color:var(--blue)">BT: ${wo.title}</span>`:''}</td>
          <td style="font-size:11px">${f.compte==='savadur'?'🏢 SAVADUR':'🏠 Perso'}</td>
          <td style="font-size:12px">${f.montant_ht>0?fmt(f.montant_ht):'—'}</td>
          <td style="font-size:12px;color:var(--amber)">${f.taux_tva>0?fmt(f.montant_ttc-f.montant_ht)+'<br><span style=\'font-size:10px\'>'+f.taux_tva+'%</span>':'—'}</td>
          <td style="font-weight:600;color:var(--red)">${fmt(f.montant_ttc)}</td>
          <td style="text-align:center">
            <input type="checkbox" data-rapproche-facture="${f.id}" ${f.rapproche?'checked':''} style="width:16px;height:16px;cursor:pointer">
          </td>
          <td style="white-space:nowrap">
            ${f.url_drive?`<a href="${f.drive_url}" target="_blank" class="btn btn-sm">📄</a>`:''}
            ${isAdmin()?`<button class="btn btn-sm" data-edit-facture="${f.id}">✎</button>`:''}

  // EXPORT TAB
  if(fTab==='export'){
    return `${tabBar}${yearBar}
    <div class="card">
      <div class="sec" style="margin-bottom:12px">📥 Exports Excel</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div style="background:var(--bg2);padding:14px;border-radius:var(--radius)">
          <div style="font-size:13px;font-weight:600;margin-bottom:4px">📊 Factures dépenses</div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:10px">Toutes les factures de l'année, triées par date, avec statut de rapprochement</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-p btn-sm" id="btn-export-factures-all">📥 Toutes (${year})</button>
