<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f3;min-height:100vh}
:root{--bg:#fff;--bg2:#f5f5f3;--bg3:#efefec;--border:#e5e5e0;--border2:#d0d0ca;--text:#1a1a1a;--text2:#6b6b68;--text3:#9b9b98;--green:#1D9E75;--green-bg:#E1F5EE;--green-text:#0F6E56;--amber:#BA7517;--amber-bg:#FAEEDA;--red:#E24B4A;--red-bg:#FCEBEB;--red-text:#A32D2D;--blue:#185FA5;--blue-bg:#E6F1FB;--teal-bg:#E1F5EE;--purple-bg:#EEEDFE;--purple-text:#534AB7;--radius:8px;--radius-lg:12px}
/* dark mode disabled */
html,body{color-scheme:light!important;background:#fff!important;color:#1a1a1a!important}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;min-width:210px;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-header{padding:14px 16px;border-bottom:0.5px solid var(--border)}
.logo{font-size:15px;font-weight:600}.logo span{color:var(--green)}
.nav-section{padding:6px 0}
.nav-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:8px 14px 3px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;font-size:13px;color:var(--text2);transition:background .1s;border-radius:0}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--bg2);color:var(--text);font-weight:500}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:1px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.bgreen{background:var(--green-bg);color:var(--green-text)}.bamber{background:var(--amber-bg);color:var(--amber)}.bred{background:var(--red-bg);color:var(--red-text)}.bblue{background:var(--blue-bg);color:var(--blue)}.bteal{background:var(--teal-bg);color:var(--green-text)}.bpurple{background:var(--purple-bg);color:var(--purple-text)}.bgray{background:var(--bg3);color:var(--text2)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sidebar{transition:transform .25s ease,width .25s ease}
.sidebar.collapsed{width:0!important;min-width:0!important;overflow:hidden;border:none}
.hamburger{display:none;align-items:center;justify-content:center;width:36px;height:36px;cursor:pointer;border-radius:8px;background:var(--bg2);border:0.5px solid var(--border2);flex-shrink:0}
.hamburger svg{width:18px;height:18px;stroke:var(--text);stroke-width:2;fill:none}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:99;cursor:pointer}
@media(max-width:768px){
  .hamburger{display:flex}
  .sidebar{position:fixed;top:0;left:0;height:100vh;z-index:100;transform:translateX(-100%);width:220px!important;min-width:220px!important;box-shadow:4px 0 20px rgba(0,0,0,.15)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{width:100vw}
  .topbar{padding:10px 12px;gap:8px}
}
.topbar{height:50px;background:var(--bg);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0}
.topbar h1{font-size:15px;font-weight:500;flex:1}
.btn{padding:6px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:12px;cursor:pointer;transition:background .1s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--green);border-color:var(--green);color:#fff}.btn-p:hover{background:var(--green-text)}
.btn-d{background:var(--red);border-color:var(--red);color:#fff}.btn-d:hover{background:var(--red-text)}
.btn-sm{padding:3px 8px;font-size:11px}
.content{flex:1;overflow-y:auto;padding:18px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat{background:var(--bg2);border-radius:var(--radius);padding:11px}
.stat-v{font-size:22px;font-weight:500;margin-top:2px}
.stat-l{font-size:11px;color:var(--text2)}
.sec{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.row:last-child{border-bottom:none}
.fg{flex:1}
.fgs{font-size:13px;font-weight:500}
.fgsub{font-size:11px;color:var(--text2);margin-top:1px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 10px;font-weight:500;font-size:11px;color:var(--text2);border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
td{padding:7px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit}
.form-group textarea{min-height:70px;resize:vertical}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:20px;width:500px;max-width:96%;max-height:85vh;overflow-y:auto}
.modal-hd{font-size:14px;font-weight:500;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.xbtn{cursor:pointer;font-size:20px;color:var(--text2);background:none;border:none;line-height:1;padding:0}
.tab-bar{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:14px;overflow-x:auto}
.tab{padding:7px 14px;font-size:12px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-0.5px;white-space:nowrap}
.tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--green)}

.alert-r{padding:9px 12px;border-radius:var(--radius);font-size:12px;margin-bottom:12px;background:var(--red-bg);color:var(--red-text);border:0.5px solid #F7C1C1}

function isDubailProfile(){
  const u=S.currentUser;
  if(!u||u.role==='admin')return false;
  // Check profile field OR if visible_tabs contains locatif but not tools (= dubail pattern)
  if(u.profile==='dubail')return true;
  // Fallback: if user has visible_tabs set with locatif but no tools/etiquettes
  if(u.visible_tabs&&u.visible_tabs.length>0){
    const vt=u.visible_tabs;
    if(vt.includes('locatif')&&!vt.includes('tools')&&!vt.includes('etiquettes'))return true;
  }
  return false;
}
function dubailFilter(str){
  const s=(str||'').toLowerCase();

// Retourne les IDs d'assets liés à Dubail
function getDubailAssetIds(){
  const ids=new Set();
  // Find dubail property in topology
  S.topology.properties.forEach(p=>{
    if(!dubailFilter(p.name))return;
    // Add asset linked to this property node
    if(p.assetId)ids.add(p.assetId);
    (p.assetIds||[]).forEach(id=>ids.add(id));
    (p.zones||[]).forEach(z=>{
      if(z.assetId)ids.add(z.assetId);
      (z.assetIds||[]).forEach(id=>ids.add(id));
      (z.subZones||[]).forEach(s=>{
        if(s.assetId)ids.add(s.assetId);
        (s.assetIds||[]).forEach(id=>ids.add(id));
      });
    });
  });
  // Also match by asset name or location
  S.assets.forEach(a=>{
    if(dubailFilter(a.name)||dubailFilter(a.location||''))ids.add(a.id);
  });
  return ids;
}

// Retourne les BT filtrés selon le profil
function getFilteredWOs(){
  const u=S.currentUser;
  if(!u||u.role==='admin')return S.workOrders;
  // If user has explicit visible_assets, filter WOs by those assets
  const va=u.visible_assets||u.assets||[];
  if(va.length>0){
    return S.workOrders.filter(w=>{
      if(!w.asset_id&&!w.topo_ref)return false; // no link = hide
      if(w.asset_id&&va.includes(w.asset_id))return true;
      if(w.topo_ref){
        // Check if topo_ref's asset is in visible_assets
        const a=S.assets.find(x=>x.id===w.topo_ref.assetId);
        if(a&&va.includes(a.id))return true;
        // Fallback: dubail name check
        if(isDubailProfile()&&dubailFilter(w.topo_ref.propName||''))return true;
      }
      return false;
    });
  }
  if(!isDubailProfile())return S.workOrders;
  // Dubail without explicit assets: filter by topo_ref or asset name
  const dubailAssetIds=getDubailAssetIds();
  return S.workOrders.filter(w=>{
    const tr=w.topo_ref;
    if(tr&&dubailFilter(tr.propName||''))return true;
    if(w.asset_id){
      if(dubailAssetIds.has(w.asset_id))return true;
      const a=S.assets.find(x=>x.id===w.asset_id);
      if(a&&(dubailFilter(a.name)||dubailFilter(a.location||'')))return true;
    }
    return false;
  });
}

// Retourne les assets filtrés selon le profil  
function getFilteredAssets(){
  const u=S.currentUser;
  if(!u||u.role==='admin')return S.assets;
  // If user has explicit visible_assets list, use it
  const va=u.visible_assets||u.assets||[];
  if(va.length>0)return S.assets.filter(a=>va.includes(a.id));
  // Dubail: filter by topology
  if(isDubailProfile()){
    const ids=getDubailAssetIds();
    return S.assets.filter(a=>ids.has(a.id)||dubailFilter(a.name)||dubailFilter(a.location||''));
  }
  return S.assets;
}

function bindLogin(){
  // Pre-fill saved credentials
  const savedEmail = localStorage.getItem('gmao_saved_email')||'';
  const savedPass  = localStorage.getItem('gmao_saved_pass')||'';
  if(savedEmail){ document.getElementById('le').value=savedEmail; }
  if(savedPass){  document.getElementById('lp').value=savedPass; }
  if(savedEmail&&savedPass){ document.getElementById('lrem').checked=true; }

  document.getElementById('lb').onclick = async () => {
    const email = document.getElementById('le').value.trim();
    const pass  = document.getElementById('lp').value;
    const remember = document.getElementById('lrem').checked;
    if(S.users.length===0){
      const el=document.getElementById('lerr');
      el.style.display='block';
      el.textContent='Erreur : impossible de charger les utilisateurs. Vérifiez votre connexion.';
      return;
    }
    const user  = S.users.find(u => u.email === email && u.password === pass);
    if(user){
      if(remember){
        localStorage.setItem('gmao_saved_email', email);
        localStorage.setItem('gmao_saved_pass',  pass);
      } else {
        localStorage.removeItem('gmao_saved_email');
        localStorage.removeItem('gmao_saved_pass');
      }
      S.currentUser = user; render();
    } else {
      const el=document.getElementById('lerr');
      el.style.display='block';
      el.textContent='Identifiants incorrects';
    }
  };
  document.getElementById('lp').onkeydown = e => { if(e.key==='Enter') document.getElementById('lb').click(); };
}


const USER_PROFILE_TABS = {
  admin:      null,
  technicien: ['dashboard','assets','tasks','workorders','tools','consommables','etiquettes','loans','maintenance','rangements'],
  dubail:     ['assets','workorders','consommables','locatif','compteurs','finances'],
  perso:      ['dashboard','assets','tasks','workorders','vehicles','finances','famille'],
  custom:     null
};
function getUserVisibleTabs(){
  const u=S.currentUser;
  if(!u||u.role==='admin') return null;
  if(u.visible_tabs&&u.visible_tabs.length>0) return u.visible_tabs;
  return USER_PROFILE_TABS[u.profile||'technicien']||null;
}
function applyUserProfile(prof){
  const tabs=USER_PROFILE_TABS[prof];
  document.querySelectorAll('.utab').forEach(cb=>{
    cb.checked = !tabs||tabs.includes(cb.value);
  });
}

  technicien: {label:'Technicien',      tabs:['dashboard','assets','tasks','workorders','tools','consommables','etiquettes','loans','maintenance','rangements','vehicles']},
  dubail:     {label:'26 rue Dubail',   tabs:['dashboard','assets','workorders','consommables','locatif','compteurs','finances']},

  lecteur:    {label:'Lecteur',         tabs:['dashboard','assets','tasks','workorders','maintenance']},
  custom:     {label:'Personnalisé',    tabs:[]}

  dashboard:'Tableau de bord',assets:'Équipements',tasks:'Échéances',
  workorders:'Bons de travaux',tools:'Outils',consommables:'Consommables',
  etiquettes:'Étiquettes QR',loans:'Prêts outils',vehicles:'Véhicules',

function getUserTabs(user){
  if(!user||user.role==='admin')return null; // null = tout visible
  // Priorité : visible_tabs personnalisés > profil prédéfini
  if(user.visible_tabs&&user.visible_tabs.length>0)return user.visible_tabs;
  const prof=USER_PROFILES[user.profile]||USER_PROFILES['technicien'];
  return prof.tabs;
}
function canSeeTab(tabId){
  const tabs=getUserTabs(S.currentUser);
  return !tabs||tabs.includes(tabId);
}
function getUserAssets(user){
  if(!user||user.role==='admin')return S.assets;
  const vis=user.visible_assets||user.assets||[];
  if(vis.length===0)return S.assets; // vide = tous
  return S.assets.filter(a=>vis.includes(a.id));
}

function applyProfile(prof){
  const profileTabs=USER_PROFILES[prof]?.tabs||[];
  document.querySelectorAll('.utab').forEach(cb=>{
    cb.checked = (prof==='admin')||profileTabs.includes(cb.value);
  });
}

function navItems(){
  const assets = accessAssets(S.currentUser);
  const overdueT = S.tasks.filter(t=>t.status==='overdue'&&(isAdmin()||assets.map(a=>a.id).includes(t.asset_id))).length;
  const loanedN = S.loans.filter(l=>!l.returned).length;
  const openWO = getFilteredWOs().filter(w=>w.status==='open').length;
  const allGroups = [
    {group:'Principal', items:[
      {id:'mobile_home', label:'Accueil mobile', icon:'📱'},
      {id:'dashboard', label:'Tableau de bord', icon:'⊞'},
      {id:'assets', label:'Équipements', icon:'◧', badge: S.assets.filter(a=>a.status==='urgent').length||0},
      {id:'tasks', label:'Échéances', icon:'◫', badge: overdueT},
      {id:'workorders', label:'Bons de travaux', icon:'◪', badge: openWO},
    ]},
    {group:'Outils', items:[
      {id:'tools', label:'Inventaire outils', icon:'◈'},
      {id:'consommables', label:'Consommables', icon:'📦'},
      {id:'etiquettes', label:'Étiquettes & QR', icon:'◩'},
      {id:'loans', label:'Prêts en cours', icon:'◉', badge: loanedN},
    ]},
    {group:'Véhicules', items:[
      {id:'vehicles', label:'Mes véhicules', icon:'🚗'},
    ]},
    {group:'Immobilier', items:[
      {id:'topology', label:'Topologie biens', icon:'◍'},
      {id:'maintenance', label:'Gammes entretien', icon:'◌'},
    ]},
    {group:'Location courte durée', items:[
      {id:'reservations', label:'Réservations', icon:'📅'},
    ]},
    {group:'Locatif', items:[
      {id:'locatif', label:'Gestion locative', icon:'🏘'},
      {id:'compteurs', label:'Compteurs', icon:'💧'},
    ]},
    {group:'Finances', items:[
      {id:'finances', label:'Coûts & Revenus', icon:'€'},
      {id:'factures', label:'Factures', icon:'🧾'},
    ]},
    {group:'Admin', items: isAdmin()?[
      {id:'users', label:'Utilisateurs', icon:'◎'},
    ]:[]},
    {group:'Système', items: isAdmin()?[
      {id:'settings', label:'Paramètres', icon:'⚙️'},
    ]:[]},
    {group:'Famille', items:[
      {id:'famille', label:'Suivi famille', icon:'👨‍👩‍👧‍👦'},
    ]},
  ];
  // Apply visible_tabs filter
  const visibleTabs = getUserVisibleTabs();
  if(!visibleTabs) return allGroups;
  return allGroups.map(g=>({...g, items:g.items.filter(i=>visibleTabs.includes(i.id))})).filter(g=>g.items.length>0);
}

function renderDashboard(){
  const assets = getFilteredAssets();
  const wos = getFilteredWOs();
  const tasks = S.tasks.filter(t=>isAdmin()||assets.map(a=>a.id).includes(t.asset_id));
  const overdueT = tasks.filter(t=>t.status==='overdue').length;
  const loanedN = S.loans.filter(l=>!l.returned).length;
  const openWO = wos.filter(w=>w.status==='open').length;
  const dubailAssetIdSet=isDubailProfile()?getDubailAssetIds():null;
  const upcoming = S.maintenanceTemplates.filter(mt=>{
    if(dubailAssetIdSet&&mt.asset_id&&!dubailAssetIdSet.has(mt.asset_id))return false;
    if(dubailAssetIdSet&&!mt.asset_id)return false;
    const d = mt.type==='periodic' ? mt.next_due : mt.due_date;
    const n = daysUntil(d); return n!==null && n<=60 && n>=-10;
  }).sort((a,b)=>new Date(a.type==='periodic'?a.next_due:a.due_date)-new Date(b.type==='periodic'?b.next_due:b.due_date)).slice(0,5);

  return `<div class="g4" style="margin-bottom:16px">
    <div class="stat"><div class="stat-l">Équipements</div><div class="stat-v">${assets.length}</div></div>
    <div class="stat"><div class="stat-l">Tâches en retard</div><div class="stat-v" style="color:var(--red)">${overdueT}</div></div>
    <div class="stat"><div class="stat-l">Bons ouverts</div><div class="stat-v" style="color:var(--amber)">${openWO}</div></div>
    <div class="stat"><div class="stat-l">Outils prêtés</div><div class="stat-v">${loanedN}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="card">
      <div class="sec">Prochaines gammes (60j)</div>
      ${upcoming.map(mt=>{
        const d = mt.type==='periodic' ? mt.next_due : mt.due_date;
        const days = daysUntil(d);
        const asset = S.assets.find(a=>a.id===mt.asset_id);
        return `<div class="row"><div class="fg"><div class="fgs">${mt.name}</div><div class="fgsub">${asset?.name||'—'}</div></div>
          <span class="badge ${days<0?'bred':days<=15?'bamber':'bblue'}">${days<0?`${-days}j retard`:`${days}j`}</span></div>`;
      }).join('')}
      ${upcoming.length===0?'<div style="font-size:12px;color:var(--text2)">Aucune échéance proche.</div>':''}
    </div>
    <div class="card">
      <div class="sec">Bons de travaux ouverts</div>
      ${getFilteredWOs().filter(w=>w.status==='open').slice(0,5).map(w=>{
        const asset = S.assets.find(a=>a.id===w.asset_id);
        return `<div class="row"><div class="fg"><div class="fgs">${w.title}</div><div class="fgsub">${asset?.name||'—'} · ${dateLabel(w.date)}</div></div>
          <span class="badge ${w.category==='Urgence'?'bred':'bamber'}">${w.category}</span></div>`;
      }).join('')}
      ${getFilteredWOs().filter(w=>w.status==='open').length===0?'<div style="font-size:12px;color:var(--text2)">Aucun bon ouvert.</div>':''}
    </div>
  </div>`;
}

function renderAssets(){
  const assets = getFilteredAssets();
  const as = S.assetNav||{propId:null, zoneId:null, subId:null};

  // Helper: get WOs for an asset or topo node
  function nodeWOs(assetId, propId, zoneId, subId){
    return getFilteredWOs().filter(w=>{
      if(assetId && w.asset_id===assetId) return true;
      if(!w.topo_ref) return false;
      if(subId && w.topo_ref.subId===subId) return true;
      if(!subId && zoneId && w.topo_ref.zoneId===zoneId) return true;
      if(!subId && !zoneId && propId && w.topo_ref.propId===propId) return true;
      return false;
    });
  }

  // Helper: get assets linked to a topo node
  function nodeAssets(propId, zoneId, subId){
    const ids = new Set();
    const prop = S.topology.properties.find(p=>p.id===propId);
    if(!prop) return [];
    if(subId){
      const zone = prop.zones?.find(z=>z.id===zoneId);
      const sub = zone?.subZones?.find(s=>s.id===subId);
      if(sub?.assetId) ids.add(sub.assetId);
      // Also equipment with location matching
    } else if(zoneId){
      const zone = prop.zones?.find(z=>z.id===zoneId);
      if(zone?.assetId) ids.add(zone.assetId);
      (zone?.subZones||[]).forEach(s=>{ if(s.assetId) ids.add(s.assetId); });
    } else {
      if(prop.assetId) ids.add(prop.assetId);
      (prop.zones||[]).forEach(z=>{
        if(z.assetId) ids.add(z.assetId);
        (z.subZones||[]).forEach(s=>{ if(s.assetId) ids.add(s.assetId); });
      });
    }
    return assets.filter(a=>ids.has(a.id));
  }

  function statusBadge(a){
    const s = a.status==='ok'?'bgreen':a.status==='attention'?'bamber':'bred';
    return `<span class="badge ${s}">${a.status==='ok'?'OK':a.status==='attention'?'Attention':'Urgent'}</span>`;
  }

  function woSummary(wos){
    const open = wos.filter(w=>w.status==='open').length;
    const done = wos.filter(w=>w.status==='done').length;
    if(!wos.length) return '';
    return `<div style="display:flex;gap:6px;margin-top:6px">
      ${open>0?`<span class="badge bamber">${open} bon(s) ouvert(s)</span>`:''}
      ${done>0?`<span class="badge bgreen">${done} terminé(s)</span>`:''}
    </div>`;
  }

  function assetCard(a, compact=false){
    const wos = nodeWOs(a.id);
    const days = daysUntil(a.next_maint);
    return `<div class="card" style="cursor:pointer" data-goto-asset="${a.id}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">
        <div><div style="font-weight:500;font-size:13px">${a.name}</div><div style="font-size:11px;color:var(--text2)">${a.type||a.category||''}</div></div>
        ${statusBadge(a)}
      </div>
      ${!compact?`<div style="font-size:12px;color:var(--text2);margin-bottom:6px">${a.description||'—'}</div>`:''}
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);border-top:0.5px solid var(--border);padding-top:6px">
        <span>${dateLabel(a.next_maint)||'Aucun entretien prévu'}</span>
        ${days!==null?`<span class="badge ${days<0?'bred':days<=30?'bamber':'bgray'}">${days<0?`${-days}j retard`:`${days}j`}</span>`:''}
      </div>
      ${woSummary(wos)}
    </div>`;
  }

  // --- LEVEL 0: No property selected → show all properties ---
  if(!as.propId){
    const nonImmo = assets.filter(a=>a.category!=='Immobilier');
    const nonImmoWOs = nonImmo.map(a=>nodeWOs(a.id)).flat();
    return `<div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:14px">Sélectionnez un bien ou consultez directement vos équipements.</div>
      ${S.topology.properties.length>0?`
      <div class="sec">Biens immobiliers</div>
      <div class="g2" style="margin-bottom:20px">
        ${S.topology.properties.map(p=>{
          const pAssets = nodeAssets(p.id, null, null);
          const pWOs = nodeWOs(p.assetId, p.id, null, null);
          const openWOs = pWOs.filter(w=>w.status==='open').length;
          const zones = p.zones||[];
          return `<div class="card" style="cursor:pointer" data-asset-nav-prop="${p.id}">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
              <div><div style="font-weight:500;font-size:14px">🏠 ${p.name}</div><div style="font-size:11px;color:var(--text2)">${zones.length} zone(s)</div></div>
              ${openWOs>0?`<span class="badge bred">${openWOs} bon(s) ouvert(s)</span>`:'<span class="badge bgreen">OK</span>'}
            </div>
            <div style="font-size:12px;color:var(--text2)">${pAssets.length} équipement(s) lié(s)</div>
            ${woSummary(pWOs)}
          </div>`;
        }).join('')}
      </div>`:''}
      ${nonImmo.length>0?`
      <div class="sec">Équipements, véhicules & outillage</div>
      <div class="g2">${nonImmo.map(a=>assetCard(a)).join('')}</div>`:''}
    </div>`;
  }

  // --- LEVEL 1: Property selected, no zone ---
  const prop = S.topology.properties.find(p=>p.id===as.propId);
  if(!prop) { S.assetNav={propId:null,zoneId:null,subId:null}; return renderAssets(); }

  if(!as.zoneId){
    const propAsset = prop.assetId ? assets.find(a=>a.id===prop.assetId) : null;
    const propWOs = nodeWOs(prop.assetId, prop.id, null, null);
    const zones = prop.zones||[];
    return `<div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <span style="cursor:pointer;color:var(--blue);font-size:13px" data-asset-nav-prop="">← Tous les biens</span>
        <span style="color:var(--text3)">›</span>
        <span style="font-size:13px;font-weight:500">🏠 ${prop.name}</span>
      </div>
      ${propAsset?`<div class="card" style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div><div style="font-weight:500">${prop.name}</div><div style="font-size:11px;color:var(--text2)">Bien immobilier</div></div>
          ${statusBadge(propAsset)}
        </div>
        ${woSummary(propWOs)}
        <button class="btn btn-sm" style="margin-top:8px" data-goto-asset="${propAsset.id}">Voir la fiche →</button>
      </div>`:''}
      ${propWOs.length>0?`<div style="margin-bottom:14px">
        <div class="sec">Bons de travaux — ${prop.name}</div>
        ${propWOs.map(w=>`<div class="wo-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div><div style="font-weight:500;font-size:13px">${w.title}</div><div style="font-size:11px;color:var(--text2)">${dateLabel(w.date)}</div></div>
            <span class="badge ${w.status==='done'?'bgreen':'bamber'}">${w.status==='done'?'Terminé':'Ouvert'}</span>
          </div>
          ${w.description?`<div style="font-size:12px;color:var(--text2);margin-top:4px">${w.description}</div>`:''}
        </div>`).join('')}
      </div>`:''}
      ${zones.length>0?`<div class="sec">Zones</div>
      <div class="g2">
        ${zones.map(z=>{
          const zAssets = nodeAssets(prop.id, z.id, null);
          const zWOs = nodeWOs(z.assetId, prop.id, z.id, null);
          const openWOs = zWOs.filter(w=>w.status==='open').length;
          return `<div class="card" style="cursor:pointer" data-asset-nav-zone="${z.id}" data-asset-nav-prop2="${prop.id}">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">
              <div><div style="font-weight:500">📁 ${z.name}</div><div style="font-size:11px;color:var(--text2)">${(z.subZones||[]).length} sous-zone(s)</div></div>
              ${openWOs>0?`<span class="badge bred">${openWOs} ouvert(s)</span>`:''}
            </div>
            <div style="font-size:12px;color:var(--text2)">${zAssets.length} équipement(s)</div>
            ${woSummary(zWOs)}
          </div>`;
        }).join('')}
      </div>`:''}
    </div>`;
  }

  // --- LEVEL 2: Zone selected ---
  const zone = prop.zones?.find(z=>z.id===as.zoneId);
  if(!zone){ S.assetNav.zoneId=null; return renderAssets(); }

  if(!as.subId){
    const zoneAsset = zone.assetId ? assets.find(a=>a.id===zone.assetId) : null;
    const zoneWOs = nodeWOs(zone.assetId, prop.id, zone.id, null);
    const subs = zone.subZones||[];
    return `<div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <span style="cursor:pointer;color:var(--blue);font-size:13px" data-asset-nav-prop="">← Tous les biens</span>
        <span style="color:var(--text3)">›</span>
        <span style="cursor:pointer;color:var(--blue);font-size:13px" data-asset-nav-zone="">🏠 ${prop.name}</span>
        <span style="color:var(--text3)">›</span>
        <span style="font-size:13px;font-weight:500">📁 ${zone.name}</span>
      </div>
      ${zoneAsset?`<div class="card" style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div><div style="font-weight:500">${zone.name}</div><div style="font-size:11px;color:var(--text2)">Zone</div></div>
          ${statusBadge(zoneAsset)}
        </div>
        ${woSummary(zoneWOs)}
        <button class="btn btn-sm" style="margin-top:8px" data-goto-asset="${zoneAsset.id}">Voir la fiche →</button>
      </div>`:''}
      ${zoneWOs.length>0?`<div style="margin-bottom:14px">
        <div class="sec">Bons de travaux — ${zone.name}</div>
        ${zoneWOs.map(w=>`<div class="wo-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div><div style="font-weight:500;font-size:13px">${w.title}</div><div style="font-size:11px;color:var(--text2)">${dateLabel(w.date)}</div></div>
            <span class="badge ${w.status==='done'?'bgreen':'bamber'}">${w.status==='done'?'Terminé':'Ouvert'}</span>
          </div>
          ${w.description?`<div style="font-size:12px;color:var(--text2);margin-top:4px">${w.description}</div>`:''}
        </div>`).join('')}
      </div>`:''}
      ${subs.length>0?`<div class="sec">Sous-zones</div>
      <div class="g2">
        ${subs.map(s=>{
          const sAssets = nodeAssets(prop.id, zone.id, s.id);
          const sWOs = nodeWOs(s.assetId, prop.id, zone.id, s.id);
          const openWOs = sWOs.filter(w=>w.status==='open').length;
          return `<div class="card" style="cursor:pointer" data-asset-nav-sub="${s.id}">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">
              <div><div style="font-weight:500">📂 ${s.name}</div><div style="font-size:11px;color:var(--text2)">${(s.trades||[]).length} corps de métier</div></div>
              ${openWOs>0?`<span class="badge bred">${openWOs} ouvert(s)</span>`:''}
            </div>
            <div style="font-size:12px;color:var(--text2)">${sAssets.length} équipement(s)</div>
            ${woSummary(sWOs)}
          </div>`;
        }).join('')}
      </div>`:''}
      ${subs.length===0?`<div class="sec" style="margin-top:14px">Équipements directs</div>
      <div class="g2">${nodeAssets(prop.id,zone.id,null).map(a=>assetCard(a)).join('')}</div>`:''}
    </div>`;
  }

  // --- LEVEL 3: Subzone selected ---
  const sub = zone.subZones?.find(s=>s.id===as.subId);
  if(!sub){ S.assetNav.subId=null; return renderAssets(); }
  const subWOs = nodeWOs(sub.assetId, prop.id, zone.id, sub.id);
  const subAssets = nodeAssets(prop.id, zone.id, sub.id);

  return `<div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <span style="cursor:pointer;color:var(--blue);font-size:13px" data-asset-nav-prop="">← Tous les biens</span>
      <span style="color:var(--text3)">›</span>
      <span style="cursor:pointer;color:var(--blue);font-size:13px" data-asset-nav-zone="">🏠 ${prop.name}</span>
      <span style="color:var(--text3)">›</span>
      <span style="cursor:pointer;color:var(--blue);font-size:13px" data-asset-nav-sub="">📁 ${zone.name}</span>
      <span style="color:var(--text3)">›</span>
      <span style="font-size:13px;font-weight:500">📂 ${sub.name}</span>
    </div>
    ${subWOs.length>0?`<div style="margin-bottom:14px">
      <div class="sec">Bons de travaux — ${sub.name}</div>
      ${subWOs.map(w=>`<div class="wo-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><div style="font-weight:500;font-size:13px">${w.title}</div><div style="font-size:11px;color:var(--text2)">${dateLabel(w.date)}</div></div>
          <span class="badge ${w.status==='done'?'bgreen':'bamber'}">${w.status==='done'?'Terminé':'Ouvert'}</span>
        </div>
        ${w.description?`<div style="font-size:12px;color:var(--text2);margin-top:4px">${w.description}</div>`:''}
      </div>`).join('')}
    </div>`:''}
    ${subAssets.length>0?`<div class="sec">Équipements</div>
    <div class="g2">${subAssets.map(a=>assetCard(a)).join('')}</div>`:''}
    ${subAssets.length===0&&subWOs.length===0?'<div style="font-size:12px;color:var(--text2)">Aucun équipement ni bon de travaux pour cette sous-zone.</div>':''}
  </div>`;
}

  const hist = a.history||[];

    return `<div class="row"><span style="color:var(--text2);font-size:12px;min-width:160px">${label}</span><span style="font-size:13px;font-weight:500">${val||'—'}</span></div>`;
  }

  return `<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">

  ${S.subTab==='info'?`<div class="g2">

      ${[['Type',a.type||'—'],['Localisation',a.location||'—'],['Prochain entretien',dateLabel(a.next_maint)],['Interventions',hist.length+' entrée(s)']].map(([l,v])=>`<div class="row"><span style="color:var(--text2)">${l}</span><span>${v}</span></div>`).join('')}

        ${cgField('(C.4.1) Raison sociale', cg.raison_sociale)}
        ${cgField('(C.4.2) Adresse', cg.adresse)}
        <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:10px 0 4px">Véhicule</div>
        ${cgField('(D.1) Marque', cg.marque)}
        ${cgField('(D.2) Type / Variante', cg.type_variante)}
        ${cgField('(D.3) Dénomination commerciale', cg.denomination)}
        ${cgField('(E) N° identification (VIN)', cg.vin)}
        ${cgField('(F.1) Masse max. technique (kg)', cg.masse_max)}
        ${cgField('(F.2) Masse en charge max. (kg)', cg.masse_charge)}

        <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:10px 0 4px">Motorisation</div>

  ${S.subTab==='history'?`<div class="card">

      ${canEdit()?`<button class="btn btn-p btn-sm" id="btn-add-history">+ Intervention</button>`:''}

    ${hist.slice().reverse().map(h=>`<div class="row">

      <div class="fg">
        <div style="display:flex;align-items:center;gap:6px"><span class="fgs">${h.type}</span><span class="badge bgray">${dateLabel(h.date)}</span>${h.cost>0?`<span class="badge bblue">${h.cost}€</span>`:''}</div>
        <div class="fgsub">${h.desc}</div>
        <div style="font-size:11px;color:var(--text3)">Par : ${h.by}</div>

    ${hist.length===0?'<div style="font-size:12px;color:var(--text2)">Aucune intervention.</div>':''}

  ${S.subTab==='wo'?`<div class="card">

          <span class="fgs" style="font-size:14px;font-weight:600">${w.title}</span>

    </div>`).join('')}
    ${woList.length===0?'<div style="font-size:12px;color:var(--text2)">Aucun bon.</div>':''}

  ${S.subTab==='docs'?`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="sec" style="margin:0">Documents</div>
      ${canEdit()?`<button class="btn btn-p btn-sm" id="btn-add-doc">+ Document</button>`:''}
    </div>
    ${docs.map(d=>`<div class="row">
      <span style="font-size:16px">${d.type==='devis'?'📋':d.type==='facture'?'🧾':'📄'}</span>
      <div class="fg">
        <div class="fgs">${d.name}</div>
        <div class="fgsub">${d.type} · ${dateLabel(d.date)}</div>
      </div>
      <a href="${d.url}" target="_blank" rel="noopener" class="btn btn-sm btn-p" style="flex-shrink:0">📂 Ouvrir</a>
      ${isAdmin()?`<button class="btn btn-d btn-sm" data-del-doc="${d.id}">✕</button>`:''}
    </div>`).join('')}
    ${docs.length===0?'<div style="font-size:12px;color:var(--text2)">Aucun document.</div>':''}
  </div>`:''}`;
}

function renderTasks(){
  const assets = accessAssets(S.currentUser);
  const tasks = S.tasks.filter(t=>isAdmin()||assets.map(a=>a.id).includes(t.asset_id));
  const sorted = tasks.slice().sort((a,b)=>{const o={overdue:0,pending:1,done:2};return(o[a.status]||1)-(o[b.status]||1)||new Date(a.due_date)-new Date(b.due_date);});
  return `<div class="card"><div style="overflow-x:auto"><table>
    <thead><tr><th>Tâche</th><th>Équipement</th><th>Échéance</th><th>Priorité</th><th>Statut</th><th>Assigné</th><th></th></tr></thead>
    <tbody>
    ${sorted.map(t=>{
      const asset = S.assets.find(a=>a.id===t.asset_id);
      const user = S.users.find(u=>u.id===t.assigned_to);
      return `<tr>
        <td><div style="font-weight:500">${t.title}</div><div style="font-size:11px;color:var(--text2)">${t.description||''}</div></td>
        <td><span style="cursor:pointer;color:var(--blue)" data-goto-asset="${asset?.id}">${asset?.name||'—'}</span></td>
        <td style="font-size:12px">${dateLabel(t.due_date)}</td>
        <td><span class="badge ${t.priority==='high'?'bred':t.priority==='medium'?'bamber':'bblue'}">${t.priority==='high'?'Haute':t.priority==='medium'?'Moyenne':'Basse'}</span></td>
        <td><span class="badge ${t.status==='overdue'?'bred':t.status==='done'?'bgreen':'bamber'}">${t.status==='overdue'?'Retard':t.status==='done'?'Fait':'À faire'}</span></td>
        <td>${user?`<div style="display:flex;align-items:center;gap:5px"><div class="avatar">${user.initials}</div><span style="font-size:12px">${user.name}</span></div>`:'—'}</td>
        <td style="white-space:nowrap">
          ${canEdit()&&t.status!=='done'?`<button class="btn btn-sm" data-done-task="${t.id}">✓</button> `:''}
          ${isAdmin()?`<button class="btn btn-d btn-sm" data-del-task="${t.id}">✕</button>`:''}
        </td>
      </tr>`;
    }).join('')}
    ${sorted.length===0?'<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text2)">Aucune tâche.</td></tr>':''}
    </tbody>
  </table></div></div>`;
}

function renderTopology(){
  const ts = S.topoState;
  const prop = S.topology.properties?.find(p=>p.id===ts.propId);
  const zone = prop?.zones?.find(z=>z.id===ts.zoneId);
  const subZone = zone?.subZones?.find(s=>s.id===ts.subZoneId);
  const trade = subZone?.trades?.find(t=>t.id===ts.tradeId)
             || zone?.trades?.find(t=>t.id===ts.tradeId);

  // Breadcrumb
  function breadcrumb(){
    const parts = [];
    if(prop) parts.push(`<span style="cursor:pointer;color:var(--blue)" data-topo-prop="${prop.id}">${prop.name}</span>`);
    if(zone) parts.push(`<span style="cursor:pointer;color:var(--blue)" data-topo-zone="${zone.id}">${zone.name}</span>`);
    if(subZone) parts.push(`<span style="cursor:pointer;color:var(--blue)" data-topo-subzone="${subZone.id}">${subZone.name}</span>`);
    if(trade) parts.push(`<span>${trade.icon||''} ${trade.name}</span>`);
    return parts.length ? `<div style="font-size:12px;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">${parts.join('<span style="color:var(--text3)">›</span>')}</div>` : '';
  }

  function treeNodeZone(z, propId){
    const exp = ts.expanded[z.id];
    const hasSub = z.subZones&&z.subZones.length>0;
    const hasTrades = z.trades&&z.trades.length>0;
    const hasChildren = hasSub||hasTrades;
    const isSel = ts.zoneId===z.id&&!ts.subZoneId;
    return `<div>
      <div class="tree-row ${isSel?'selected':''}" data-topo-zone="${z.id}">
        ${hasChildren?`<span class="tree-toggle" data-topo-toggle="${z.id}">${exp?'▾':'▸'}</span>`:'<span class="tree-toggle"></span>'}
        <span>📁</span><span style="flex:1">${z.name}</span>
        ${isAdmin()?`<span style="font-size:11px;color:var(--text3);cursor:pointer;padding:0 3px" data-add-sub="${z.id}" title="Ajouter sous-zone">+</span>`:''}
        ${isAdmin()?`<span style="font-size:11px;color:#E24B4A;cursor:pointer;padding:0 3px" data-del-zone="${z.id}" data-del-zone-prop="${propId}">✕</span>`:''}
      </div>
      ${hasChildren&&exp?`<div class="tree-children">
        ${(z.subZones||[]).map(s=>treeNodeSub(s,z.id,propId)).join('')}
        ${(z.trades||[]).map(t=>treeNodeTrade(t,z.id,null,propId)).join('')}
      </div>`:''}
    </div>`;
  }

  function treeNodeSub(s, zoneId, propId){
    const exp = ts.expanded[s.id];
    const hasTrades = s.trades&&s.trades.length>0;
    const isSel = ts.subZoneId===s.id;
    return `<div>
      <div class="tree-row ${isSel?'selected':''}" data-topo-subzone="${s.id}" data-topo-subzone-zone="${zoneId}">
        ${hasTrades?`<span class="tree-toggle" data-topo-toggle="${s.id}">${exp?'▾':'▸'}</span>`:'<span class="tree-toggle"></span>'}
        <span>📂</span><span style="flex:1">${s.name}</span>
        ${isAdmin()?`<span style="font-size:11px;color:var(--text3);cursor:pointer;padding:0 3px" data-add-trade="${s.id}" data-add-trade-zone="${zoneId}" title="Ajouter corps de métier">+</span>`:''}
        ${isAdmin()?`<span style="font-size:11px;color:#E24B4A;cursor:pointer;padding:0 3px" data-del-sub="${s.id}" data-del-sub-zone="${zoneId}" data-del-sub-prop="${propId}">✕</span>`:''}
      </div>
      ${hasTrades&&exp?`<div class="tree-children">${s.trades.map(t=>treeNodeTrade(t,zoneId,s.id,propId)).join('')}</div>`:''}
    </div>`;
  }

  function treeNodeTrade(t, zoneId, subId, propId){
    const isSel = ts.tradeId===t.id;
    return `<div class="tree-row ${isSel?'selected':''}" data-topo-trade="${t.id}" data-topo-trade-zone="${zoneId}" data-topo-trade-sub="${subId||''}">
      <span class="tree-toggle"></span>
      <span>${t.icon||'🔧'}</span><span style="flex:1">${t.name}</span>
      ${isAdmin()?`<span style="font-size:11px;color:#E24B4A;cursor:pointer;padding:0 3px" data-del-trade="${t.id}" data-del-trade-zone="${zoneId}" data-del-trade-sub="${subId||''}" data-del-trade-prop="${propId}">✕</span>`:''}
    </div>`;
  }

  // Determine what to show in right panel

  function topoAssetPanel(nodeAssetId, nodeName){
    if(!nodeAssetId && !nodeName) return '';
    const asset = nodeAssetId ? S.assets.find(a=>a.id===nodeAssetId) : null;
    const ts = S.topoState;
    // Find WOs linked to this topo node (by assetId OR by topo_ref matching current node)
    const wos = S.workOrders.filter(w=>{
      if(nodeAssetId && w.asset_id===nodeAssetId) return true;
      if(!w.topo_ref) return false;
      if(ts.subZoneId && w.topo_ref.subId===ts.subZoneId) return true;

}function renderReservations(){

            +(menagePresta?'🧹 Presta':'🙋 Moi')
          +'</button>'
        +'</td>'
        +'<td style="text-align:right;font-weight:600">'+( r.montant_total?fmt(r.montant_total):'<span style="color:var(--amber)">⚠ à compléter</span>')+'</td>'
        +'<td>'+srcBadge(r.source)+'</td>'
        +'<td style="white-space:nowrap">'
          +(isFerme
            ?'<button class="btn btn-sm" data-toggle-ferme="'+r.id+'" style="font-size:10px;padding:2px 5px;background:var(--green);color:#fff">&#9745; Ouvrir</button>'
            :'<button class="btn btn-sm" data-edit-resa="'+r.id+'" style="font-size:10px;padding:2px 5px">&#9998;</button>'

    }).join("");
    return '<div class="card" style="margin-bottom:16px">'
      +'<div style="display:flex;justify-content:space-between;padding-bottom:8px;margin-bottom:10px;border-bottom:2px solid var(--blue)">'
        +'<div style="font-size:14px;font-weight:700;color:var(--blue)">'+room+'</div>'
        +'<div style="font-size:12px;color:var(--text2)">'+items.length+' résa — '+nuits+' nuits — '+fmt(total)+'</div>'
      +'</div>'
      +(items.length?'<div style="overflow-x:auto"><table style="min-width:600px"><thead><tr>'
        +'<th style="font-size:10px">Arrivée</th><th style="font-size:10px">Départ</th>'
        +'<th style="font-size:10px;text-align:center">Nuits</th><th style="font-size:10px">Hôte</th>'
        +'<th style="font-size:10px;text-align:right">Nuits €</th><th style="font-size:10px;text-align:right">Ménage</th>'
        +'<th style="font-size:10px;text-align:right">Vers. hôte</th><th style="font-size:10px">Source</th><th></th>'
        +'</tr></thead><tbody>'+rows+'</tbody></table></div>'
        :'<div style="color:var(--text2);font-size:12px">Aucune réservation pour cette période</div>')
      +'</div>';
  }
  // Taxe séjour section - Lodgify direct only
  const resasLodgify=(S.reservations||[]).filter(r=>r.source==='lodgify'&&(S.resaYear===0||(r.date_arrivee||'').startsWith(String(S.resaYear||new Date().getFullYear()))));
  function taxeAuto(r){const t=S.taxeSejourTaux||5;const p=S.taxeSejourPlafond||4.60;const pn=r.montant_nuits&&r.nb_nuits?r.montant_nuits/r.nb_nuits:0;return Math.round(Math.min(pn*t/100,p)*(r.nb_adultes||1)*(r.nb_nuits||1)*100)/100;}
  const rooms=['Studio','T2'];
  const taxeTable=rooms.map(function(room){
    const items=resasLodgify.filter(r=>r.room===room);
    if(!items.length)return '';
    // Group by month
    const byMonth={};
    items.forEach(function(r){
      const mo=r.date_arrivee?r.date_arrivee.slice(0,7):'?';

      byMonth[mo].push(r);
    });
    const rows=Object.keys(byMonth).sort().map(function(mo){

      const nbResa=mrs.length;

        +'<div style="font-size:12px;font-weight:600">Total : '+fmt(totalTaxe)+'</div>'
      +'</div>'
      +'<div style="overflow-x:auto"><table><thead><tr>'
        +'<th style="font-size:10px">Mois</th><th style="font-size:10px;text-align:center">Résa</th>'

        +'<th style="font-size:10px;text-align:right">Taxe due</th>'
      +'</tr></thead><tbody>'+rows+'</tbody></table></div>'
      +'<div style="margin-top:8px;font-size:11px;color:var(--text2)">&#9432; '+taux+'% plafonné à '+plafond+'€/j/adulte '
        +'<a href="#" onclick="S.view=\'settings\';render();return false;" style="color:var(--blue);text-decoration:none">⚙️ Modifier les paramètres</a>'
      +'</div>'
    +'</div>';
  }).join('');

// Tableau ménage
  const menageTable=rooms.map(function(room2){
    const allForRoom=(S.reservations||[]).filter(r=>(S.resaYear===0||(r.date_arrivee||'').startsWith(String(S.resaYear||year)))&&r.room===room2);
    if(!allForRoom.length)return '';
    const byMoM={};
    allForRoom.forEach(function(r){
      const mo=r.date_arrivee?r.date_arrivee.slice(0,7):'?';
      if(!byMoM[mo])byMoM[mo]=[];
      byMoM[mo].push(r);
    });
    const rowsM=Object.keys(byMoM).sort().map(function(mo){
      const mrs=byMoM[mo];
      const nbResa=mrs.length;
      const nbPresta=mrs.filter(r=>r.menage_prestataire!==false).length;
      const montantPresta=mrs.filter(r=>r.menage_prestataire!==false).reduce((s,r)=>s+(r.frais_menage||(r.room==='T2'?35:30)),0);
      const montantClient=mrs.reduce((s,r)=>s+(r.frais_menage||(r.room==='T2'?35:30)),0);
      const label=new Date(mo+'-01').toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
      return '<tr><td>'+label+'</td>'
        +'<td style="text-align:center">'+nbResa+'</td>'
        +'<td style="text-align:center">'+(nbPresta>0?'<span style="color:var(--green);font-weight:600">'+nbPresta+'</span>':'<span style="color:var(--amber)">0</span>')+'</td>'
        +'<td style="text-align:right">'+fmt(montantPresta)+'</td>'
        +'<td style="text-align:right;color:var(--text2)">'+fmt(montantClient)+'</td>'
        +'</tr>';
    }).join('');
    return '<div class="card" style="margin-bottom:12px">'
      +'<div style="display:flex;justify-content:space-between;padding-bottom:6px;margin-bottom:8px;border-bottom:1.5px solid var(--amber)">'
        +'<div style="font-size:13px;font-weight:700;color:var(--amber)">&#129529; '+room2+' — Suivi ménage</div>'
      +'</div>'
      +'<div style="overflow-x:auto"><table><thead><tr>'
        +'<th style="font-size:10px">Mois</th>'
        +'<th style="font-size:10px;text-align:center">Résa</th>'
        +'<th style="font-size:10px;text-align:center">Prestations prestataire</th>'
        +'<th style="font-size:10px;text-align:right">Ménage prestataire (€)</th>'
        +'<th style="font-size:10px;text-align:right">Ménage facturé client (€)</th>'
      +'</tr></thead><tbody>'+rowsM+'</tbody></table></div>'
    +'</div>';
  }).join('');

  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
    +'<h2 style="margin:0">Réservations courte durée</h2>'
    +'<button class="btn btn-p" id="btn-sync-lodgify">🔄 Sync Lodgify</button>'
  +'</div>'
  +yearBar
  +roomTable(resas.filter(r=>r.room==="Studio"),"Studio")
  +roomTable(resas.filter(r=>r.room==="T2"),"T2")
  +(menageTable?'<h3 style="margin:20px 0 10px">Suivi ménage</h3>'+menageTable:'')
  +(resasLodgify.length?'<h3 style="margin:20px 0 10px">Déclaration taxe de séjour</h3>'+taxeTable:'');
}
