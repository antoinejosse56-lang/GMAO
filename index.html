function buildCrechePdf(){
  const enf=S.famille.find(x=>x.id===(S.familleEnfant||(S.famille[0]?.id)));
  if(!enf){alert('Aucun enfant s\u00e9lectionn\u00e9');return;}
  const y=S.familleYear||new Date().getFullYear();
  const mo=(S.familleMonth!=null?S.familleMonth:new Date().getMonth());
  const MOIS=['Janvier','F\u00e9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00fbt','Septembre','Octobre','Novembre','D\u00e9cembre'];
  const JOURS=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const c=enf.contrat_creche||{};
  const depDef=c.heure_dep_defaut||'09:00';
  const recDef=c.heure_rec_defaut||'16:30';
  const saisies=S.crecheSaisies.filter(s=>s.enfant_id===enf.id&&s.annee===y&&s.mois===mo+1);
  const daysInM=new Date(y,mo+1,0).getDate();
  const rows=[];
  let prevWasFriday=false;
  for(let d=1;d<=daysInM;d++){
    const date=new Date(y,mo,d);
    const dow=date.getDay();
    if(dow===0||dow===6)continue;
    // Separator between friday and following monday
    if(prevWasFriday&&dow===1){
      rows.push('<tr><td colspan="3" style="border:none;height:10px;border-top:2px solid #1D9E75;padding:0"></td></tr>');
    }
    const s=saisies.find(x=>x.jour===d);
    const depC=s?.heure_contrat_dep||depDef;
    const recC=s?.heure_contrat_rec||recDef;
    const modified=s&&(s.heure_contrat_dep||s.heure_contrat_rec);
    rows.push('<tr'+(modified?' style="background:#FFF9E6;font-weight:600"':'')+'>'
      +'<td style="padding:5px 10px">'+JOURS[dow]+' '+(''+d).padStart(2,'0')+'/'+('+'+(mo+1)).padStart(2,'0')+'/'+y+'</td>'
      +'<td style="text-align:center;padding:5px 10px">'+depC+'</td>'
      +'<td style="text-align:center;padding:5px 10px">'+recC+'</td>'
      +'</tr>');
    prevWasFriday=(dow===5);
  }
  const html='<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<style>'
    +'body{font-family:Arial,sans-serif;padding:30px;color:#222;font-size:13px}'
    +'h1{font-size:18px;color:#1D9E75;margin-bottom:2px}'
    +'h2{font-size:13px;color:#555;margin-top:0;margin-bottom:20px;font-weight:400}'
    +'table{width:100%;border-collapse:collapse;margin:0}'
    +'th{background:#1D9E75;color:#fff;padding:8px 10px;text-align:left;font-size:12px;font-weight:600}'
    +'td{padding:5px 10px;border-bottom:1px solid #eee;font-size:12px}'
    +'tr:hover td{background:#f5fdf8}'
    +'.legend{font-size:10px;color:#888;margin-top:12px;font-style:italic}'
    +'.printbtn{position:fixed;top:16px;right:16px;background:#1D9E75;color:#fff;border:none;padding:9px 20px;border-radius:6px;cursor:pointer;font-weight:700;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,0.15)}'
    +'@media print{.printbtn{display:none}body{padding:15px}}'
    +'</style></head><body>'
    +'<button class="printbtn" onclick="window.print()">&#128424; Imprimer / PDF</button>'
    +'<h1>&#128118; Planning cr\u00e8che \u2014 '+MOIS[mo]+' '+y+'</h1>'
    +'<h2>'+enf.prenom+' '+(enf.nom||'')+'</h2>'
    +'<table>'
      +'<thead><tr>'
        +'<th>Jour</th>'
        +'<th style="text-align:center">Heure d\u00e9pose</th>'
        +'<th style="text-align:center">Heure r\u00e9cup\u00e9ration</th>'
      +'</tr></thead>'
      +'<tbody>'+rows.join('')+'</tbody>'
    +'</table>'
    +'<p class="legend">Lignes fond jaune = horaires modifi\u00e9s par rapport au contrat standard ('+depDef+' \u2192 '+recDef+')</p>'
    +'</body></html>';
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.target='_blank';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),60000);
}


function buildEcolePdf(type){
  const enf=S.famille.find(x=>x.id===(S.familleEnfant||(S.famille[0]?.id)));
  if(!enf){alert('Aucun enfant s\u00e9lectionn\u00e9');return;}
  const y=S.familleYear||new Date().getFullYear();
  const mo=(S.familleMonth!=null?S.familleMonth:new Date().getMonth());
  const MOIS=['Janvier','F\u00e9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00fbt','Septembre','Octobre','Novembre','D\u00e9cembre'];
  const c=enf.contrat_ecole||{};
  const txPP=parseFloat(c.taux_peri_prevu||0);
  const txPNP=parseFloat(c.taux_peri_non_prevu||0);
  const txCant=parseFloat(c.taux_cantine||0);
  const txCentreJ=parseFloat(c.taux_centre_journee||0);
  const saisies=S.ecoleSaisies.filter(s=>s.enfant_id===enf.id&&s.annee===y&&s.mois===mo+1);
  let totPMin=0,totPNPMin=0,totCant=0,totCentre=0;
  saisies.forEach(s=>{
    totPMin+=Math.ceil((s.peri_matin_min||0)/15)*15+Math.ceil((s.peri_soir_min||0)/15)*15;
    totPNPMin+=Math.ceil((s.peri_matin_np_min||0)/15)*15+Math.ceil((s.peri_soir_np_min||0)/15)*15;
    if(s.cantine)totCant++;
    if(s.centre_loisir)totCentre++;
  });
  const montPeri=(totPMin/60)*txPP+(totPNPMin/60)*txPNP;
  const montCant=totCant*txCant;
  const montCentre=totCentre*txCentreJ;
  const isEcole=type==='ecole';
  const color=isEcole?'#185FA5':'#9B59B6';
  const titre=isEcole?'\u00c9cole + Cantine':'Centre de Loisirs';
  const montantTotal=isEcole?montPeri+montCant:montCentre;
  const facRecu=parseFloat(isEcole?(c.facture_ecole||0):(c.facture_centre||0));
  const diff=montantTotal-facRecu;
  const filtSaisies=isEcole
    ?saisies.filter(s=>s.peri_matin_min||s.peri_soir_min||s.peri_matin_np_min||s.peri_soir_np_min||s.cantine)
    :saisies.filter(s=>s.centre_loisir);
  const rows=filtSaisies.sort((a,b)=>a.jour-b.jour).map(s=>{
    const d=new Date(y,mo,s.jour);
    const dow=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][d.getDay()];
    const moStr=String(mo+1).padStart(2,'0');const dt=String(s.jour).padStart(2,'0')+'/'+moStr+'/'+y+' '+dow;
    if(!isEcole)return '<tr><td>'+dt+'</td><td colspan="5" style="text-align:center">Journ\u00e9e centre loisirs</td><td style="font-weight:600">'+txCentreJ.toFixed(2)+' \u20ac</td></tr>';
    const pmMin=(s.peri_matin_min||0)+(s.peri_matin_np_min||0);
    const psMin=(s.peri_soir_min||0)+(s.peri_soir_np_min||0);
    const type_peri=s.type_peri==='non_prevu'?'N.Pr\u00e9vu':'Pr\u00e9vu';
    return '<tr><td>'+dt+'</td>'
      +'<td>'+(s.peri_matin_dep||'\u2014')+' \u2192 '+(s.peri_matin_fin||'\u2014')+'</td>'
      +'<td>'+(pmMin>0?(pmMin/60).toFixed(2)+'h':'\u2014')+'</td>'
      +'<td>'+(s.peri_soir_dep||'\u2014')+' \u2192 '+(s.peri_soir_fin||'\u2014')+'</td>'
      +'<td>'+(psMin>0?(psMin/60).toFixed(2)+'h':'\u2014')+'</td>'
      +'<td style="font-size:10px">'+type_peri+'</td>'
      +'<td style="text-align:center">'+(s.cantine?'&#10003; '+txCant.toFixed(2)+' \u20ac':'\u2014')+'</td>'
      +'</tr>';
  }).join('');
  const thead=isEcole
    ?'<tr><th>Date</th><th>P\u00e9ri matin</th><th>Dur\u00e9e</th><th>P\u00e9ri soir</th><th>Dur\u00e9e</th><th>Type</th><th>Cantine</th></tr>'
    :'<tr><th>Date</th><th colspan="6">D\u00e9tail</th><th>Montant</th></tr>';
  const recapRows=isEcole
    ?'<div>P\u00e9riscolaire pr\u00e9vu : '+(totPMin/60).toFixed(2)+'h \u00d7 '+txPP.toFixed(3)+' \u20ac = <strong>'+montPeri.toFixed(2)+' \u20ac</strong></div>'
     +'<div>Cantine : '+totCant+' repas \u00d7 '+txCant.toFixed(2)+' \u20ac = <strong>'+montCant.toFixed(2)+' \u20ac</strong></div>'
    :'<div>Centre loisirs : '+totCentre+' journ\u00e9e(s) \u00d7 '+txCentreJ.toFixed(2)+' \u20ac = <strong>'+montCentre.toFixed(2)+' \u20ac</strong></div>';
  const html='<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<style>body{font-family:Arial,sans-serif;padding:20px;color:#222}h1{font-size:16px;margin-bottom:4px;color:'+color+'}h2{font-size:13px;color:#555;margin-top:0}'
    +'table{width:100%;border-collapse:collapse;margin:16px 0;font-size:11px}th{background:'+color+';color:#fff;padding:6px 8px;text-align:left}td{padding:5px 8px;border-bottom:1px solid #eee}'
    +'.total{background:#f5f5f5;font-weight:600}.recap{margin-top:16px;padding:12px;background:#f0f4ff;border-radius:6px;font-size:13px}'
    +'.diff-ok{color:#1D9E75;font-weight:700}.diff-ko{color:#C0392B;font-weight:700}'
    +'.printbtn{position:fixed;top:12px;right:12px;background:'+color+';color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-weight:700}'
    +'@media print{.printbtn{display:none}}</style></head><body>'
    +'<button class="printbtn" onclick="window.print()">&#128424; Imprimer / PDF</button>'
    +'<h1>&#127979; '+titre+' \u2014 '+MOIS[mo]+' '+y+'</h1>'
    +'<h2>Enfant : '+enf.prenom+' '+(enf.nom||'')+'</h2>'
    +'<table><thead>'+thead+'</thead><tbody>'+rows+'</tbody>'
    +'<tfoot><tr class="total"><td colspan="6">TOTAL</td><td style="font-weight:700;color:'+color+'">'+montantTotal.toFixed(2)+' \u20ac</td></tr></tfoot></table>'
    +'<div class="recap">'+recapRows
    +'<div style="margin-top:8px;font-size:14px;font-weight:600">Total calcul\u00e9 : '+montantTotal.toFixed(2)+' \u20ac</div>'
    +(facRecu>0?'<div>Facture re\u00e7ue : <strong>'+facRecu.toFixed(2)+' \u20ac</strong></div>'
      +'<div>Diff\u00e9rence : <span class="'+(Math.abs(diff)<0.01?'diff-ok':'diff-ko')+'">'+( diff>0?'+':'')+diff.toFixed(2)+' \u20ac</span>'
      +' '+(Math.abs(diff)<0.01?'&#10003; Conforme':'&#9888; \u00c0 v\u00e9rifier')+'</div>':'')
    +'</div></body></html>';
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.target='_blank';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),60000);
}

function renderConsommables(){
  const cTab=S.csoTab||'stock';
  const conso=S.consommables||[];
  const isDubail=isDubailProfile();
  const filtered=isDubail?conso.filter(c=>c.affect_type==='bien'&&(c.affect_label||'').toLowerCase().includes('dubail')):conso;

  const tabBar='<div class="tab-bar" style="margin-bottom:14px">'
    +'<div class="tab '+(cTab==='stock'?'active':'')+'" data-cso-tab="stock">&#128230; Stock</div>'
    +'<div class="tab '+(cTab==='equipement'?'active':'')+'" data-cso-tab="equipement">&#128295; Équipements</div>'
    +'<div class="tab '+(cTab==='etiquettes'?'active':'')+'" data-cso-tab="etiquettes">&#127991; Étiquettes</div>'
    +'<div class="tab '+(cTab==='inventaire'?'active':'')+'" data-cso-tab="inventaire">&#128203; Inventaire rapide</div>'
    +'</div>';

  // Filter bar
  const search=S.csoSearch||'';
  const filterBar='<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">'
    +(isAdmin()?'<button class="btn btn-p btn-sm" id="btn-add-cso">+ Consommable</button>':'')
    +'<input id="cso-search" placeholder="Rechercher..." value="'+search+'" style="flex:1;min-width:120px;padding:6px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px">'
    +'</div>';

  const shown=filtered.filter(c=>!search||c.nom.toLowerCase().includes(search.toLowerCase()));

  if(cTab==='stock'){
    const low=shown.filter(c=>c.stock!=null&&c.stock_min!=null&&c.stock<=c.stock_min);
    const lowAlert=low.length?'<div class="card" style="border-left:3px solid var(--red);margin-bottom:12px;padding:10px 14px">'
      +'<div style="font-weight:600;color:var(--red);margin-bottom:6px">&#9888; '+low.length+' consommable'+(low.length>1?'s':'')+' en stock bas</div>'
      +low.map(c=>'<div style="font-size:12px;color:var(--text2)">'+c.nom+' : '+c.stock+' '+c.unite+' (min '+c.stock_min+')</div>').join('')
      +'</div>':'';
    const rows=shown.map(c=>{
      const isLow=c.stock!=null&&c.stock_min!=null&&c.stock<=c.stock_min;
      return '<tr>'
        +'<td style="font-weight:500;font-size:13px">'+c.nom+'</td>'
        +'<td style="font-size:12px;color:var(--text2)">'+c.categorie+'</td>'
        +'<td style="font-size:12px;color:var(--text2)">'+c.affect_label+'</td>'
        +'<td style="text-align:right;font-weight:500;color:'+(isLow?'var(--red)':'var(--text)')+'">'+c.stock+' '+c.unite+'</td>'
        +'<td style="text-align:right;font-size:12px;color:var(--text2)">'+c.stock_min+'</td>'
        +'<td style="text-align:right;font-size:12px">'+(c.prix_unitaire?c.prix_unitaire.toFixed(2)+' €':'—')+'</td>'
        +(isAdmin()?'<td><button class="btn btn-sm" data-edit-cso="'+c.id+'">&#9998;</button>'
          +'<button class="btn btn-sm" data-adjust-cso="'+c.id+'">+/-</button></td>':'<td></td>')
        +'</tr>';
    }).join('');
    return tabBar+filterBar+lowAlert
      +'<div class="card"><div style="overflow-x:auto"><table>'
      +'<thead><tr><th>Consommable</th><th>Catégorie</th><th>Affectation</th><th style="text-align:right">Stock</th><th style="text-align:right">Min</th><th style="text-align:right">Prix unit.</th><th></th></tr></thead>'
      +'<tbody>'+rows+'</tbody></table></div>'
      +(shown.length===0?'<div style="text-align:center;padding:20px;color:var(--text2)">Aucun consommable trouvé.</div>':'')
      +'</div>';
  }

  if(cTab==='equipement'){
    const rows=shown.map(c=>'<tr>'
      +'<td style="font-weight:500;font-size:13px">'+c.nom+'</td>'
      +'<td style="font-size:12px;color:var(--text2)">'+c.categorie+'</td>'
      +'<td style="font-size:12px;color:var(--text2)">'+c.affect_label+'</td>'
      +'<td style="text-align:right;font-size:12px">'+(c.prix_unitaire?c.prix_unitaire.toFixed(2)+' €':'—')+'</td>'
      +(isAdmin()?'<td><button class="btn btn-sm" data-edit-cso="'+c.id+'">&#9998;</button></td>':'<td></td>')
      +'</tr>').join('');
    return tabBar+filterBar
      +'<div class="card"><div style="overflow-x:auto"><table>'
      +'<thead><tr><th>Consommable</th><th>Catégorie</th><th>Affectation</th><th style="text-align:right">Prix unit.</th><th></th></tr></thead>'
      +'<tbody>'+rows+'</tbody></table></div>'
      +(shown.length===0?'<div style="text-align:center;padding:20px;color:var(--text2)">Aucun consommable.</div>':'')
      +'</div>';
  }

  if(cTab==='etiquettes'){
    const cards=shown.map(c=>'<div class="card" style="padding:12px;text-align:center">'
      +'<canvas id="qr-cso-'+c.id+'" style="width:100px;height:100px"></canvas>'
      +'<div style="font-size:13px;font-weight:500;margin-top:6px">'+c.nom+'</div>'
      +'<div style="font-size:11px;color:var(--text2)">'+c.categorie+'</div>'
      +'<div style="font-size:11px;color:var(--text2)">Stock: '+c.stock+' '+c.unite+'</div>'
      +'<button class="btn btn-sm" style="margin-top:8px" data-print-cso-label="'+c.id+'">&#128424; Étiquette</button>'
      +'</div>').join('');
    return tabBar+filterBar
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px">'
      +cards+(shown.length===0?'<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--text2)">Aucun consommable.</div>':'')
      +'</div>';
  }

  if(cTab==='inventaire'){
    const rows=shown.map(c=>'<tr>'
      +'<td style="font-weight:500;font-size:13px">'+c.nom+'</td>'
      +'<td style="text-align:right;font-weight:600">'+c.stock+' '+c.unite+'</td>'
      +'<td style="text-align:center"><input type="number" class="inv-qty" data-cso-id="'+c.id+'" value="'+c.stock+'" style="width:70px;padding:4px;text-align:center;border:1px solid var(--border2);border-radius:4px"></td>'
      +'</tr>').join('');
    return tabBar+filterBar
      +'<div class="card"><div style="overflow-x:auto"><table>'
      +'<thead><tr><th>Consommable</th><th style="text-align:right">Stock actuel</th><th style="text-align:center">Nouveau stock</th></tr></thead>'
      +'<tbody>'+rows+'</tbody></table></div>'
      +(isAdmin()?'<div style="display:flex;justify-content:flex-end;margin-top:10px"><button class="btn btn-p" id="btn-save-inventaire">&#10003; Enregistrer</button></div>':'')
      +'</div>';
  }

  return tabBar+'<div style="text-align:center;padding:30px;color:var(--text2)">Onglet inconnu</div>';
}

function woUpdateZone(){
  const propId=document.getElementById('m-wa-prop')?.value;
  const p=S.topology.properties.find(x=>x.id===propId);
  const zones=p?(p.zones||[]):[];
  const zoneSel=document.getElementById('m-wa-zone');
  const zoneWrap=document.getElementById('m-wa-zone-wrap');
  const subWrap=document.getElementById('m-wa-sub-wrap');
  if(zoneSel){
    zoneSel.innerHTML='<option value="">— Aucune zone —</option>'+zones.map(z=>'<option value="'+z.id+'">'+z.name+'</option>').join('');
  }
  if(zoneWrap) zoneWrap.style.display=zones.length?'':'none';
  if(subWrap) subWrap.style.display='none';
  // Also filter assets by property
  const assets=propId?S.assets.filter(a=>(a.topo_ref?.propId||'')===(propId)||((a.location||'').includes(p?.name||'XXXXXX'))):S.assets;
  const assetSel=document.getElementById('m-wa');
  if(assetSel){
    assetSel.innerHTML='<option value="">— Aucun équipement spécifique —</option>'+assets.map(a=>'<option value="'+a.id+'">'+a.name+'</option>').join('');
  }
}

function woUpdateSubZone(){
  const propId=document.getElementById('m-wa-prop')?.value;
  const zoneId=document.getElementById('m-wa-zone')?.value;
  const p=S.topology.properties.find(x=>x.id===propId);
  const z=p?.zones?.find(x=>x.id===zoneId);
  const subs=z?(z.subZones||[]):[];
  const subSel=document.getElementById('m-wa-sub');
  const subWrap=document.getElementById('m-wa-sub-wrap');
  if(subSel){
    subSel.innerHTML='<option value="">— Aucune sous-zone —</option>'+subs.map(s=>'<option value="'+s.id+'">'+s.name+'</option>').join('');
  }
  if(subWrap) subWrap.style.display=subs.length?'':'none';
}

function closeModal(){S.modal=null;render();}

function findTopoNode(id){
  for(const p of (S.topology.properties||[])){
    if(p.id===id)return{type:'prop',obj:p};
    for(const t of (p.trades||[])){
      if(t.id===id)return{type:'trade',obj:t};
      for(const z of (t.children||[])){if(z.id===id)return{type:'zone',obj:z};}
    }
  }
  return null;
}

async function saveTopoToDB(){
  // Safety guard: never overwrite with empty data
  if(!S.topoId){console.warn('saveTopoToDB: topoId manquant, sauvegarde annulée');return;}
  if(!S.topology?.properties?.length){console.warn('saveTopoToDB: topology vide, sauvegarde annulée');return;}
  await sb.from('topology').update({data: S.topology, updated_at: new Date().toISOString()}).eq('id', S.topoId);
}

async function saveModal(){
  const q = id => document.getElementById(id);
  const m = S.modal;
  if(!m)return;


  if(m.type==='edit-wo'){
    const w=m.wo;
    const title=q('m-wt')?.value.trim();if(!title)return alert('Titre requis');
    const newNote=q('m-wjnote')?.value?.trim();
    const journal=[...(w.journal||[])];
    if(newNote){journal.push({id:uid(),date:new Date().toLocaleDateString('fr-FR')+' '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),by:S.currentUser?.name||'—',note:newNote});}
    const topoVal=q('m-wtopo')?.value||'';
    let topoRef=w.topo_ref||null;
    if(topoVal.startsWith('prop_')){const pId=topoVal.replace('prop_','');const p=S.topology.properties.find(x=>x.id===pId);topoRef=p?{propId:pId,propName:p.name,zoneId:null,zoneName:'',subId:null,subName:''}:null;}
    else if(topoVal.startsWith('zone_')){const [,pId,zId]=topoVal.split('_');const p=S.topology.properties.find(x=>x.id===pId);const z=p?.zones?.find(x=>x.id===zId);topoRef=z?{propId:pId,propName:p.name,zoneId:zId,zoneName:z.name,subId:null,subName:''}:null;}
    else if(topoVal.startsWith('sub_')){const [,pId,zId,sId]=topoVal.split('_');const p=S.topology.properties.find(x=>x.id===pId);const z=p?.zones?.find(x=>x.id===zId);const s=z?.subZones?.find(x=>x.id===sId);topoRef=s?{propId:pId,propName:p.name,zoneId:zId,zoneName:z.name,subId:sId,subName:s.name}:null;}
    else if(topoVal===''){topoRef=null;}
    const assetId=q('m-wasset')?.value||null;
    const bySel=q('m-wby-sel');
    const byUser=bySel&&bySel.value&&bySel.value!=='__autre__'?bySel.value:q('m-wby')?.value||w.by_user||'';
    const clNoms=[...document.querySelectorAll('.cl-item-nom')].map(el=>el.value.trim()).filter(Boolean);
    const clQtes=[...document.querySelectorAll('.cl-item-qte')].map(el=>parseFloat(el.value)||1);
    const clUnites=[...document.querySelectorAll('.cl-item-unite')].map(el=>el.value||'');
    const checklist=clNoms.map((nom,i)=>({nom,qte:clQtes[i],unite:clUnites[i],fait:(w.checklist||[]).find(x=>x.nom===nom)?.fait||false}));
    const upd={title,description:q('m-wd')?.value,category:q('m-wc')?.value,
      status:q('m-wstatus')?.value,date:q('m-wdate')?.value,
      cost:parseFloat(q('m-wcost')?.value)||0,
      paid:q('m-wpaid')?.checked||false,
      alert_days:q('m-walert-on')?.checked?(parseInt(q('m-walert-days')?.value)||7):(w.alert_days||null),
      by_user:byUser,asset_id:assetId||w.asset_id,topo_ref:topoRef,journal,checklist};
    const {error}=await sb.from('work_orders').update(upd).eq('id',w.id);
    if(error){alert('Erreur : '+error.message);return;}
    Object.assign(w,upd);
  }

  if(m.type==='add-wo'){
    const title=q('m-wt').value.trim();if(!title)return alert('Titre requis');
    const assetId=q('m-wa').value||null;
    const propId=q('m-wa-prop')?.value||null;
    const zoneId=q('m-wa-zone')?.value||null;
    const subId=q('m-wa-sub')?.value||null;
    if(!assetId&&!propId)return alert('Sélectionnez un bien ou un équipement');
    let topoRef=null;
    if(propId){
      const p=S.topology.properties.find(x=>x.id===propId);
      const z=zoneId?p?.zones?.find(x=>x.id===zoneId):null;
      const s=subId?z?.subZones?.find(x=>x.id===subId):null;
      topoRef={propId,propName:p?.name||'',zoneId:zoneId||null,zoneName:z?.name||'',subId:subId||null,subName:s?.name||''};

function updateTenantZones(existingZoneName){
  const sel=document.getElementById('m-tprop');
  const wrap=document.getElementById('m-tzone-wrap');
  const zsel=document.getElementById('m-tzone');
  if(!sel||!wrap||!zsel)return;
  
  // If no property selected, pick first one with zones
  if(!sel.value){
    const withZones=S.topology.properties.find(p=>(p.zones||[]).length>0);
    if(withZones){
      for(let i=0;i<sel.options.length;i++){
        if(sel.options[i].value===withZones.name){sel.selectedIndex=i;break;}
      }
    } else if(sel.options.length>1){sel.selectedIndex=1;}
  }
  
  const pname=sel.value;
  if(!pname){wrap.style.display='none';return;}
  
  const p=S.topology.properties.find(x=>x.name===pname)||
          S.topology.properties.find(x=>x.name.toLowerCase()===pname.toLowerCase().trim());
  const zones=p?(p.zones||[]):[];
  
  if(zones.length){
    zsel.innerHTML='<option value="">— Aucune zone —</option>'+
      zones.map(z=>'<option value="'+z.name+'" '+(z.name===existingZoneName?'selected':'')+'>'+z.name+'</option>').join('');
    wrap.style.display='';
  } else {
    wrap.style.display='none';
    zsel.innerHTML='';
  }
}

  if(!BREVO_API_KEY)BREVO_API_KEY=ensureBrevoKey();

  }).catch(e=>console.warn("Copie failed",e));
  return true;
}


function calcTaxeSejour(nbAdultes, nbNuits, prixNuit, taux, plafond){
  // 5% du prix nuit plafonné à plafond €/j/adulte
  const tauxDecimal=(taux||5)/100;
  const taxeParAdulteParNuit=Math.min((prixNuit||0)*tauxDecimal/nbNuits, plafond||4.60);
  return Math.round(taxeParAdulteParNuit*(nbAdultes||1)*nbNuits*100)/100;
}

  window.saveCrecheAll = async function(){
    const crecheMembers=S.famille.filter(m=>m.type_membre==='creche');
    const enf=S.famille.find(x=>x.id===S.familleEnfant)||(crecheMembers[0]||null);
    console.log('[CRECHE SAVE] enf=',enf?.prenom,'familleEnfant=',S.familleEnfant);
    if(!enf){alert('Aucun enfant crèche trouvé. Vérifiez le type dans la fiche membre.');return;}
    const y=S.familleYear||new Date().getFullYear();
    const mo=(S.familleMonth!=null?S.familleMonth:new Date().getMonth())+1;
    const daysInM=new Date(y,mo,0).getDate();
    function toMinL(t){if(!t)return null;const[h,m2]=t.split(':').map(Number);return h*60+m2;}
    const updates=[];
    for(let d=1;d<=daysInM;d++){
      const dow=new Date(y,mo-1,d).getDay();
      const depAntic=document.querySelector('.creche-dep[data-day="'+d+'"]')?.value||null;
      const recTard=document.querySelector('.creche-rec[data-day="'+d+'"]')?.value||null;
      const contDep=document.querySelector('.creche-cont[data-day="'+d+'"]')?.value||null;
      const contRec=document.querySelector('.creche-contr[data-day="'+d+'"]')?.value||null;
      const arrTard=document.querySelector('.creche-arr-tard[data-day="'+d+'"]')?.value||null;
      const depAnticD=document.querySelector('.creche-dep-antic[data-day="'+d+'"]')?.value||null;
      const absent=document.querySelector('.creche-absent[data-day="'+d+'"]')?.checked||false;
      // Only save if something is set (or row already exists)
      const existing=S.crecheSaisies.find(s=>s.enfant_id===enf.id&&s.annee===y&&s.mois===mo&&s.jour===d);
      const hasData=depAntic||recTard||arrTard||depAnticD||absent||
        (contDep&&contDep!=='09:00')||(contRec&&contRec!=='16:30');
      if(!hasData&&!existing)continue;
      // Calc minutes sup (arrondi quart sup)
      let minSup=0;
      const depCM=toMinL(contDep||'09:00'),recCM=toMinL(contRec||'16:30');
      if(depAntic){const d2=depCM-toMinL(depAntic);if(d2>0)minSup+=Math.ceil(d2/15)*15;}
      if(recTard){const d2=toMinL(recTard)-recCM;if(d2>0)minSup+=Math.ceil(d2/15)*15;}
      const rec={enfant_id:enf.id,annee:y,mois:mo,jour:d,
        depose_anticipee:depAntic||null,recuperation_tardive:recTard||null,
        heure_contrat_dep:contDep||null,heure_contrat_rec:contRec||null,
        arrivee_tardive:arrTard||null,depart_anticipe:depAnticD||null,
        absence_autorisee:absent,minutes_sup:minSup};
      updates.push({existing,rec});
    }
    let saveErrors=[];
    for(const{existing,rec}of updates){
      if(existing){
        const{error}=await sb.from('creche_saisies').update(rec).eq('id',existing.id);
        if(error)saveErrors.push(error.message);
        else Object.assign(existing,rec);
      }else{
        const{data,error}=await sb.from('creche_saisies').insert(rec).select().single();
        if(error)saveErrors.push(error.message);
        else if(data)S.crecheSaisies.push(data);
      }
    }
    if(saveErrors.length){
      alert('Erreurs lors de la sauvegarde :\n'+[...new Set(saveErrors)].join('\n'));
      return;
    }
    // Save taux if changed
    const tauxEl=document.getElementById('creche-taux-normal');
    const factEl=document.getElementById('creche-facture-recue');
    const updContrat={...(enf.contrat_creche||{})};
    const tauxVal=tauxEl?parseFloat(tauxEl.value):(S._crecheTaux!=null?S._crecheTaux:null);
    const factVal=factEl?parseFloat(factEl.value):(S._crecheFact!=null?S._crecheFact:null);
    if(tauxVal!=null&&!isNaN(tauxVal))updContrat.taux_normal=tauxVal;
    if(factVal!=null&&!isNaN(factVal))updContrat.facture_recue=factVal;
    console.log('[CRECHE SAVE] taux=',updContrat.taux_normal,'fact=',updContrat.facture_recue);
    console.log('[CRECHE SAVE] Saving contrat for id=',enf.id,'data=',updContrat);
    const{error:contratErr}=await sb.from('famille').update({contrat_creche:updContrat}).eq('id',enf.id);
    console.log('[CRECHE SAVE] Contrat result: error=',contratErr);
    if(contratErr)console.warn('Contrat save error:',contratErr.message);
    else enf.contrat_creche=updContrat;
    render();
    alert('✓ Planning enregistré !');
  }

async function checkAndSendAlerts() {
  if (!isAdmin()) return;
  const today = new Date();
  // Clear old alert keys based on type
  const rawAlerted = JSON.parse(localStorage.getItem('gmao_alerted') || '{}');
  const alerted = {};
  const oneDayAgo  = new Date(Date.now()-86400000).toISOString();
  const oneWeekAgo = new Date(Date.now()-7*86400000).toISOString();
  Object.entries(rawAlerted).forEach(([k,v])=>{
    if(k.startsWith('stock_') && v < oneDayAgo) return;   // stock: reset daily
    if(k.startsWith('wo_')    && v < oneWeekAgo) return;  // BT: reset weekly
    if(k.startsWith('mt_')    && v < oneWeekAgo) return;  // gammes: reset weekly
    if(k.startsWith('fam_')   && v < oneWeekAgo) return;  // famille: reset weekly
    alerted[k] = v;
  });
  const newAlerted = {...alerted};

  // === 1. GAMMES D'ENTRETIEN ===
  const toAlert = [];
  S.maintenanceTemplates.forEach(mt => {
    const d = mt.type === 'periodic' ? mt.next_due : mt.due_date;
    if (!d) return;
    const due = new Date(d);
    const days = Math.ceil((due - today) / 86400000);
    const alertDays = mt.alert_days||30;
    const key = 'mt_' + mt.id + '_' + d;
    if (days >= 0 && days <= alertDays && !alerted[key] && mt.alert_days) {
      toAlert.push({mt, days, key});
    }
  });

  if (toAlert.length > 0) {
    const listHTML = toAlert.map(({mt, days}) => {
      const asset = S.assets.find(a => a.id === mt.asset_id);
      return `<tr><td style="padding:8px 12px;font-weight:500">${mt.name}</td><td style="padding:8px 12px;color:#666">${asset?.name||'—'}</td><td style="padding:8px 12px"><span style="background:${days<=7?'#FCEBEB':days<=15?'#FAEEDA':'#E6F1FB'};color:${days<=7?'#A32D2D':days<=15?'#854F0B':'#185FA5'};padding:2px 8px;border-radius:12px;font-size:12px">${days}j</span></td></tr>`;
    }).join('');
    const html = `<div style="font-family:sans-serif;max-width:600px;margin:0 auto"><div style="background:#1D9E75;padding:20px 24px;border-radius:8px 8px 0 0"><h2 style="color:#fff;margin:0;font-size:18px">GMAO Pro — Alertes Échéances</h2></div><div style="background:#fff;padding:24px;border:1px solid #e5e5e0;border-top:none;border-radius:0 0 8px 8px"><p style="color:#444;margin:0 0 16px">${toAlert.length} gamme(s) arrivent à échéance dans les 30 prochains jours :</p><table style="width:100%;border-collapse:collapse;font-size:14px"><thead><tr style="background:#f5f5f3"><th style="padding:8px 12px;text-align:left;color:#666;font-weight:500">Gamme</th><th style="padding:8px 12px;text-align:left;color:#666;font-weight:500">Équipement</th><th style="padding:8px 12px;text-align:left;color:#666;font-weight:500">Délai</th></tr></thead><tbody>${listHTML}</tbody></table></div></div>`;
    try {
      // Email admin
      const resp = await sendBrevoEmail([{email:ALERT_EMAIL}], `⚠ GMAO — ${toAlert.length} échéance(s) dans 30 jours`, html);
      if (resp.ok) toAlert.forEach(({key}) => newAlerted[key] = new Date().toISOString());
      // Email intervenants assignés

function getDriveAccount(logement){

  if(l.includes('dubail')||l.includes('général dubail')||l.includes('general dubail'))
    return {hint:'savadur56@gmail.com',label:'J&A SAVADUR',key:'savadur'};

async function getGdriveToken(accountKey,loginHint){
  const cacheKey='gdrive_token_'+accountKey;
  const expiryKey='gdrive_expiry_'+accountKey;
  if(gdriveTokens[accountKey])return gdriveTokens[accountKey];
  const stored=localStorage.getItem(cacheKey);
  const expiry=parseInt(localStorage.getItem(expiryKey)||'0');
  if(stored&&Date.now()<expiry){gdriveTokens[accountKey]=stored;return stored;}
  return new Promise((resolve,reject)=>{
    if(typeof google==='undefined'||!google.accounts){reject(new Error('Google API non chargée'));return;}
    const client=google.accounts.oauth2.initTokenClient({
      client_id:GDRIVE_CLIENT_ID,scope:GDRIVE_SCOPE,hint:loginHint,
      callback:(resp)=>{
        if(resp.error){reject(new Error(resp.error));return;}
        gdriveTokens[accountKey]=resp.access_token;
        localStorage.setItem(cacheKey,resp.access_token);
        localStorage.setItem(expiryKey,String(Date.now()+(resp.expires_in-60)*1000));
        resolve(resp.access_token);
      }
    });
    client.requestAccessToken();
  });
}

async function getOrCreateFolder(token,name,parentId=null){
  const q=`name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`+(parentId?` and '${parentId}' in parents`:'');
  const resp=await fetch('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name)',{headers:{Authorization:'Bearer '+token}});
  const data=await resp.json();
  if(data.files&&data.files.length>0)return data.files[0].id;
  const cr=await fetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({name,mimeType:'application/vnd.google-apps.folder',parents:parentId?[parentId]:[]})
  });
  return (await cr.json()).id;
}

async function uploadToDrive(token,htmlContent,filename,parentFolderId){
  const boundary='gmao_'+Date.now();
  const meta=JSON.stringify({name:filename+'.html',parents:[parentFolderId],mimeType:'text/html'});
  const CRLF='\r\n';
  const body='--'+boundary+CRLF+'Content-Type: application/json'+CRLF+CRLF+meta
    +CRLF+'--'+boundary+CRLF+'Content-Type: text/html'+CRLF+CRLF+htmlContent
    +CRLF+'--'+boundary+'--';
  const up=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
    method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'multipart/related; boundary='+boundary},body
  });
  if(!up.ok){const e=await up.text();throw new Error(e);}
  return await up.json();
}

async function archiveToDrive(htmlContent,filename,mois,annee,logement){
  if(!GDRIVE_CLIENT_ID||GDRIVE_CLIENT_ID==='VOTRE_CLIENT_ID'){console.log('Drive non configuré');return null;}
  try{
    const account=getDriveAccount(logement||'');
    console.log('📁 Archivage Drive → '+account.label+' ('+account.hint+')...');
    const token=await getGdriveToken(account.key,account.hint);
    if(!token){console.warn('Token Drive non obtenu');return null;}
    const yearId=await getOrCreateFolder(token,String(annee),GDRIVE_ROOT_FOLDER_ID);
    const monthId=await getOrCreateFolder(token,mois,yearId);
    const file=await uploadToDrive(token,htmlContent,filename,monthId);
    console.log('✅ Archivé sur Drive ('+account.label+'):',filename,'→',file.id);
    return file.id;
  }catch(e){
    console.warn('❌ Drive archive failed:',e.message);
    // If token expired, clear it so it's requested again next time
    if(e.message.includes('401')||e.message.includes('invalid_token')){
      const account=getDriveAccount(logement||'');
      localStorage.removeItem('gdrive_token_'+account.key);
      localStorage.removeItem('gdrive_expiry_'+account.key);
      delete gdriveTokens[account.key];
    }
    return null;
  }
}

function csvRow(cells){ return cells.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(';'); }
function downloadCsv(filename, rows){
  const bom='﻿';
  const blob=new Blob([bom+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}

function exportFacturesExcel(compte){
  const year=S.facturesYear||new Date().getFullYear();
  const filtered=S.factures.filter(f=>{
    if(f.date&&!f.date.startsWith(String(year)))return false;
    if(compte==='savadur'&&f.compte!=='savadur')return false;
    if(compte==='perso'&&f.compte!=='perso')return false;
    return true;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const fmt=n=>n?parseFloat(n).toFixed(2).replace('.',','):'0,00';
  const rows=[
    csvRow(['FACTURES DÉPENSES — '+(compte==='savadur'?'J&A SAVADUR':compte==='perso'?'Personnel':'Tous comptes')+' — '+year]),
    csvRow(['Date','Fournisseur','Catégorie','Bien','BT lié','Description','Compte','HT (€)','TVA (%)','TTC (€)','Rapprochée','Lien Drive']),
    ...filtered.map(f=>{
      const wo=f.wo_id?S.workOrders.find(w=>w.id===f.wo_id):null;
      return csvRow([
        f.date?new Date(f.date).toLocaleDateString('fr-FR'):'',
        f.fournisseur||'',f.categorie||'',f.bien||'',
        wo?wo.title:'',f.description||'',
        f.compte==='savadur'?'J&A SAVADUR':'Personnel',
        fmt(f.montant_ht),f.taux_tva||0,fmt(f.montant_ttc),
        f.rapproche?'Oui':'Non',f.url_drive||''
      ]);
    }),
    csvRow([]),
    csvRow(['','','','','','','TOTAL TTC','','',filtered.reduce((s,f)=>s+parseFloat(f.montant_ttc||0),0).toFixed(2).replace('.',',')])
  ];
  downloadCsv('Factures_'+(compte==='savadur'?'SAVADUR':compte==='perso'?'Perso':'Toutes')+'_'+year+'.csv', rows);
}

function exportRevenusExcel(){
  const year=S.facturesYear||new Date().getFullYear();
  const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const fmt=n=>n?parseFloat(n).toFixed(2).replace('.',','):'0,00';
  // Only dubail tenants
  const tenants=S.tenants.filter(t=>t.actif!==false&&dubailFilter(t.logement||''));
  const rows=[
    csvRow(['REVENUS LOCATIFS J&A SAVADUR — '+year]),
    csvRow(['Locataire','Logement','Type bail',...MONTHS,'TOTAL']),
    ...tenants.map(t=>{
      const monthly=MONTHS.map(m=>{
        const p=S.rentPayments.find(x=>x.tenant_id===t.id&&x.annee===year&&x.mois===m);
        return p?.paye?parseFloat(p.loyer||0):0;
      });
      const total=monthly.reduce((s,v)=>s+v,0);
      return csvRow([t.nom,t.logement||'',t.type_bail==='commercial'?'Commercial':'Habitation',...monthly.map(fmt),fmt(total)]);
    }),
    csvRow([]),
    csvRow(['TOTAL','','',
      ...MONTHS.map(m=>{
        const sum=tenants.reduce((s,t)=>{
          const p=S.rentPayments.find(x=>x.tenant_id===t.id&&x.annee===year&&x.mois===m);
          return s+(p?.paye?parseFloat(p.loyer||0):0);
        },0);
        return fmt(sum);
      }),
      fmt(tenants.reduce((s,t)=>s+S.rentPayments.filter(p=>p.tenant_id===t.id&&p.annee===year&&p.paye).reduce((ss,p)=>ss+parseFloat(p.loyer||0),0),0))
    ])
  ];
  downloadCsv('Revenus_SAVADUR_'+year+'.csv', rows);
}

  const depFact=factures.reduce((s,f)=>s+parseFloat(f.montant_ttc||0),0);

  const btSavadur=S.workOrders.filter(w=>w.paid&&w.date?.startsWith(String(year))&&(()=>{const tr=w.topo_ref;return tr&&dubailFilter(tr.propName||'');})());
  const depBT=btSavadur.reduce((s,w)=>s+parseFloat(w.cost||0),0);
  const totalDep=depFact+depBT;
  const resultat=revenus-totalDep;

  // Detail by bien
  const biens=S.topology.properties.filter(p=>dubailFilter(p.name));
  const rows=[
    csvRow(['BILAN J&A SAVADUR — '+year]),
    csvRow([]),
    csvRow(['REVENUS LOCATIFS']),
    csvRow(['Locataire','Logement','Loyers perçus']),
    ...S.tenants.filter(t=>t.actif!==false&&dubailFilter(t.logement||'')).map(t=>{
      const total=S.rentPayments.filter(p=>p.tenant_id===t.id&&p.annee===year&&p.paye).reduce((s,p)=>s+parseFloat(p.loyer||0),0);
      return csvRow([t.nom,t.logement||'',fmt(total)]);
    }),
    csvRow(['','TOTAL REVENUS',fmt(revenus)]),
    csvRow([]),
    csvRow(['DÉPENSES — FACTURES']),
    csvRow(['Date','Fournisseur','Catégorie','Bien','TTC','Rapprochée']),
    ...factures.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(f=>
      csvRow([f.date?new Date(f.date).toLocaleDateString('fr-FR'):'',f.fournisseur||'',f.categorie||'',f.bien||'',fmt(f.montant_ttc),f.rapproche?'Oui':'Non'])
    ),
    csvRow(['','TOTAL FACTURES','','',fmt(depFact)]),
    csvRow([]),
    csvRow(['DÉPENSES — BONS DE TRAVAUX RÉGLÉS']),
    csvRow(['Date','BT','Bien','Coût TTC']),
    ...btSavadur.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(w=>
      csvRow([w.date?new Date(w.date).toLocaleDateString('fr-FR'):'',w.title||'',w.topo_ref?.propName||'',fmt(w.cost)])
    ),
    csvRow(['','TOTAL BT','','',fmt(depBT)]),
    csvRow([]),
    csvRow(['══════════════════']),
    csvRow(['TOTAL REVENUS','','',fmt(revenus)]),
    csvRow(['TOTAL DÉPENSES','','',fmt(totalDep)]),
    csvRow(['RÉSULTAT NET','','',fmt(resultat)]),
  ];
  downloadCsv('Bilan_SAVADUR_'+year+'.csv', rows);
  alert('Export terminé !\n\nRevenus : '+fmt(revenus)+' €\nDépenses : '+fmt(totalDep)+' €\nRésultat net : '+fmt(resultat)+' €');
}

function exportFacturesExcel(){
  const fmt2 = n => (n||0).toFixed(2);
  const year = S.factYear||(new Date().getFullYear());
  const fTab = S.factTab||'liste';

  // Filter factures
  let facts = S.factures.filter(f=>{
    if(S.factYear&&f.date&&!f.date.startsWith(String(S.factYear)))return false;
    if(fTab==='savadur')return f.compte==='savadur';
    if(fTab==='perso')return f.compte==='perso';
    return true;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));

  const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  // Build workbook as CSV-style HTML table then trigger download
  // We use a proper xlsx-like format via data URI
  let xlsContent = '<html><head><meta charset="UTF-8"></head><body>';

  // ── Sheet 1 : Factures dépenses ──
  xlsContent += '<table><tr><td colspan="11" style="font-weight:bold;font-size:14px;background:#1D9E75;color:white">GMAO Pro — Factures dépenses '+(S.factYear||'Toutes années')+'</td></tr>';
  xlsContent += '<tr><td></td></tr>';
  xlsContent += '<tr style="background:#333;color:white"><td><b>Date</b></td><td><b>Fournisseur</b></td><td><b>Description</b></td><td><b>Catégorie</b></td><td><b>Bien</b></td><td><b>N° Facture</b></td><td><b>HT (€)</b></td><td><b>TVA (€)</b></td><td><b>TTC (€)</b></td><td><b>Compte</b></td><td><b>Rapprochée</b></td></tr>';

  facts.forEach((f,i)=>{
    const bg = i%2===0?'white':'#f5f5f3';
    xlsContent += `<tr style="background:${bg}">
      <td>${f.date||''}</td>
      <td>${f.fournisseur||''}</td>
      <td>${f.description||''}</td>
      <td>${f.categorie||''}</td>
      <td>${f.bien||''}</td>
      <td>${f.numero||''}</td>
      <td style="text-align:right">${fmt2(f.montant_ht)}</td>
      <td style="text-align:right">${fmt2(f.tva)}</td>
      <td style="text-align:right;font-weight:bold">${fmt2(f.montant_ttc)}</td>
      <td>${f.compte==='savadur'?'J&A SAVADUR':'Perso'}</td>
      <td style="text-align:center">${f.rapproche?'✓':''}</td>
    </tr>`;
  });

  const totalTTC=facts.reduce((s,f)=>s+parseFloat(f.montant_ttc||0),0);
  const totalHT=facts.reduce((s,f)=>s+parseFloat(f.montant_ht||0),0);
  xlsContent += `<tr style="background:#1D9E75;color:white;font-weight:bold">
    <td colspan="6">TOTAL</td>
    <td style="text-align:right">${fmt2(totalHT)}</td>
    <td></td>
    <td style="text-align:right">${fmt2(totalTTC)}</td>
    <td colspan="2"></td>
  </tr>`;

  // ── Sheet 2 : Revenus locatifs SAVADUR ──
  xlsContent += '<tr><td></td></tr><tr><td></td></tr>';
  xlsContent += '<tr><td colspan="8" style="font-weight:bold;font-size:14px;background:#185FA5;color:white">REVENUS LOCATIFS J&A SAVADUR — '+(S.factYear||new Date().getFullYear())+'</td></tr>';
  xlsContent += '<tr><td></td></tr>';
  xlsContent += '<tr style="background:#333;color:white"><td><b>Locataire</b></td><td><b>Logement</b></td><td><b>Mois</b></td><td><b>Année</b></td><td><b>Loyer TTC (€)</b></td><td><b>Part CAF (€)</b></td><td><b>Part locataire (€)</b></td><td><b>Date paiement</b></td></tr>';

  const savadurTenants=S.tenants.filter(t=>dubailFilter(t.logement||''));
  const yearRev=S.factYear||new Date().getFullYear();
  let totalRev=0;

  savadurTenants.forEach(t=>{
    const payments=S.rentPayments.filter(p=>p.tenant_id===t.id&&p.paye&&p.annee===yearRev);
    payments.sort((a,b)=>(['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'].indexOf(a.mois)-['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'].indexOf(b.mois)));
    payments.forEach((p,i)=>{
      const bg=i%2===0?'white':'#f5f5f3';
      totalRev+=parseFloat(p.loyer||0);
      xlsContent+=`<tr style="background:${bg}">
        <td>${t.nom}</td><td>${t.logement||''}</td><td>${p.mois}</td><td>${p.annee}</td>
        <td style="text-align:right;font-weight:bold">${fmt2(p.loyer)}</td>
        <td style="text-align:right">${fmt2(p.caf)}</td>
        <td style="text-align:right">${fmt2(p.locataire_part)}</td>
        <td>${p.date_loc?new Date(p.date_loc).toLocaleDateString('fr-FR'):''}</td>
      </tr>`;
    });
  });

  xlsContent+=`<tr style="background:#185FA5;color:white;font-weight:bold">
    <td colspan="4">TOTAL REVENUS SAVADUR ${yearRev}</td>
    <td style="text-align:right">${fmt2(totalRev)}</td>
    <td colspan="3"></td>
  </tr>`;

  // ── Sheet 3 : Bilan SAVADUR ──
  const savadurFacts=S.factures.filter(f=>f.compte==='savadur'&&(!S.factYear||f.date?.startsWith(String(S.factYear))));
  const totalDepSav=savadurFacts.reduce((s,f)=>s+parseFloat(f.montant_ttc||0),0);
  // Add BT costs for savadur
  const btCostsSav=S.workOrders.filter(w=>w.paid&&w.cost>0&&dubailFilter(w.topo_ref?.propName||'')).reduce((s,w)=>s+parseFloat(w.cost||0),0);
  const totalDepTotal=totalDepSav+btCostsSav;
  const bilan=totalRev-totalDepTotal;

  xlsContent+='<tr><td></td></tr><tr><td></td></tr>';
  xlsContent+=`<tr><td colspan="4" style="font-weight:bold;font-size:14px;background:#E65C00;color:white">BILAN J&A SAVADUR — ${yearRev}</td></tr>`;
  xlsContent+='<tr><td></td></tr>';
  xlsContent+=`<tr style="background:#E8F5E9"><td><b>Revenus locatifs</b></td><td style="text-align:right;font-weight:bold;color:green">${fmt2(totalRev)} €</td><td></td><td></td></tr>`;
  xlsContent+=`<tr style="background:#FFEBEE"><td><b>Factures dépenses (SAVADUR)</b></td><td style="text-align:right;color:red">${fmt2(totalDepSav)} €</td><td></td><td></td></tr>`;
  xlsContent+=`<tr style="background:#FFEBEE"><td><b>Coûts BT réglés (Dubail)</b></td><td style="text-align:right;color:red">${fmt2(btCostsSav)} €</td><td></td><td></td></tr>`;
  xlsContent+=`<tr style="background:#FFF9E6"><td><b>Total dépenses</b></td><td style="text-align:right;color:red;font-weight:bold">${fmt2(totalDepTotal)} €</td><td></td><td></td></tr>`;
  xlsContent+=`<tr style="background:${bilan>=0?'#1D9E75':'#D32F2F'};color:white"><td><b>RÉSULTAT NET</b></td><td style="text-align:right;font-weight:bold;font-size:14px">${fmt2(bilan)} €</td><td></td><td></td></tr>`;

  xlsContent+='</table></body></html>';

  const blob=new Blob([xlsContent],{type:'application/vnd.ms-excel;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='GMAO_Export_'+(S.factYear||'Tout')+'_'+(fTab==='savadur'?'SAVADUR':fTab==='perso'?'Perso':'Toutes')+'.xls';
  a.click();
}

async function handleQRDone(mtId){
  const mt=S.maintenanceTemplates.find(x=>x.id===mtId);
  if(!mt)return alert('Gamme introuvable');
  
  // Check PIN
  const pin=document.getElementById('qr-pin')?.value.trim();
  const pinError=document.getElementById('qr-pin-error');
  // Get PIN from app_config or use default 1234
  const configPin=(await sb.from('app_config').select('value').eq('key','qr_pin').single())?.data?.value||'1234';
  if(!pin){if(pinError)pinError.style.display='';pinError.textContent='Code PIN requis';return;}
  if(pin!==configPin){
    if(pinError){pinError.style.display='';pinError.textContent='Code PIN incorrect — réessayez';}
    document.getElementById('qr-pin').value='';
    document.getElementById('qr-pin').focus();
    return;
  }
  if(pinError)pinError.style.display='none';
  
  const by=document.getElementById('qr-by')?.value.trim()||'QR Code';
  const note=document.getElementById('qr-note')?.value.trim()||'';
  const today=new Date().toISOString().split('T')[0];
  
  // Calculate next due date
  let nextDue=null;
  if(mt.type==='periodic'&&mt.period_days){
    const d=new Date();d.setDate(d.getDate()+mt.period_days);
    nextDue=d.toISOString().split('T')[0];
  }
  
  // Update in Supabase
  const upd={last_done:today};
  if(nextDue)upd.next_due=nextDue;
  const {error}=await sb.from('maintenance_templates').update(upd).eq('id',mtId);
  if(error){alert('Erreur : '+error.message);return;}
  Object.assign(mt,upd);
  
  // Add journal entry if work_orders exist for this mt
  // Send confirmation email to admin
  try{
    if(BREVO_API_KEY){
      const asset=S.assets.find(a=>a.id===mt.asset_id);
      const html=`<div style="font-family:sans-serif;max-width:500px;margin:0 auto">
        <div style="background:#1D9E75;padding:20px;border-radius:8px 8px 0 0">
          <h2 style="color:#fff;margin:0">✅ Gamme validée via QR Code</h2>
        </div>
        <div style="background:#fff;padding:20px;border:1px solid #e5e5e0;border-top:none;border-radius:0 0 8px 8px">
          <p><strong>Gamme :</strong> ${mt.name}</p>
          <p><strong>Équipement :</strong> ${asset?.name||mt.bien||'—'}</p>
          <p><strong>Réalisé par :</strong> ${by}</p>
          <p><strong>Date :</strong> ${new Date().toLocaleDateString('fr-FR')}</p>
          ${note?`<p><strong>Observation :</strong> ${note}</p>`:''}
          ${nextDue?`<p><strong>Prochaine échéance :</strong> ${new Date(nextDue).toLocaleDateString('fr-FR')}</p>`:''}
        </div>
      </div>`;
      await fetch('https://api.brevo.com/v3/smtp/email',{
        method:'POST',
        headers:{'api-key':BREVO_API_KEY,'Content-Type':'application/json'},
        body:JSON.stringify({sender:{name:'GMAO Pro',email:'antoinejosse56@gmail.com'},
          to:[{email:'antoinejosse56@gmail.com',name:'Antoine JOSSE'}],
          subject:`✅ ${mt.name} — Validé par ${by}`,htmlContent:html})
      });
    }
  }catch(e){console.warn('Email QR confirmation failed:',e.message);}
  
  // Show success page
  const root=document.getElementById('root');
  root.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f3;font-family:Arial,sans-serif;padding:20px">
    <div style="text-align:center;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:40px;max-width:360px;width:100%">
      <div style="font-size:64px">✅</div>

  const savedEmail=localStorage.getItem('gmao_saved_email')||'';

  if(savedEmail&&savedPass&&!S.currentUser){
    const user=S.users.find(u=>u.email===savedEmail&&u.password===savedPass);
    if(user){S.currentUser=user;console.log('Auto-login:',user.email);}
  }
  S.loans.filter(l=>!l.returned).forEach(l=>{
    const t=S.tools.find(x=>x.id===l.tool_id);
    if(t&&t.status==='available'){t.status='loaned';sb.from('tools').update({status:'loaned'}).eq('id',l.tool_id);}

});

  navigator.serviceWorker.register("/GMAO/sw.js").catch(e=>console.log("SW:",e));
}

// Handle quick launch from PWA shortcuts
const urlParams=new URLSearchParams(window.location.search);
const quickNav=urlParams.get("quick");
if(quickNav){
  const navMap={compteur:"compteurs",loyer:"locatif",creche:"famille",ecole:"famille",
    travaux:"workorders",outil:"tools",resa:"reservations"};
  if(navMap[quickNav]){
    S.view=navMap[quickNav];
    if(quickNav==="creche")S.familleTab="creche";
    if(quickNav==="ecole")S.familleTab="ecole";
  }
}
</script>
